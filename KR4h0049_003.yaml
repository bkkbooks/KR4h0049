body:
  text: 赤城集卷三宋林表民編重建録事㕔題名記趙汝回寶慶二年春余來為録事㕔屋老弊不蔽風雨獄亦棟撓趾腐椽斷壁闕矣亟請于州得錢十萬日整月葺既就完好於是即青青堂植竹數十以觀衛武公進德之序採崔文公詩更挹翠軒曰與清以想崔君之遺風古梅出荆榛西山立几案遙睇飛雲靜聽啼鳥俯仰之間物我俱適當是時有空囹圄釋桎梏之意焉㕔左右三井前豈無名賢嘗至閒視題名已石剝字漫不可讀因思唐張旭以草聖名家獨於尚書郎壁記用楷法峻嶮直截妙入神品年嵗愈逺人愈貴惜而尚書郎姓氏無傳可歎也夫記紀德紀事事廢德虧雖以張旭書之人弗觀之矣況石剝字漫乎可傳矣不得其傳後人之責也乃重刻之而叙以完葺之由庶幾將來式敬爾獄台州司理參軍題名記吳子良獄生地刑仁術也寃枉干隂陽者雪而和鬬狠戕氣血者弭而平狡詐悖正性者抑而順穢汚玷元身者懲而白是謂生地是謂仁術生地而淪於死仁術而為不仁何以故坐六失故六失貪也刻也忿也暗也懦也憊也貪則不公刻則不矜忿則不平暗則不明懦則不決憊則不周六居一焉本心且死矣地何由生本心寖不仁矣術何由仁栝蒼何君處東為台理掾始至余一與之語首敬之甫踰月與守趙侯爭獄事即棄去趙侯退聽挽留亦敬之未踰年今守包侯資政殿學士杜公下至士民吏交敬之何以故監六失故完本心故余諗理吏前乎君有如君否咸噤無以答考郡志略弗書問㕔壁題名則以己丑水不存也君蹙然曰我何能惟前名氏不可沒翻續志得國初三人訪老吏得自嘉定間吳焯而下十一人書之石君而後將續書焉請余記余惟本心人人有也六失非人人有也鑱其說以勸後乎君必有如君者矣台州司户㕔壁記謝雩台州司户參軍唐至德間著作郎鄭䖍嘗以謫官居之今州城東偏猶以户曹名巷杜工部詩所謂老作台州掾是也國朝宣和初滕君膺自睢陽來時睦冦起幫源羣盜響應仙居呂師囊遂據韋羌率衆攻城滕君倡義守禦卒擒首領一城全活父老紀焉今廨舍為屋三十楹而扁榜者曰户曹㕔皆滕君遺跡也㕔故無題名宣和以前莫可尋繹雩將去官次其可考者自滕君以下得十有九人識石陷壁間而闕其所不知略其所未詳以俟來云台州重建衙樓記張布州有樓一州之觀聽在焉所以嚴等威也有門闕然後壯朝廷有兩觀然後重侯國故古者亦以興作課吏績橋梁郵亭之不修則不為能城郭弄道之治使端正則以為賢是皆可以觀政事之廢興吏治之能不況觀聽所繫之大者乎於其大者不立則政可知己台州治之衙有樓久矣國之朝有朝夕故州縣之衙有早晚初不鼓角去郡治為逺故建樓設鼓以報衙是則觀聽所繫之大者嵗久朽蠧亟危將傾今郡侯監丞黃公治台之明年政成民和年榖用登始以其餘力革而新之先是州之圖經未修三台井掩匿其一逮公之至始命郡士纂輯其事以成圖經發所掩井作亭其上以應台星庠序之門隘陋則崇廣之坊弄之名不立則表揭之㦸門旁雜為賈區譙樓率多隳敝則開拓而修復之頒春有亭以厚農政講武有堂以治軍旅養老慈幼有院以惠困窮逮兹樓之作則棟宇壯堅丹艧輝焕朝晡有時吏士奔走不失其度耳目所矚為一邦之巨麗然後台之文物一新而江山始改觀矣初議鳩工人多以其役大費夥而難就已而官核其實吏忠於公瓦木不取諸民和價倍給其直工徒酬以市價出入有稽用度有節無浮費而收實效事簡而工倍役廣而費省人始服公之規模先定其功不愆于素公名㽦字子耕蓋江西山谷之𣲖晦菴朱子之門人朱子之學以濓溪二程子為宗公修學校則為祠堂繪四先生之像行釋菜禮以奉安之命博士鄉先進與其門弟子次第講貫經理又刋朱子中庸大學之說以開後學其淵源有自來故其為政能尊主庇民廣教化厚風俗建置規恢知所先後是役也軍事推官趙君師回實董之趙君有材既自新其治所竭力以佐公家且以邦人之意請紀其實布辭不獲於是乎書臨海縣㕔記章望之官府之㕔蓋宣王命而蒞政事之所也皇祐二年正月臨海縣新作正㕔何新乎逾舊也向之時庳甚矣嵗久朽且不支今宰崔仲牧乃革之仲牧惠和而敏故其舉事也中而遺於人也逺不亦嘉哉臨海縣㕔壁記彭仲剛縣故有㕔壁記自太平興國錢氏歸土以來縣令名氏悉載遭乾道癸巳災與縣廨俱爇不存余既建廨舍念前人名不可以無見博求前所摹本絶無得者遂厯訪故老逺稽按籍旁考紀牒自宣和而後得三十人鑱石以記虛其後以俟方來宣和之前僅得十餘人年次來往不接姑列其前而闕其間之不接與凡日月官稱之不詳者以俟後之君子他日有得以續之所聞多闕冝未足志然失之於今則後益不可知是猶賢乎已爾臨海縣重建縣治記吳子良百年來臨海數賢令曰顔公度彭公仲剛顔當乾道初元公私優裕之時而彭承乾道末年郛郭焚燬之後彭能摩挲赤子樹縣治百楹於榛莽中役巨事煩而仁不傷故彭公為尤難嗟乎孰知又有難於彭公者蓋紹定二年九月丙辰之水陷城吞原隰囓官民廬居殺禾稼環百餘里漫為濤川而縣治西直栝蒼門最先被水崩奔漂悍特甚凡彭公所樹尺柱寸椽不留官吏簿書無所於棲獄訟無所於決民方死徙交道繼之殍疫連年天子為捐帑振廪復租已責遣部使者葉公棠議荒政議城築縣計雖束手然役之百須則以比郭先諸邑奔命嵗再更縣猶絲紛而舊觀莫克復於是葉公奏辟前尉溫陸吳君楷令臨海君既為尉諳其人情土俗不逞智立威一切治以簡靜擾不及民民之居奠矣君曰民之居奠然後令之居可奠乎而以纍民吾不忍也民亦奮曰令常憂民之居矣不憂令之居乎而以纍令吾尤不忍也令樽他費以創之民伺其闕而助之公㕔中峙挹之髙門吏直旁環引以修廡㕔之後虛敞為琴堂廡之東閎爽為犴狴藏敇有庫遲賔有位燕休有閒軒寢處有密室完備至於庖湢整潔及於階除繚重垣以護其藩培秀巒以鎮其隂自五年冬至今不弛不迫雖創之者民本無預而助之者令則難遏也由是以觀紹定二年九月之水殆十倍於乾道末年九月之火火既五年而彭始至城內之民痛定矣水才二年而君已至闔城邑之民痛未瘳也非又難於彭公乎而樹立乃爾雖以君繼彭公可也古之為令者能以道教民其次能以政養民又其次能毋以政擾民耳近世教與養不十一擾之者總總也夫毋望於教與養姑望其毋擾之耳是民之賴於令者止此耳止此而又不能則是令之居豺虎之窟也誰肯愛豺虎而樹之窟哉能毋以政擾民民得婆娑怡愈自足於長郊廣谷之間幾於去豺虎而傍父母於古為次於今為上矣使父母臥風雨人子其安哉則民之助之亦奚怪哉夫毋以政擾民民猶父母之猶助之而況於以道教民且以政養民者哉此可見臨海俗之願而狀訴譁訐猶聞有存者豈其咎専在民哉豈其不可轉移也哉嗟夫能毋以政擾民雖繼彭公可也能復以道教民且以政養民雖繼古之為令者可也臨海縣重建宣詔亭記方沂皇帝邃居閶闔而率宇內若耄倪若飛植然春意固以詔令為風雷也今詔令猶古誓誥按書邦家暨尹御欽揚懼後自井田廢於時置守若令令雖小甚佐風雷以陶萬彚等也以故窮崖下邑環治無百户亦必有宣詔之地矧𨽻甸服户且繁何敢弗䖍臨海縣南首步故有亭詔中下令合父老稽首無異棲觚稜而瞻飛鳳也庚子火民廬蔓延亭遂毁四明劉君棟綰縣事惕然念非承流所宜鳩工遴材一新故址始癸卯正月越二月告成費以節用之資役以受傭之夫他事以邑之幹勤之士穹梁博礎丹堊彪炳于其旁復翼以布象舍數楹夫乾以震巽鼓萬物皇以詔令鼓萬民詔令肆頒自朝廷厯監司監司歷州州厯縣朝廷去民最逺監司次之州縣則近民之官也而縣最近故民有休戚利病縣知之最悉而縣長吏或亷或貪或寬或猛關民之命脉又最切宣詔有亭豈直具文而已固在奉而行之也傳曰君制命為義臣承命為信孔子于震取不喪匕鬯于巽取志行順剛皆臣承命之機括今詔令無嵗不下曰宥罪曰减租曰賑困乏民延頸以俟如蟄而雷如熱而風旦暮不可緩臣奉而行之可緩乎而況於民最近者乎劉君之令臨海也亷於已而寬於民又悉知其休戚利病鄉無邏卒圄無錮囚創學趣子弟受業蓋字而教之道備長民之責可無愧斯亭之建具文乎哉臨海縣重建縣治記尤袤乾道癸已秋九月臨海居民不戒於火濫爓扇延以及縣治燔爇俱盡當官者因陋就簡僅能建三椽於煨燼之中以聽獄訟吏民亡所托足按牘亡所棲列一遇風雨則沾漬暴露呌呼歡呶訟牒計簿散匿吏胥之家最易甲乙莫可質考縣日以不理後三年豫來為州有意興之而無與任其責者淳熙丁酉秋永嘉彭君仲剛來主縣事豫聞彭名舊矣心固望其有為彭乃言曰夫環百里之地而為之長聚萬室之衆而聽其令民社所寄視古子男治必有所一邑之條教於是乎出而司存弗偹亡以施政廢之當舉舍此孰先然役大用夥非受命於郡則令不得擅敢以為請豫乃畀錢三十萬使營度之是冬豫罷官歸踰年則彭以書來告成矣外為重門以嚴啓閉上建層樓以斂藏敕書治事有所燕居有室翼以修廊挾以外廡吏直賓次環列有序奧者為藏爽者為獄為亭於大門之外以班詔令為閣於東廡之上以藏按牘為堂為齊為軒以備宴休遊息之地下至於庖湢之所微至於什器之末雜至丹艧甃甓之事纎悉畢具規橅堅壯工用精密總為屋八十有一楹中鑿五池瀦水為備復以其餘力建丞簿之舍而新社禝之壇鄉之荆榛瓦礫之場今乃為髙明宏麗之觀民始識有官府之嚴而稱其所以為邑大夫之居者問其經費之所出則曰未嘗巧取而苛斂也凡財之隱於吏而亡籍木之訟於官而願獻者悉取而拘之鈎校畸贏積絫銖寸故費廣而不闕問其工役之次第則曰未嘗厲民而强使也籍竟內之為工者若干官出僦庸率如其私之直居處飲食先為規畫使極安便率旬有五日而迭休之其用夫止及於附邑之三鄉家止一人人役三日畨無過十夫而亦與之庸省督工程無苟簡怠惰之患謹視給散無稽留朘削之弊民之與官為市為役者若私家然故役大而不擾蓋經始於丁酉之冬而落成於己亥之秋問其所以久則曰不敢倉卒而趣辦也作於農隙而弗奪其時休其力而弗盡其用慰諭其勤而䇿其不勉民咸勸趨故功成而不勞夫聚財有方用民有節舉事有漸顧何往而不濟哉豫嘗謂今之仕莫難於為邑弱者不足以有為而健者或以病民幸而得強弱之中則積負困之姦民撓之欲興事造業有其志而不克成者多矣又幸而不為積負之所困姦民之所撓而在上者或不察不得自展其才者亦多矣當君之始至賦亂政龎隱户移脫弗可䆒詰乃定質劑乃正疆理逋租匿役披露首服吏姦民瘼檢柅濟理田野歡呼訟日以簡故能不困於積負不撓於姦民不抑於當路而興舊起廢不擾而集非庶幾於古之所謂循吏者乎夫裒聚贏羡於單乏之餘可以觀儉謹用民力於逼仄之中可以觀仁積纍工役於遲久之後可以觀智是皆足以為吏法而不可使之無傳豫既嘉彭君之有成而因其請故遂著其實使後之人得以考而法之非以譽彭君也臨海縣尉㕔壁記京鏜縣正之職其任非輕漢有四部隋之分判重之也臨海附城民事浩繁猾胥姦嫚為尉者非其人則政乖在昔紆黃綬皆宗工巨儒各稱其職自此或為監司郡守侍從輔臣不可概數得人為盛矣今縉雲葉君卨以名家之秀學業之贍既修飭政事鼎新廨㝢且念前人名氏不可以亡傳博考圖籍厯訪父老僅得三十人刋之于石其間年次之不接日月之不詳姑闕之庶他日可續焉後之君子好古博雅必不隱也尉思隱軒記林仰金華王季海作臨海尉葺舊屋闢一楹地為燕息所用梅子真故事名思隱軒屬豫為記豫告之曰君遭時清明少年取科第初官即事賢主人有設榻之重駸駸乎得行其道蓋與子真居然不同然則胡為乎隱哉試妄評之君子之道出處而已隱之為言去也仕而有隱志則去就輕去就輕則不為世間勢利之所移是以道可行事可立澤可以及斯民古之人太山覆於前而色不變用此道耳不然則接輿荷蕢之流潔身亂倫之行儒者不取也仲尼轍環天下孟軻厯聘齊梁一不合視萬鍾祿若將凂焉去而不顧故為百世師仕而志乎隱舍是宜無所取法焉季海讀書明理道耿耿不可犯干而恂恂似不能言其鄉里之賢有以氣節聞者季海慕其為人宜其不凡如此是軒之作小出芒角固已超絶況仕益久閲世益深其又可量也哉豫於季海同年生也草木味同且有聨事之好其知季海他人不及也故樂為記而不辭黃巖縣㕔壁記方行可宣和癸卯嵗之十月黃巖縣新作㕔事告成大夫王公顧諭其客方行可曰昔之為政于此者其賢有聞去而顯於朝者有人焉其流風善政在民至今者有人焉是不可以無紀也縣㕔故有壁記辛丑之盜漫為煙埃吾將因新宇之載新復求國朝以來作邑者名氏次以嵗月鋭石而置諸壁使後世有考且可繼焉子其為我叙之行可不敢辭謹叙之曰縣令長皆古官漢制萬户為令减萬户為長今之知縣事古所謂令也黃巖古東甌蓋為邑者尚矣皇宋有天下承平日久生齒滋殖著版之民僅十許萬故出宰者率繇尚書左銓熙寧元豐而來以其兼督鹽管間自有司辟置或出於朝廷一時之選以故得循良為多前記無復遺迹今大夫訪之故家得於邑士陳褒別記者由宣和而上訖於天禧之元凡四十有一政攝事者九有其姓而亡其名者二其不可考見者闕之且大其石以俟于後夫近民之官莫重於縣而㕔事政之所自成也一號令之出少有不謹輒病百里或遺患於數世之後為政者不可不知也今大夫之賦政可謂知此矣而又將推以謹來者故人列其在事之嵗月俾其政可考而存後之人坐于是以令斯民苟閲而思之必將曰某善足慕某不善足戒後之視今亦猶今之視昔吾敢不謹乎是則壁記之作豈特著舊而已實百里之賜數世之澤也嗣大夫者其念此哉黃巖重建㕔事記王居安㑹稽胡君衍道令黃巖才數月政平訟理吏畏之民安之士大夫信之下至海隅山顛黃童白叟莫不知有胡令之賢也邑故有㕔事建於宣和之五年令王君然百年矣後雖有修建堂宇者由堂而外尚仍其舊凛焉有棟壓榱傾之虞前令陳君汶改建門廡而㕔亦未遑睱君至以嘉定七年六月經始於明年之正月越二月己未乃立木創大㕔五間合從屋凡百二十楹糜緍錢三千米斛三百悉辦之官絲粟不擾於民役替有時廪給不闕凡度工授材董以邑士周之純阮時中所以杜吏姦也五月將成君以丐祠得請慮以一簣之虧復纍後人於是别儲所須若塗雘甃甓之屬俾主簿陳君武子訖其役且屬居安以紀顛末夫環一邑之境令南向而聽焉有民人社禝之寄固不可以百里儉其居也然今郡縣之官莫難於令泉穀所入有經平居常患日不暇給土木之興良不易矧吾邑為台壯縣訟繁賦重曩者連數令無善去則視他令尤難也間有所為則未免科斂百出下不勝擾而上不加恤耳今君至之日未久為之特易而民不知何也始余聞君之官於泉之舶司也未嘗市香於泉今聞其宰吾邑也雖杯勺油燭之須必計直入金於官蓋其律已嚴故官事易集其奉已約故公用易饒兹其所以雖難而易也與余懼夫來者徒樂其成而不䆒其所以成故托其實而告之繼自今聽訟弊獄於斯出政斂財於斯者宜有考焉君名衍衍道其字也赤城集卷三
