body:
  text: 赤城集總集類提要臣等謹案赤城集十八巻宋林表民編集中載吳子良赤城續志序稱其字曰逢吉與撰天台前集别編之林表民合又稱為東魯人則里貫互異葢其先世自曲阜徙臨海故從其祖貫言之非别一人也表民常續陳耆卿赤城志復取記志書傳銘誄贊頌之文為志所不載者薈而輯之以成此集前有淳祐八年吳子良序稱分門會稡并詩為一今此集僅有文一百八十二首而無詩又明謝鐸赤城新志載赤城集二十八巻有刻本在内閣而此本亦祇十八巻疑原本尚有詩十巻為傳抄者所脫佚已非完本矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:627e5379f2d9f179e785cf93dfde7fcabe8efac4b4612319b06b818a7b89dbfb
