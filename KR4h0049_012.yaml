body:
  text: 赤城集卷十二宋林表民編霞起堂記尤袤雙巖堂踞兩崖之間獨得地勝其下面墻廣不尋丈擁蔽心目不快人意豫因闢之墻之外糞壤所瀦乃墾乃夷得舊址焉撤廢亭於射圃移植其上榜曰凝思取孫興公賦所謂凝思幽巖者也亭之前有敗屋數椽東面西上榱棟橈折隅奧庳仄乃改創為堂三楹南向與靜鎮堂相植因名曰霞起繇雙巖而望靜鎮直若引繩其外繞以回廊上連參雲以為風雨遊觀之備爰植美竹以經緯之於是堂成而勝益奇前所未睹披豁呈露天若開而明地若廣而敞景物若增益而富晨煙夕霏萬化千變近峯逺嶺間見層出皆可不出簷廡而盡得之噫是亦足以廣心志蕩塵垢而非苟以為娛也惟此邦靈仙所宅昔號勝處自經大旱遂成陋邦而山川之秀不異今昔或謂豫當單乏之際顧為此不急之務然取材於舊課工於卒不市一木不役一民而使隘者敞窒者通敝者新則亦何害於政哉第廢材不足以支久尚能十稔若其革而鼎之以俟後之君子始役於淳熙三年正月己未成於二月壬午節愛堂記尤袤過靜鎮堂之左少南為方池並池而南墻壁障礙敗屋傾欹公厨以積醪醴問諸故老曰此昔之燕豫堂也池舊有橋橫縱濟渡其東為草堂今皆燬撤後人因基築臺以望月其下挖池為小閣名曰清平臺庳且隘不快登覽人迹罕至亦漸頽圯豫既徙臺於參雲亭之後榜曰匿峯以望北山平夷舊基更作堂曰樂山以望西山之秀而池光山色且蔽於閣而不得見也乃徙閣於池之南因燕豫堂之基别為堂曰節愛取節用愛人之義旁為挾廊而上與樂山堂通池之北石崕盤踞土壤所壅疏剔理脈發露呈顯如枕股膊如覆囷廪如黿鼉之背負土而出西望連岡疊嶂間厠隱顯如擁鬟髻如展旌斾如風檣陳馬排闥而入其南則帢幘二峯角立朋秀若偉丈夫冠劔而坐雙塔亭亭影插天半於是仰山俯池逺樹近石環列先後若相拱揖煙消日出層樓飛閣浮虛跨空如展圖畫而望蓬萊之雲氣也夫昔人經始莫不相山川之冝度面勢之便其所建立如紀綱法度井井然悉有條理一定而不可易後人見其敝而不能復也遂出已意變更之易其東則西廢撤其左而右病遂使昔之勝概日就堙沒今豫非能有所增創也大抵無改前規無廢後觀便覺天宇開明巗壑增秀林木水鳥皆有喜色而後知昔人之規模可因而不可變也爰刻諸石以識顛末尚告來者嗣葺焉始欲跨池為橋仍其舊池上有老梅惜不忍伐遂不復作思愛庵記陳耆卿思愛庵在北山滕侯廟左十步台之人感懷侯德故立廟既廟復庵其旁者侯德無窮而感且懷之者轉不已也侯以郡下末曹抗海內巨冦事具守台録及文公記中世已傳故弗著間嘗論自古有冦未至而恐皆是也其上冦至不恐急則遁又其上冦至不恐急不遁繼以死豈不難哉侯則不繼以死繼以生侯生而一城之老稚皆得生百餘年間涵孕孳育婆娑嬉逰以織以耕以仕以學不知者自謂太平幸民坦腹卧而知者流涕也知則思思之而不得見則願見其家人如侯在乃命侯孫仲冝迎趙夫人於陽武夫人庵居侯廟食官斥廢田半頃俾仲冝主祠事仲冝死子昖主之田嵗凶庵且日圯泣曰若是則非台人之所以命我也會秋中熟乃以田之入供修費先廟後庵訖功徴記於豫豫惟侯天與血誠視戡難解險如飲食功成而孫賞濃薄不計庵與廟有無足道哉台人念忠昖知孝故眷眷於庵與廟得不廢雖然庵與廟台人責也而乃以纍昖昖蔬水僅僅給又齧之於匠石將奈何愛根則護枝繼自今庵與廟圮當修田不足當附益豫以田之逸而後責以庵與廟之勞庵當益不廢侯死不可作使侯世世主侯祠不絶即所謂感懷侯德不已者也豫記曩年陪廟祭尊簠橫陳簫鼓撼木末祭罷胙飲庵中而嘗恨庵小不足容也今既新是庵春猿秋鶴喜動顔色大夫士將雲闐霧塞釀酒張肉以來歌侯之德之賜夫必念其為台人之責而母以纍昖其殆庶幾乎重建青青堂記吳子良趙君幾道既新録事廳之西軒更名與清顧其前青青堂舊環以竹竹廢堂寖毁清趣安在於是併新堂重植竹語余曰堂以竹名而吾典獄事翠色籠煙靄詎能滌簿書之垢氛雅韻含宫商詎能掩呌號之慘戚雖獨清於竹亦難清於獄為民司命欲厭煩劇專幽間得哉雖然神勞斯昏力疲斯惰少舒吾神少休吾力昏可醒惰可強斯堂斯竹獨無助乎而况夫衛武公之詩白樂天之記吾左右揭而朝夕觀焉非特吾助又吾師也嗟乎世稱王子猷嗜竹以之障郡囂寄幽賞止耳亦嘗聞君之言乎夫澄心所以應事乃欲無事以為髙而置心於事之表觀物所以會理乃徒玩物以為適而尊理於物之上是皆當時風味子猷未能免也今君先堂之陋以竹代葩卉吏退淨几焚香環古書金石刻悠然孤詠語懸明水間弄絲桐送飛鴻雲外其孰能溷君而言乃爾蓋澄事之源觀理之寓竹匪獨清而獄匪難清矣然則其剖判明其轉旋敏其磨鍊熟未足盡君而君當有賢於此者庶幾異日君子既去居是堂者對竹如對君哉與清堂記陳塤台州録事廳右偏舊有挹翠堂與青青堂對牖破楹欹不任風雨趙君汝回以東嘉奇勝士作郡綱紀政用詩書千里欣賴退公怡暇念無以寄幽遐養性情乃度乃營葺而新之更曰與清疏忩短墻豁四目延朝爽向之鬱壅湫陋者皆澡沐精煥為吟都理窟矣國人朋友咸宜焉會豫從鴈蕩來榻於堂隅以分此清時夜欲參半壺觴方稠客訊主人以與清之旨主人曰心與瀑泉清權文公送崔録事語也客曰美哉然觀宇宙間春秋冬夏隂陽慘舒之運神氣風霆庶物露生之形視聽言動日用變化之神非天下至清孰能與於此今吾與子談於斯息於斯琴且詠於斯笑語涵秋風月在襟梅竹交隂西山入櫺而愈然而寂然人歟我歟內歟外歟依於事物果欲求吾與也儻毋汨爾初克鏡厥靈殆將皓皓融融八荒洞明吾且不知孰為清又烏知孰吾與乎主人曰旨哉取琴而歌作與清操州學沂詠堂記包恢台為郡負龍顧山起伏逶迤形猶龍也東有湖橫縮平廣與白龍潭相表裏其龍之所逰乎湖中皆蓮萬幅如錦紅緑成章光影煥爛香氣不斷隨風四逹方三伏中忘其有暑赤城景物之尤處也於逰於觀延以亭榭濟以舟梁燕以緑醑引以流觴當其盛時衆美畢張蓋湖本𨽻於郡而景物則與郡人共之其來久矣今郡侯寺丞趙公來已踰年獨勤勞郡政無遑曰此太守燕逰之所未嘗暫有車馬馳驅之迹徒一日因謁客便而過之四顧而嘆曰以景物與郡人共之此不可改湖𨽻於郡獨不可改所𨽻乎兊為澤湖者麗澤兊也朋友講習之象且有蓮可采與采芹藻者同方盍以𨽻之泮宫乎慨念泮宫重建於淳熙壬寅今再見淳祐之壬寅矣久必壞壞必修而泮田有限洊以水旱庖廪且不繼修之費奚所資昔魯之修者僖公能也今吾非僖公冝不能亦寧不為之動心乎顧如湖蓮者自根而華自華而實華可愛根實可食嵗售之豈無微利可補郡用郡用雖方窘不給而泮宫壞不修尤為師者之責故湖入郡寧入泮以為修宫費湖利有常入則泮宫可常修而學業可常久所謂麗澤講習之説殆將無時而窮湖之利有關泮之義大矣今使郡博士主之而擇士之賢者相與經紀之此侯之盛心也泮士德之思欲希唐人郎官湖之遺意以傳不朽乃因湖心舊堂先修而新之易名曰沂詠非獨寓所以歌詠郡侯之德而抑覬以逺追曽點之風學正學録直學率多士詣豫請記其説以豫忝郡丞又與侯寓居同里素知侯心者不容以不文辭乃為發侯之心以復之曰觀水有術於湖何觀水不測蛟龍生淵淵浩浩其淵如天湖之深廣如之誠之至者當之苟學有淵源不舍不已而不息之誠至矣曰湖云乎哉其下而藕生汚泥中疑脆弱易汚染者乃反中虛外淨而色純白其操同氷雪若峻潔士處汚世不易者上而花發烈日中疑嬌淫易凌奪者乃反氣清容正而色純固其艷敵炎火若剛烈士遇威武不屈者其特立獨行曰藕花云乎哉物皆備我非反身而求決不可將修泮宫其宫何若宫墻數仭誰真見宗廟百官之美且富者因修泮而師益明修道之教弟子益勵修身之學以求入門而升堂升堂而入室或者可至夫子之宫若徒曰凡湖必有龍而善變化蓮亦有紛華榮耀之態吾惟欲由泮宫以變化榮耀其身則亦卑矣况堂以沂詠名則志不在是而沂詠之實又非訓詁議論之學所能與知者曽點知之不則雖如三子各欲以所長自見猶非夫子之所與觀蓮湖上乘風堂中要必有妙契於此如先儒吟弄以歸有吾與點也之意者泮士從事於學久郡博士楊君點又其傳自成公吕氏甚習今其師友間必講之熟而行之著此侯所望於學者之心也侯為台光前照後而加惠泮宫尤厚如房廊收稅有蠲放侯自補之契錢分撥屬版曺侯申行之塗田已給僧或妄據侯盡舉頃畝以歸之凡養士之需與今捐湖修泮之事皆例為永久之利是真可屢書不一者豫也姑為述其本末大概庶幾後來者有考知相繼維持俾勿壞云侯名與杰寓居旴江之南豐靜治堂記樓鑰丁君大榮宰天台以書來言闢縣治之左為靜治堂請書其扁且求記焉君視豫為父行為書其扁且勉之曰俟君政有靜治之實當為記之踰年政成而邑人誦之者衆蓋邑當往來孔道夫力之須最為擾民農人失業幾不聊生君首欲罷去人以為難能而持之益堅力請於郡卒罷之民已安堵大率御吏以嚴撫民以寬催科不事追擾使人樂輸禁戢強狡以絶鬬爭尤敏於聽訟前此投牒至以千計今則十損七八矣變劇邑為簡政以其餘力為邑人深長之思作助濟倉儲粟三千五百斛以待飢嵗以平糴價又作續倉食嵗收百斛率三嵗則以助士子之與計偕赴廷對及遊上庠者於是上下説和坐以無事真可以靜治矣豫嘗倅赤城知天台之難治日不暇給而君能如此乃為之記使邑人刻之且益勉其善始以終焉君實今司農少卿公之次子少卿以才選表兼領行都彈壓之寄君盛年試治行卓然能世其家逺業未可量也雙清堂記王銍錢塘錢厚之字德載罷邑暨陽築室天台山大隱峰下芟刈蓬蒿列植松檜室宇華緻冝冬而協夏凡前日造化所祕一朝自我而得遇興超然景與意會取杜少陵詩心迹雙清之句以名其堂畫圖携以相示乞文記其成僕嘗逰走四方考驗風聲氣俗以閲天下之理凡名山大川非綿亘數百里不能遽盡者磅礴委蛇以舒發天地之勝氣也自渡浙江觀會稽羣山與天台相連屬如翼張角立其隱秀涵媚峰巒森列髙與天鄰謂之四萬八千丈特其略耳地據數州下際滄海與蓬萊瀛洲方壺圓嶠俱謂之海上仙山而天台特其在人間者匪特雄冠東南而已自會稽而南所見猶未也接剡縣千巗萬壑經沃洲過金庭然後厯天姥之岑以窺赤城華頂崷崒雄張千呈萬露愈邃而愈無盡其煙雲吐吞光景變滅俯搖滄溟勢接混茫湧日澄月金波萬里海天雲霽瑶臺銀闕其晦明風雨晨夕萬狀與夫晴嵐暖翠浮動出沒隱見於汗漫空無之際者盡非世境嘗見也冝乎異人神藥世多遇者仙聖應真飛騰示現變化往來近在耳目與天宫化城無異也今德載卜築占天台勝處或逺或近以環吾居者桐柏遺祠王子晉賔天列仙曹之所也華頂天闕則上帝以賜司馬子微也招手之巖與五道場則智者之所立教也赤城霞標則孫興公所賦也神錢飛升葛玄所羽化也寒巗國清至人嘗寓迹也石橋方廣大士所隱也世傳劉晨阮肇飛升度世仙去不歸洞口猶在政與是堂相峙凡聖賢應世與天壤瓌奇詭異之迹可喜可愕者不下几席一指顧盡得之非天下偉觀乎蓋是心既靜則外景靡非至樂况山川之足娛心乎昔人謂山水有清輝及有清音者信乎其能移人意也雖然古之君子未嘗必仕尤未嘗必隱也逹則在朝潛則在野我何容心乎因其所寓而已彼採藥名山全家深隱逰五嶽終身不反者猶有所偏也非聖賢常道也自兵燼以來四方逰士山棲水宿不常厥居者亦衆矣德載捨衆人必爭擇義而動得天下佳山水地以供吾之樂不以迹混其心不以外忘其內有軼於心迹雙清之語矣是皆可以書云德載鄧國忠懿王之孫世載令德為搢紳歆豔其問學鴻博行義矜修而政事強明所臨有聲百廢俱起猶發硎之刀衝斗之劔正芒寒色鋒鍔不可少犯有所施設必為後法將見羽儀天朝進而顯用矣乃以山林鐘鼎隱顯一致非取彼貴之理極德載髙致僕言不欺故記之德載以為知言故刻之安洲驛記樓鑰淳熙五年豫自敕局出倅丹丘明年以檄之柯山始經由仙居往來皆宿於栝蒼洞天在縣境也是時稱過使客之具甚備雖以别駕之故然棟宇整肅內外如一距今才二十許年里人林君嶽為縣一日安洲驛成求記問之即栝蒼驛也且言中間驛嘗隤廢既不暇葺併以故基斥賣於民物之廢興誠有之顧邑雖小何至於是其直又不過十萬錢始至即聞之怏然以為不滿特未遑爾視事以來檢柅姦弊疏剔利源量入為出寢以就緒未始加賦而償預借之逋四千五百餘緡於是首建社壝修邑庠建樞密直學士古靈陳先生祠堂復以舊直取驛基而為營繕之計邑士林宓公心而有幹才一以委之吏不得與以嘉泰二年二月已亥先為臺門以及廳宇兩廡正堂以次俱辦凡為屋三十楹足為大賔客憩節之地經理其下必欲器用庖湢井井一新使來者如歸焉不敢以一毫煩民也余曰是可書也已君實紹興吏部侍郎之曽孫而君之父方以才業為時用董餉湖廣以振職遷司農少卿進用未艾也君嘗再薦於漕臺更選試邑能聲已如此謂非家傳可乎縣有蒼嶺甚峻由此以過縉雲客之去者先得安意樂處於此以陟險來者脫險阻而息肩焉受賜者寧有窮乎安洲亦境之近山有髙僧觀頂尊者古迹栝蒼既為鄰郡之名故更以安洲名之云陳氏本價莊記杜範余自少聞同邑里陳君尚誼樂施忘已為人築河隄甃江滸凋年食餓方春掩骼皆為人所難者而本價莊之立為尤偉蓋吾邑土廣人稠厥田惟斥鹵嵗入鮮少積粟者且數泄之他境豐年猶靳自給比少不登輒以艱食告君名田甲於縣惻然曰古人言千斛在市市價自平吾今度吾餘已足若但規商賈之利而坐視人殍死可乎乃會其家所入除供公上給賔祭外贏斛幾萬計當粒米狼戾則謹窖藏絶商販一遇艱糴則傾囷以升斗糶率減市直之半環邑數千家日仰給焉於是凡廪之閉者發價之昻者抑人不病飢矣歌於道祠於社總總也君垂殁分畀二子龜齡夀齡田各十頃為衣食費餘悉以備本價之需索筆書千餘言以古道訓敕子姓至此一事則丁寧再三俾世守之噫若君於吾邑可謂有任恤之恩矣龜齡亦善承先志方將築囷倉厚儲粟圖所以廣厥考之成規邑人蒙賴未已也既乃請於豫曰先君有治命龜齡不肖朝夕奉以周旋罔敢墜失顧恐後之人不知是莊成立之艱而求以自便其私則龜齡異日將無以見先君於地下先生知吾先君者願識其事於石吾且刋先君遺訓於石之隂庸詔諸子若孫母敢怠豈惟龜齡一家之幸邑人之願也嗟夫吾每見世之為富者銖較錙取厚自封殖視他人之飢若秦越之相視漠然不以怵諸心非不為後人計也已而癡子騃孫從耳目之欲侈用無節向之所積蕩如燎毛莫敢憐之者何哉富者怨之府而欲專之其禍冝至是今君家厚施而不求報又曲思為垂逺之謀為善者有後吾見君之子孫蕃衍盛大而是莊可以久存矣又奚假余言為重雖然子而欲徴余言豈徒為爾子孫勸哉近而鄉鄰逺而郡邑必有聞風而倣效者則君之流澤無窮而余之言庶有助焉耳故不敢以陋於文為解君名容字益之龜齡字與智勤學尚賢或者其昌陳氏乎初君嵗出緍錢千收粟於秋而以本價發糴於春遂以名其莊今模畫雖非疇昔而名尚仍其舊焉台州謝子暢義田續記趙蕃上蔡謝敷經子暢乾道癸已為信州永豐尉參議公就養焉豫時寓居縣之祖印寺以豫之祖母乃崇福朝公之女子暢之伯祖母乃景迃朝公之女講通家之好進拜參議公於堂退從子暢逰相好也淳熙甲午方有鄰鄆也郵也猶未生參議公與子暢先後即世後四十八年郵壻於衢之章戴陳氏過豫於章泉又四年鄆赴臨江教授亦來過豫講舊好也子暢為趙忠定公所知忠定在政路時以其貧姑畀祠帖未及進用忠定既南遷以沒子暢亦泊然無復仕宦意猶以素貧口衆不忍離異始則取諸平江之田以給之以子暢娶葛房資在焉粗可足食又慮非可經久乃得斥鹵於棄地之餘築堤捍潮建斗門泄雨潦以為田疇又買官山於田之東以葬族之無歸者其費幾五千緡皆罄竭所齎又鬻平江之田以充之而田屢遭風潮衝突勞憂甚矣未幾病沒鄆也郵也雖在稚齒凛凛乎先志之廢稍長更事悉力經營乃復其舊書來謂吾父勤苦終身以為茲舉雖自為記猶未盡以豫與子暢同生於紹興癸亥而尚存且親好又甚篤屬豫記之吁凡今之衣食於此田者不可以為當得而易之當念其昔者經始之難與今日扶持之尤難苟以為當得而易之則昔日經始之難與今日扶持之尤難之美意悉滅矣使世無鬼神則已儻有之其能終相我而享之乎此豫諄諄以為當得而易之者之戒且俾今日扶持之尤難者不敢怠其力赤城集卷十二
