body:
  text: 赤城集巻十一宋林表民編臨海縣泰安館記石公孺丹丘山嶺崇峻川流深永旁際滄海自會稽抵郡凡十置驛水陸相望東接鄞川南則直永嘉並閩越西南則道處婺連江南走湖湘行李徃來疊跡屯軌絡繹不絶然郡抵天台幾百里中有驛曰小石聯延壯偉其來舊矣道里既均從容就館各展其物無冦盗燥濕之患宣和辛丑蜂蟻嘯聚驛為煨燼客使經逰往往兼程以進時雨暴集無從託宿率皆寄跡民舎徒御驚擾里社不寧而又頃者昭慈聖獻神御之温祖宗神主復歸於廟皆剏土木旋即傾壊貢賦輸輓由此塗出行者無所居者先病如是十七寒暑矣紹興六年夏徽猷孫公來守此邦以博大之徳行豈弟之化訪民所欲以廢驛請頗欲繕治而愛惜民力且未暇及又一年政成訟簡民氣和樂千里之内謳謠載路至無一物失其所者公曰斯可矣冬十月會監盗抵法沒入居室相與建議議以克合乃撤而經營之邑令及尉協力從事逺邇懽呼觀瞻動色咨嗟歎美萬口同辭人不知役日未至且畢矣門堂廊廡下逮庖圊車馬之所無不畢備赤白晶熒頓還舊觀焉且以泰安掲其榜士大夫恱之請有述焉公孺曰嘗觀易之序卦有曰履而泰然後安夫行道之勞苦方祈寒暑雨之逼乃獲廬舎候館之適安而無遽泰而能通其利顧不博哉昔晋文公俾圬人乃以時塓館室故能主盟諸侯單㐮公假道於陳司里不授國無寄寓然後知陳之將亡唐大厯中邦畿之内必命御史以為之使其重如此何者成周之制建官為重賔至如歸此大小所以懐愛也今也復故於十七年之後因材之可取從人之所欲無妨農費財之事其亦合周官之制矣故紀其實神秀樓記陳耆卿天下事有蹔而忘有久而不置有大而故闇有細而新葢繋其人爾淳熈二載丞相趙公忠定自太史守台台城堞素完中更鬰攸半不治樓亦隨之公至緩繕修急撫養未㡬里安其政而城之役始興城九門各有樓鼎新者四而神秀獨南峙更雄麗焉乃集僚佐落成且詩其事余記齒未齔見人人誦公詩以為公去幸詩存詩存樓亦存也然詩存無盡而樓存有壞矣葢近一甲子公之孫必愿以綸邸行侯事其政實似公遂新公樓而賡公詩落成公律人曰侯之詩又似公矣而樓更䧺麗於公侯去幸詩存詩可無盡而樓又可無壞也噫盛哉按神秀語本興公獨指言山爾然有山之神秀有人物之神秀山之神秀一州之潤也人物之神秀四海之潤也公去台二十稔實秉大政定大䇿勲在宗社徳在堪輿雖竟逐烟瘴以𠖇而終隨日月而耀葢四海共之矣夫一州固四海之細一樓又一州之細細而久可忘矣而民誦之不置焉又久冝故闇矣而侯治之復新焉非繫其人歟則登今樓想昔景侯固百年不老公亦千古如在徳侯愈甚則思公愈深誦公詩未休而誦侯詩又繼之矣是使此樓常新也誦之者愈不置也不論其細與久也信繋其人也否則崇臺傑閣穹亭危榭屋角拄河漢簷牙掛星斗非無䧺麗過此樓者而存則嗟怨去則詆譏見其子孫則憤激若是者蹔猶不可而况可久邪其能使誦之不置而與之常新耶予為此文非獨以書有功抑以風世之墮而無立志者鎮安廟新建景福閣記姜容自鄭子産祈於四墉而城郭之祀尚矣鎮安廟者台州城祠也按郡志神屈氏禦災捍患功烈顯著皇朝屢加褒寵前守齊侯碩徇邦人之請裒神靈異轉而上聞綸命繼頒王爵加賁既新正殿増禰室創寢宫廟像顯設矣然地據大固山之東北面勢髙峭棟桷騰突氣象呈露乏渾函藴蓄之意於是議建閣以翼蔽之經始於癸未仲春之六日郡出緍粟倡於先衆輸財力和於後日南至基斯築築斯架而齊侯庾節上會稽矣今守王侯挺始至謂兹役也久未就緒懼風剥雨摧將毁前功而重後費亟捐錢發廪架斯覆覆斯塈以甲申仲夏二日落成之為屋上下八楹左右十有八楹瓌麗宏敞稱其為神明之居扁曰景福夫聦明正直神之徳也福善禍惡神之職也能秉是徳專是職則人懐喜福懼禍之心始不敢肆其無忌憚之惡將力為善而不懈今閣以福名豈獨徼福於神哉葢自神宅於此凡雨暘之禱猶鼓應枹冦攘之害如晛消雪時禬嵗禳公祈私請無不倚以為命福是邦者至矣命名之義庸無紀實於前而祈恵於後乎然古之王天下者出命令主人神明則職之人幽則職之神各盡其職無相黷也然後幽明以順而神人以龢今神既有徳於台而二侯接武鎮臨政平訟理民安樂之所謂各盡其職交福此邦者也顧乃獨歸其福於神而因欲永其福於民視子産無愧矣自今而後邦人可不思所以體侯之意荅神之貺力於善而不懈也哉是嵗中秋日記台州城隍封誥敕台州鎮安廟顯祐通應靈恵侯神生有竒質沒為貴神至今台嶺之人想見玉溪之蹟與母偕隠既著一時之令名於民有功宜應千載之命祀兹躋登於顯號以慰荅於輿言服我明恩振於靈施可特封顯祐通應靈恵昭貺侯奉敕如右牒到奉行乾道四年三月二十日下尚書右僕射同中書門下平章事芾㕘知政事俊卿中書舎人邁清平閣記黄閣客有蹔釋塵俗㳺乎郡治彷徉四顧有閣翬飛上冠新亭下臨清池可以觀政可以燕賔可以賞心而娱情問其閣則曰郡侯黄公之所築也既成而名掲以清平取梁太守蕭洽宏禰為政之㫖問其名則曰㕘政賀公之所命也既命而書彩題粲粲龍鳳飛躍映帯雲楣問其書則曰户侍錢公之所筆也㳺覽既周喟然嘆曰郡侯之政見賞於賢士大夫如是歸而訪諸庠序則士者歌於學採之田里則農者歌於野熈熈油油萬口一舌麥秀之岐然桑葉之沃然多稼斯積京然坻然則又躍然而喜曰郡侯之政不惟賢士大夫詠之邦人皆誦之泮宫既飭取其餘材於臺於地民弗煩也財弗殫也美具而名益傳也台自吴為郡地饒海陸古者火畊水耨其民不過食魚稲業樵獵無他事也江左以來為政者或簡約或清㢘或撫綏而安緝宏禰之在當時又其傑然考之圖志風采可想見已宋興二百餘年車駕幸錢塘而台為之輔生齒日滋官府日冗江山風物古今十百循良輩出磊磊相望然斯民習沿之久逐末而忘本者衆被甲荷戈出沒乎鹺茗之塲紛如也胥吏持文書索租賦囂號於細民之門者容或有之牒素號為繁矣黄公下車期年於茲約已以清與民以簡凡政之蠧民者一切務去凌者抑弱者扶法有所當宥則釋之而不疑刑有不得已則終持之以恕山澤之禁不敢弛不以矯俗而人自遷於善軍國之須不敢後不以强民而人樂輸於上雖更多故環境内外曽無鷄鳴犬吠之驚吾又知郡侯之政不惟邦人誦之上而朝列且將以不擾聞邉陲向清國歩向平登斯閣也挹清風之徐來瞰平波之不興左顧君子右盼静鎮朋儔儷美豈直登玉霄上參雲為極目之榮觀而已哉大書特書不一書以為我朝牧伯得人之慶子墨客卿之職也公名章字仲微伯仲第一流人居朝者聳風烈治郡者藹聲名一門之懿以併列之云分繡閣記洪适浙河以東層岡峭岑盤深複陸出會稽道天姥百有餘里財得夷曠之地十有五頃以為天台郡郡踐山作郛而餘麓及屹立之峯廢不可廬者亦十一二故官寺民區鮮鉅麗之所十數年中監州始有以員外置者僑寓城之巽隅距黄堂七百歩而贏其職業之商讞僚類之謁請吏抱文書袂屬囂闤隘谿間舉不以為便乃徙幕曹之舍為今所居與正貟相東西焉然規恢下窄榮奥埃墨無復髙明塏爽之觀獨東偏有地斗大藂榛委甓蚓虺所潜前沿後仍指為棄壤則薅刜輦治培基建閣以夏四日課材閲月而斤斧論功其髙四尋衡袤卄有七尺南北不及者九之一羣山縈環垂光獻狀可以分繡名推去冗牘登臨領略則巖姿之四時烟霏雲采之隠見咸與意會舉杯屬客則琴歌奕思恢乎其有樂地閣之下對植美竹以清閟目其堂後穿小池可容蓱藻則又為舞猗之亭或曰人生天地間以百年為須臾况宦㳺弗常席甫煖而趣代今子來旬嵗矣又如是而去何以兹閣為語之曰人能無以一生為寄則澡濯自强期與前英聫横能無以一官為不久則黾勉盡瘁必有以美其政子年少質下若乘鴈雙鳬雖去來無係於邦人然吾身朝夕於斯抑欲自適耳紹興十六年五月七日記後卄四年壻永嘉薛紹以左從事郎為郡推官得是閣而新之請昜舊扁故又重刻此碑玉霄亭柱記尤袤台州南西北三面逼山獨東望諸峯差逺雲烟空濛外際溟海蓬莱方丈想見其處舊有小亭在子城之上紹興丁卯南豐曽使君谹父改創更名玉霄距今三十年摧敗傾欹岌業欲壓其下昔有茂林脩竹今皆剪伐錯為民溷圊羅列汚穢喧囂㳺者歎息余乃披剃蠲疏載芟載除四為繚墻以限外塗下建石柱上跨飛閣出亭之外又有六尺凡楹棟榱桷之朽撓疊瓴級甓之闕折丹黄粉漆之陊剥皆易而新之方連周阹可倚可眺晨揖灝氣夕延素月山川城郭盡在几席之下凭欄四望疊嶂環繞手揮絲桐目送飛鴻飄飄乎如乗雲御風身在物表州之宴㳺於是為勝乃刻亭柱以紀重建萬壑風煙亭記陳觀漢置永寧跨温台二州今郡城鴈蕩在其南天台在其北奇恠神秀崒嵂勝絶而郡適當二名山之間相距各百里不可以隄封自限也官舍負大固山余舊聞有亭曰萬壑風烟得登臨之勝暨來丞郡公退尋訪即斯亭已供前人薪㸑故基埋沒榛草矣乃芟薙鉏剔夷髙増卑累石甃磚敞為一堂基闢於新名承其舊於是俯仰顧瞻連岡疊障羅列如翠屏一水自天台來與海潮相為吐吞縈紓如縞帶復有帢幘二峯植立江濆如正人君子冠佩特立而無所附麗真足舒眺望滌塵襟銷滯思對越臨汝省此心有愧乎否也余嘗歎斯地雖僻在海隅而髙人逸士或隠於僧或託於僊尋花問雁採藥闕飛躍亭記吳子良縣治之北可里許小坡蜿蜒號環翠山旁瀕驛河舊因河為放生池狹且淤紹興二年春令黄君凖始面山鑿池又築亭負山而臨池名之曰飛躍有過而笑曰飛自飛也天何力焉躍自躍也淵何力焉天與淵無所用力而人力烏乎施人力無所施而奚以亭為君曰不然飛自飛也躍自躍也天與淵固無所用力也而纓繳墜峻銜鉤出深天與淵亦無所用力也充是類也以往物之相靡擾擾無窮也則如之何是故天與淵無所用力而寄力於人人豈他有所謂力哉豈有加於天與淵哉因其飛而遂其飛因其躍而遂其躍充是類也以往物之相刄相靡釋然休澹然忘悠然逝而已矣故曰好生之徳有好之者又曰贊天地之化育有贊之者肆我皇宋循唐舊規所在縣州池用無廢生同一性性同一機温乎谷風而跂棲倐焉飛浩乎平波而潜泳倐焉躍是非有以使之亦非無以使之孰為其天孰為其淵是為聖人能輔萬物之自然吾莅兹邑上奉帝命其敢弗䖍以宣厚恩以祝夀嘏名亭適稱而又奚疑焉余聞而是之未幾君求記因著其問荅語置亭中岸幘亭記沈震建炎改元秋震自姑蘇跨海漲畧曹娥道出鄞江走玉溪登令君之亭讀其榜曰岸幘竊三復之不領以問令君令君矍然曰夫主簿王漻之為此也他日以職事行属部震實與從私竊訪之父老皆曰吾令君始來之一年􅀈皷抵几搢版磨丹凡事之髖髀器之苦窳禾之蟊蠈羊之敗羣豪里之子弟嵗時不識爼豆既一一如榘矱乃慨然傷兹亭之將圯因其舊稍加撑柱以就塗堊有簿公者曳杖踵門而詫曰昔卞延之不受令長之裁嘗脫幘投地曰我所以屈卿者正此耳今吾觀令君行古之道攻竽以瑟售文以武幸不見罵於官長擯斥於督郵而瘦馬一芻奴僕一食鼻間栩栩然用心獨奈何詩云優哉㳺哉聊以卒嵗請因其亭以岸幘榜之盖不侈也震聞之而歎曰夫物之廢興固自有定雖造物者不能加意今兹亭之就圯而復新會令君岸幘其上又有賢佐吏為之贊助是可書也今令君法當滿秩將奪邑人之意以去後之登斯亭者嘗試矯首而望西有華頂之流春可以灌南有玉溪之潭旱可以澤青珠白嶠下瞰乎東溟赤柱鴈蒼西矗乎桐栢攬形勢之吐吞想前人之遺䇿庶幾尋嘉木之傳以無忘角弓之詩也令君為魏賁盖平江人云梁源蟠松亭記王藻於古有挺特負材離羣獨立偃然而傲世者余得而聞矣今乃寤寐之莫能彷彿則於梁源之松知敬愛焉梁源於寧海為會山由邑右趨三里而近其奥或得遺劔器者相傳蕭梁宣帝昔所避地山由以名也其峭然秀發為錦繡峯下為精廬剏唐武徳嵗旁夾徑連抱者萬松此其一也於徑以逹奥皆為勝覧而是松其尤焉去松􅂾歩為驛道鞭轂趨競日相挨摩有聞山之高而弗克窮者惟近則於松無不即焉既必充然以為極瓌詭之觀問其得失適與余會令君桐廬方公始度其旁為亭提提桷榱左右以翼顧鄉先學皆宦㳺靡居也屬予記之辭弗獲得以名問焉則命松以蟠亭則松名也余辴然曰此余夙焉求得乎松而未能者又奚為言夫曲直木性也惟松則不以産植滋養之異莫不絶苯䔿參青𠖇是顧以蟠取之然曲者折而不剉其直伏者踞焉不奪其操低囘尋仭兀硉未降雲披水滙倐亘畆陌扶輿矯折纎末具態皆將逺舉横騖乎無際畔也眎夫錚焉競立闖焉相髙者不以末乎聞之古曰龍未之升為蟠取形若義斯得兼矣苟徒曰蜿蜒其資而不戾乎近觀容與其材而適逺乎世用有勵志操者將夷而艾之踣而拜之於亭何有哉惟斯邑三薄鴻寖西北紫翠萬馬相奔則山之原剡厯天台來者盖至此則仰顧屹若遏不進伏為夷壌岡巒蒙茸繚如掩抱囘溪沄沄萬折乃東盖其勢宅而深氣雄而廓斯松是鍾而豈徒哉惟天之和惟地之英山川炳靈物盈其間各有得焉惟萃其美者則必抗焉自異而天地山川之相與無窮者其發越則未始既也使是松得獨當奇則余懼焉孰從是而得大觀者風雲月露不足尚也他時雷電晦𠖇有抱膝諷吟踞坐而捫蝨相與問松斯亭者毋詰其所從來姑以斯名余語訪焉將有異聞不可以不告也公名懋烈字仲勲由學省擢髙第綜理淵通賢令君也事無小必勇以集大者將次第舉是亭非以夸也力其事者山之僧法雨云赤城集巻十一
