body:
  text: 赤城集巻十宋林表民編浙東提舉葉侯生祠記王象祖紹定二年台郡夏旱秋潦九月乙丑朔復雨丙寅加驟丁卯天台仙居水自西來海自南溢俱會於城下防者不戒襲朝天門大翻栝蒼門城以入雜决崇龢門側城而出平地髙丈有七尺死人民踰二萬凡物之蔽江塞港入於海者三日癸酉前邦君今本路倉使葉公聞變馳來朝廷以公得台民心因命澹天災以續民命至則陵谷反易城市為沙礫之墟亡者疊腐存者改形為之大戚迺賂貪夫以收遺骸募卒伍以出途巷嚴冥録以靖寃妖籍户口頒錢米助修築弛徴𣙜閣租賦以請命求利害以盡人言問疾苦以通下情日以所見奏所未聞且乞大賜予以造一邦會趙守得祠併以郡属公事顓言益切先民而慮徯民而發亟請不倦得㫖征𣙜予一年凡官錢皆如之秋租减其七眀年夏賦損其半須錢米以賑䘏城築者合緡斛幾百萬初倉廪蕩於波濤遺禾腐於泥潦人心惶怖公移粟於近告糶於逺勸啇賈通有無憂在不繼及聖澤溥博憂在奉行内選郡僚外求寓公寓公各自擇其鄉之堪其事者并書吏省文書災傷以輕重為差州郭重於諸縣臨海重於天台仙居天台仙居重於寧海黄巖重者数倍輕者必稱必均各競於善而恵無不實日有粥月有給疾病有藥死亡有棺癃惸獨孩㓜者有養始於季秋畢於季夏台郡無前聞也水先壊門遂加堅為深結深為洞門三其限以受版石穴其防以為限多門多罅水多衝栝蒼故塞栝蒼門栝蒼無罅水必犇豐泰併塞豐泰門患江之齧外為長堤以護城足患水之衝内為髙臺以助城力城崇舊二尺厚舊三尺埋深以固址開疊以廣基器利材良土宻工練展民居除惡壌暮穴其築以受水詰朝水不耗方止築三分其城新築者一補築者一餘環而髙厚甃甓之如一也矗然偉冠可並邉城又通利河渠疏整溝閘堅闢裏城修郡庠復賔館新浮梁廣養濟作䧺樓於臺上以壓江勢存民立邦盡能事矣而志慮已周猶懼未徧民情大感尚憂不滿哀矜惻怛常若不足此情此念天實臨之邦人豈無人心哉嵗既告登功又告成起妙勝院之廢而闢其堂肖公徳容飲食必祝焉妙勝朝天門之通衢也於水之入表功之成也嗟夫天豈無變頼其生賢天将示變必先用賢先水一年民徳公甚聞水之日公急民憂天意人謀豈蹔合哉變之方殷除骸盡五日之令催科立一月之期苛暴不念其昬墊而殘羸慰安者恃公一身爾事之未定疫亡枕藉蠶麥大荒訛言足以興攘敓而彊梁妥息者感公一心爾茫茫垂盡駸駸甦醒匪身奚子匪子奚孫身不可忘子孫尚可忘乎又有大者水患自慶厯至今㡬二百年而冄見天無數則已天果有數則公之為利於後者豈止今哉慶厯之築至龢始定宣龢方冦之變其徒顛沛於此城者至龢之築也聖人不畏多難公之為備於後者豈止水哉齊桓存亡風有木𤓰魯僖復宇頌存閟宫豐功盛心感嘆不足不足心聲之成音也公名棠字次魏僊㳺人乾道丞相正簡公之孫歌曰天生賢哲兮捄災扶危𣺌渺千里兮誰其恵來存亡續絶兮父母提攜何以報之兮卜此招提巾山崇崇公名兮穹隆西江溶溶公夀兮無窮昔元章簡公兮慶厯當此公聿似之歸輔天子公皇祖正簡公兮乾道秉政公其繩之再顯紹定自今嵗時兮公顔必紅一笑語人兮台民報功報功永存台民子孫子孫有知視此豐碑蒼山廟記宋諴蒼山在州西纔十五里水陸之途通焉連属之勢亘于西南隠隠崇崇臻此而止自郡城暨于山嘉樹脩竹映夾道側聫聫不絶如在翠帳間行㳺是山若造非常之境羣峯疊秀烟樹羅碧清猿好鳥呌嘯其間實神僊之所居信東嶽之佐命山之南又有澄潭周環百餘歩空闊沉碧逗而不窮旁倚峻巖穴通溟漲峭壁削以直聳清泉貫潭承其泉而龍是宅每天将晦必雲物鬱乎其上或清旭晚照輝映相鮮嵐障千里水光一帶烟靄蒙羃如列畫屏峻彼西郊作鎮茲土會昌四年冬梁國喬公自尚書郎來守是邦每景物澄霽升髙而望茲山覺峰巒之有異公曰是山也得不司於吾土乎明年夏将旱公懼嵗之不登憂民之歉食雖土龍徙市啓千百神曽未果應公曰余為之長郡之旱民之灾是亦警余之或未勤乃召易者而筮之得山澤損之卦筮者曰艮上兊下為損損而後益乃豐嵗之象艮為山兊為澤為西方雲澤之氣果應為西得不為蒼山之兆乎公遂躬禱是山請以民之災災已誡告明明山不閟靈車未及旋索澤如懸槁苗亘青若雲布川是嵗果登乃自茲山厥後隂陽其或乖度俾吏致告靡不響荅公又曰禮云能禦大災則祀之水旱者民之災也是山果能興布雲澤救民之災得不廟而祀歟遂命工人爰構廟室于山之陽六年春三月廟告成乃户乃堂飛軒翼張粉繢糊頳東西其廊像設無譁威容肅莊儼若舊制候公而昌秋七月公大備牲牢羅絲竹于廟庭之下躬自薦拜以荅神祉因命鄉貢進士廣平宋諴記其事以誌於廟乃重為贊曰懿彼蒼山吐納隂氣興隆雲澤救民之瘁實自我公誠明期至以䖍以禱引過歸已𤣥鍳周明布膏于地嵗既豐盈惟公之致爰立廟堂示民以依春秋薦拜水旱云祈有舉無廢在禮而知靡煩靡凟無逾我儀臨海縣靈康廟碑石公孺建炎三年冬金人陷錢塘會稽守外附㳺騎侵鄞於是浙東之門不啓明年春鄞潰臨海介于兩郡之間封畛相際居人震恐逃散山谷時管内安撫使鼂公統州事甫浹旬乃召父老之習事者與夫土豪之驍勇者升堂宴犒宣示祖宗累世恵安之意諮訪險易及其備豫詞情慷慨聞者感涕賈勇百倍人自戰守鎧仗犀利武藝精敏絶壁巨塹如在天上公曰人事至矣不禋於神神弗福也嘗聞東晋苻秦之敗逺視八公山草木皆成人形聞風聲鶴唳皆如晋師之至神所助也天台神僊所宅是烏得無靈響哉郡人相與言曰宣和辛丑之盗陳師城下㓗其牲酒造靈順之祠祈焉卜僣不吉乃焚其廟詰朝蓐食盡銳攻北城仰顧守陴者皆冠劔偉人光景駭異俄有飛矢中其酋領羣盗觧去一郡以安曽不踰時新廟告成詔加顯佑之號神之功也公明徳以薦馨香神其吐之乎公乃齋戒備禮而禱之夜夢神人具衮冕通刺請謁且言闔境無虞之意公異之以邦人之必信也宣示於衆故逃者復還散者復集千里晏然恃以無恐及大駕巡幸永嘉公復䖍禱焉而波臣受職神舟順濟自冬迄春無頓㦸遺鏃之患金人退師矣天子嘉之比大駕北還賜公對良久天語温厚慰撫周悉進公直顯謨閣而王亦加廣恵之號報靈貺也既而夏苦旱暵秋復霖潦公至誠惻怛每為之請禱禱之未嘗不旋踵而應由是穡事告成人知樂業矣一日郡人謂公孺曰敵騎慿陵深入明越衣冠士庶戕殺殆盡而吾人安於袵席颶風怒號駭浪磅礴魚龍出沒百恠呈露而吾天子揚颿徃來如出軌道夏秋水旱米若珠琲一糓不登將墮溝壑而吾邦倉庾告盈是三者公之惠也神之賜也有一於此猶當大書之况兼盡其美而噤無一辭何以侈大天子之褒寵乎於是公孺稽首為之序次曰惟王趙氏諱炳字公阿東陽人後漢與閩人徐登遇於烏傷谿上各試其術以療疾登死東入章安或挾鼎升屋而㸑或張盖絶流而渡逺近服其神遭章安令之害見於方術傳郡人爼豆之立祠白鶴山下元豐中始建靈康廟額俄封仁濟侯顯仁公靈順王宣和中加號顕佑今天子復加廣恵凡三號焉厯代血食今千載矣先是郡大饑有詣閩廣告其賈客曰吾趙氏台之富人也台貴糴倘運而往将稇載而歸台吾宅也不閲旬海舶麇至訪趙氏乃王也元章簡公刺州事未之信夏旱甚禱於祠而鑰之約曰三日不雨則毁廟五日不雨毁像登舟風雨遽集高下告足公謝焉洪光寺曳殿材阻隘不得進其徒禱之谿谷暴溢一夕自至紹聖中増修祠宇工人度材未施斤斧忽空中有若引鋸者郡守檻其木於屋壁其靈響㮣如此公孺嘗謂昔之詳以事神者備犧牲嚴器幣求於杳𠖇之間荒唐恍惚疑不可得及積誠之感假則若鑑之取水燧之取火俄頃而有合耿恭拜井而溢裴行儉致水泉之異信不誣也世之名山大川聖賢遺烈尚多有之或闕升其堂户重足股慄稍近䙝易必致禍責而王之視此民也有若赤子仁而不怒人之事神有若父母愛而益恭故動息出入飲食疾痛每祈焉吉㓙悔吝不待布蓍灼龜而後信也有能使人遷善逺辠以輔朝廷風化之美顧不韙哉然王能使後世事之如生而不能捄一日之患能全五邑之生聚而不保其像設豈不以人之所利為先已之所謂化而不忘者邪鼂公名公為字子莫濟北鼎族元祐文伯龍閣之嗣公以文章翰墨名世而能精於致治成民而事神靈貺昭明合若符契是宜書之傳無窮也白鶴山勢竒偉真一郡之勝水浮陸轉將事絡繹簫鼓之聲不絶永康故有廟奉嘗不減臨海而行宫所及徧於逺邇矣故作詩系之俾歌以薦獻云山嶄絶兮蒼蒼江水深兮湯湯儼悶宇兮山陽古帝命兮靈康感清夢於良宵距强敵兮保疆衞神舟兮滄溟斥蛟龍兮蟄藏雨暘適兮黍稌盈生繁祉兮安且寧捧玉書兮下西清加顯號兮昭王靈椒有馨兮橘柚埀羌迎神兮江之湄神之往兮鶴與飛神之來兮鶴旋歸管嘒嘒兮鼓鼕鼕自今以始兮嵗其豐報神貺兮歌鼂公恵此土兮無終窮後梁宣帝祠記王藝余宦逰寧川寧川地廣山連栝蒼水通閩中得無名山大川神靈聖迹者乎詢諸父老則龍湫有九獨玉溪刋石備陳本末次及梁王詧祀凡至亢旱天不我雨邑令率其民吏躬祭祠下誠心祈禱未嘗不應時雨降神之靈神之聖可謂至矣稽諸祀典桐栢之山龍潭三所畧而不詳俚傳無據求之史籍梁昭明太子有子五人曰歡曰譽曰詧曰􅩼曰鍳帝昭明第三子也昭明薨梁武帝欲立歡為太子以國難未平不可以傳少主乃封昭明諸子悉以為王圖慰其心詧遂進位岳陽王為會稽太守詧以兄弟不得嗣居常不平又以梁武朝多秕政有敗亡之漸乃蓄積寳貨招致賔客歸附者數千人大同中除雍州刺史梁元帝調兵於湘州刺史河東王譽張績構譽與詧於元帝譽惡張績之䜛而拒命元帝遣世子方等王僧辨杜㓜安討譽譽軍敗剋湘州斬譽詧聞而大怒舉兵伐江寧稱藩西魏魏因以封之是為梁王詧會魏軍於㐮陽㧞廣平斬杜巚岸等并其母妻子女盡誅諸杜宗族㓜弱皆下蠶室發其墳墓燒其骸骨灰而揚之并以為漆䯛葢復剋譽之讎及建業平杜崱兄弟發安寧陵焚之以報漆䯛之酷元帝不之罪及魏軍攻元帝元帝臨陣督戰元帝見執如王之營甚見詰辱王遣傅凖進土囊害元帝魏乃立詧國號後梁建元大定北齊遣上黨王高渙送蕭明來主梁嗣陳覇先殺王僧辨黜蕭明而奉恭帝詧以不用尹徳毅之言而失襄陽之地恥其不振常懐憂憤著愍時賦以見其志八年病背疽而殂諡曰宣帝世傳帝避侯景之難隠於此地元帝已平侯景元帝後復見執於帝知帝非為侯景所逐余疑其為政會稽有徳及物人為祠之迄今恵澤其施博哉去世既逺未可輕論唐武徳中旁興大刹目曰資福我宋大中祥符始賜崇福之號景祐中邑令袁熈載字良輔謂帝性不茹葷不飲酒殺牲以祭不類余聞昭明身衣浣衣食不重肉未嘗聞帝不茹葷苟血食而代以素饌殆去餼羊之類歟謂不飲酒則亦可以去奠茅好禮者未然因民而有旱乾之憂當順人情以致時雨徒事變更善守者或誚予豈好辯因其同仕洎諸邑老強余再四故濫閲簡䇿拾諸蹤跡叙其事寧人得帝之跡仰帝之心固當益重餘俟好古博雅君子得究其詳唐臨淮王李武穆廟碑舒奎天寳末安禄山反范陽陷兩京明皇流離於蜀宇内㡬非唐有矣非有而卒復有葢王與郭汾陽之功也王之功紀金劵藏太廟圖凌烟閣載諸史册霞電烱照而金翠補冩也迨於今蓑童笠䜿皆知有王云嗚呼然孰知寧海閬風寂寞之野有王之祠存焉按之史册求之圖志寳應初袁晁反台州盡有浙東地王遣其將張伯議李臯討平之此土之民被王徳立祠祀王迨於今火盗雨暘螟蟊疾厲有禳有祝焉嗚呼王之食於此土非忝也民之報王盍忠信矣乎且王嘗㧞常山㧞趙㧞懐而與夫景城河間信都清河平原博平皆附焉捍饒陽捍太原捍河陽以至於申光徐泗宋許兖鄆㐮陽皆平焉然則王之功滿於河淮京洛之間平浙其細也戮晁則易也何獨此土之民被其徳哉感之於平浙也懐之以戮晁也毋以小王乎嗚呼徳之深淺不以其功之小大也功之小大不以其惠之淺深也使晁蔓不已寧能勿為禄山耶則此土之民被其徳固無異於淮河京洛之間也然廟始創嵗月無文字可繹其幾廢幾興邪䂓製像設服飾若野老踞居一室座下伏文獸其何根何證邪屋有低塌風掀雨漉破壁四面見山星斗零落綻瓦中行遂貫穿祠後神露其背過者憫然惻怛也余聞王之御軍行師號令明一麾幟壁壘氣色皆光焰不應憔悴若是想夫功成身危程魚交毁徬徨慘澹其意態亦如是乎嵗比不登衆讙曰王病民乎民病王也於是富者以田産之髙下出財貧者以口數之衆寡助力典其役者以財厚薄力小大取材始於淳祐六年正月而成於明年十月九日過者肅然驚異矣夫圖牒之所載忠豪之遺蹟此以教長民者所當興奮也而鄉人之為是也孰紏而孰率之王之徳於此土也深又能神而明之故合而成焉者出於忠信也嗚呼王之功紀金劵藏太廟圖凌烟閣今其物為飛花為聚沬烟空月寒故迹何在曽不如豚蹄斗酒之肅慤也其被於河淮京洛之間者今且數經兵燹鞠為丘墟蓬蒿皆長大成林藪未必有數椽焉簡㓗可依也然則廟之存於此土豈不幸歟嗚呼王之功崇烈偉夫豈係於廟之有無哉然廟之有無民之忠信厚薄觀焉鄉人所以盡其情也然則廟之新於今豈不韙歟王之名氏不待書也當時與郭令公齊名者誰歟董將軍廟記林師㸃郡之東湖南百歩有廟巋然抵城按圖經云唐浙東觀察使董將軍祠也世傳吳越錢氏有國時立名在祀典嵗久屢圮葺於邦人至淳熈六年父老始請於州即其舊址東嚮易而新之廟故有石記尾獨載朝奉大夫知軍州李春卿立其置廟之因與所置之人若年月皆逸而不傳師㸃嘗考於圖記訪於耆舊則神有靈徳且懼其將就曖沒遂以合載於文使得以著於不朽焉按皇宋熈寧中始開東湖欲毁其廟時衙校左良玉者實監其役良玉無子其妻一夕夢神告曰能存吾廟當以判官為汝子妻寤以語良玉廟遂不毁未㡬果得子狀肖廟之判官是子㓜年頭有瘡疾久之不愈家人徃廟禱焉見屋漏滴損判官之首亟修之而兒瘡立愈大觀二年登進士第官至湖州别駕名譽字與言即其子也暨淳熈間郡饑甚有閩商支太輩泛米海外俄見一人身衣白衫方巾皂履美貌長髯語言異常引船相嚮揖曰吾台州董主人也家東湖上門植雙檜台米價昂特來相招因命於􅊑内取酒一小壺分斟與支啇以下遍飲飲盡醉米入台港將次州約曰吾先徃議價汝抵岸當來言訖船忽不見商至尋訪東湖竟無所謂董主人者有一老父語此但有董將軍爾引與偕往見廟前二檜入覩其像乃嚮之招船人也羣商相視驚異且祭羅拜感泣而去聲傳别境客來競凑舳艫相銜邦人乃粒繄神之力也夫有恵濟民者冝饗有靈應物者宜書神自吳越置祠而肆祀逮今是必嘗有功於民者而此二事尤為靈異邦人徳神之賜且恨未有以記之者師㸃既為之記又系之以詞使歌以祀神其詞曰神生而異殁有靈廟食此邦何英明人受其賜於𠖇𠖇是崇是信靡不承於粲春敷與秋榮山果野蔌含新青牲酒肅戒羞潔馨酌獻雖微意益精湖光瀰瀰風泠泠惟神此宅嚴幽扃永濟我民年糓登報饗不匱千百齡夀台樓賦王象祖倉使寳謨葉公再造台邦之明年作危樓於舊栝蒼之上仰考天文扁以夀台欲此城與台星長久為民之意無窮也又明年紹定己卯五月丁亥與賔彦落之郡人王象祖與焉賦曰偉天台之宅國兮聚神秀於山川環千岑而拱揖兮會三江之蜿蜒即長虹之霞采兮罩蒼龍之雲烟通滄溟之潮汐兮亦有時而奔潰􅄓風作而南溢兮潢潦湊而西滙駭聞見於恍惚兮忙運棹於不戒襲其虚而頽其弊兮擣崇墉如灘瀬帝哀民而求其欲兮欲莫如舊之求今赤子而昔父母兮奪襁褓於横流孰宜先而尚敏兮孰可後而遲留兼保養於内外兮合二急而交修侈舊雉於加倍兮作新意於危楼嗟洪濤之懐㐮兮更二百載而冄造棄人事於不謀兮委天數於有考使知及而仁守兮何千齡之不可保瞻昊天之靡逺兮彼昭晣者何星非上台之主夀兮亦豈不福乎此城挿穹蒼而上引兮光下屬而熒熒鎮流峙於高卑兮安反側於常經曩人物之顛錯兮今萬壑之順序曷陵谷之變遷兮有既平之水土道待人而後行兮天亦可求其故處功成而不自足兮參泰階之軌度噫變化之難諶兮嘉剥復之有常娱賔彦於觴豆兮易勞佚於弛張放吾目於萬有兮収吾耳於宫商駢城陴之士女兮同其樂於未央驚吾土之有此兮綴履舄之末光詠黄樓騒雅兮争日星之煒煌齊彭城於丹丘兮美哲人之相望匪登髙之能賦兮鋪盛徳於難陳彼此一時兮尚懐逺於蘇與秦赤城集巻十
