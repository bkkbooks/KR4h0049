body:
  text: 赤城集巻十七宋林民表編委羽居士集序黄裳赤城之南有左氏子焉不出仕常以詩自適慕王維杜甫之遺風甚嚴而有法自言毎以意理趣觀古今詩莫能出此三字然考子之詩旁以意明物不以物縶其意覽者宛轉而思之卒歸乎所賦使人意虚而志逺此亦得詩之要者耶然而援甫之詩離三字以指其體未能遂屈吾論故為之説曰意者理之所寓趣者志之所向大抵詩人之作感物以明志運才而遣意四者相須而後備特其所好者異其所造者有深淺逺近爾由是而之焉乃各有趣其為趣也或之乎雅正平淡優㳺髙逺或之乎清新俊逸豪華險怪各不同也然而尚理與意物為之感才為之用不役於才不累於物以人意抱天理其為詩也來自夷曠惑忽之間可以動天地感鬼神與三代風雅頌並列而同奏此其至也才出人性之良能使之有約以文至理其為詩也孰禦不然恃才以造意超中正傲平淡以作險怪瑰竒之語咀嚼少味終不足以經世惟杜甫兼數體似乎有道者然而精爽神妙氣艷三者修真之士資以為道而乃冥搜旁想散與萬物相逐於無窮與物同盡借使得名於世不過一詩人爾可勝惜哉吾聞天上有白玉京之境黄老之有道者常游乎其間仙籍焉子歸而求之上能奔逸絶塵立乎萬物之表下而有感所謂古今詩人百家之體子當肆筆而兼得之患弗為爾區區三字不足以為子道左經臣工於詩而黄公序語乃專取存三守一之事以為當學而謂盡力於詩者為不足道也經臣聞是幡然將改所習昔所留意悉棄弗吝捨枝葉而趨本根亦豈道家之所獨貴乎聞而隨喜因題其後政和癸巳夏延平陳瓘書於丹丘寳城之南余抵丹丘之三年左經臣攜黄公序見訪嘗為跋其後今又兩年矣復持以相示余讀經臣詩編有招友人之句云一别人經無數日百年能得幾多時非特詞意清逸可翫味也老於世幻逝景迅速讀此二語能無警乎序所謂使人意虚而志逺非溢言也政和乙未三月二十八日延平陳瓘題觀黄公之序則知經臣之詩六義之雋也余謫居臨海黄岩丞盛元叙録經臣所為詩數十百章示余覽之不釋於手及披黄福州序因書其後乙未三月二十五日山隂石公弼題泰山孫伯野甞見經臣避冦古律詩擊節稱嘆曰此非今人之詩也若置之杜集中孰能辨别余謂非避冦諸詩為然大抵句法皆與少陵抗衡如㑹姪一大篇自天寳以後不聞此作矣横塘許景衡云方巖王公文集序呉子良丙寅冬韓侂胄以弄權誤國誅著作郎王公居安拜左司諫抗䟽請明正憲典并陳自強郭僎竄嶺外伸雪故大府丞吕祖儉承務郎于進布衣吕祖泰之寃而褒其忠䆒極治本亂階曰如此則治否則亂分别君子小人曰此不可以再誤再誤是一侂胄死一侂胄復生亡幾何趙彦逾與諸賢同日召公言侂胄之專故相汝愚之死咎實自彦逾而可與諸賢偕來乎疏已具當路聞而勸止之弗從是夕遷左史兼崇政殿説書公直前奏臣供諌職未兩旬無故而得美遷豈非當路者以臣欲劾彦逾邪使彦逾再入臣為善人憂䟽欲明日上而今夜改他職是蹈侂冑前轍遏言路塗聖聰廢臺諌紀綱餌臣以好官而塞之口臣甚恧焉願求去退又杜門上章不朝謁於是中丞雷好友承風㫖論公越職奪一官罷而王左史之直聲撼海内矣後起家為郡守部使者㑹栁冦猖獗毒連江湖招捕久無功當路稍釋憾召權工部侍郎帥隆興付賊事公奮不辭難勉戎帥忠義白吉守懦謾厚賊之降附離賊之腹心李元礪羅世傳尋授首江西湖南次第平民家頌户祝之然忌讒復起坐廢踰十年而公老矣嗟夫慷慨而立風節談笑而成功名非具竒禀負傑氣詎能如此易易耶自古養才如養木木雖堅勁耐嵗寒要亦以培植而成以摧拉而毁乾淳間培植而成者衆嘉定後摧拉而毁者多如公之瑰磊卓特當其拜司諌帥隆興時儻不以忌讒去得直遂而迅上所樹立豈在乾淳人物之下哉此可為浩歎者也公之子疇集遺文十巻屬余序余讀之明白夷暢絶類其胷襟詩尤圓妥曠逺嘗有句云髙下水痕元自定後先花信不須催公之於出處去就此二語可以占矣雪巢小集序尤袤余友林憲景思呉興人年少時卓犖有大志賀㕘政子忱竒其才以孫女妻之臨終復與田數百斛謝不取賀既亡挈其拏居蕭寺屢瀕於餒而不悔讀書著文不改其樂頃嘗隨賀使北同行中後有鼎貴者㑹赴大比試來都城因游西湖上新貴人於馬上覘識之使人傳言請見亟遁去其操守如此獨喜哦詩初不鍜鍊而落筆立就渾然天成無一語蹈襲如柔櫓晚潮上寒燈深樹中汲水延晚花推窻數新竹中夜鵞鶩喧誰家海舡上唐人之精於詩者不是過一時名流皆願交之若徐敦立芮國器莫子及毛平仲相與為莫逆其後諸公彫喪畧盡君亦連蹇不偶至無屋可居無田可耕其貧益甚其節益固而其詩益工嗚呼士患無才而有才者困窮類若此豈發造化之秘天殆惡此耶抑嘗謂富與貴人之所可得而才者天之所甚靳景思取天之所甚靳者多則不能兼人之所可得固宜然則才者寔致窮之具人何用有此而天亦何用靳此此未易以理曉也君所居室名曰雪巢嘗屬余記之故其詩若干篇自號雪巢小集云雪巢集後序楊萬里雪巢小集天台林憲景思之詩也梁溪先生尤延之既序之矣景思復徵余序其後景思之詩似唐人信矣延之之論也然至如羣花飛盡楊花飛楊花飛盡無可飛天空霜無影等句超出詩人準繩之外其遐不可追其卓不可跂矣使李太白在必一笑領此句也似唐人而已乎然延之深愛景思之才而深惜其窮至謂豈發造化之秘而天惡此耶又謂富貴者人之所可得而才者天之所甚靳既取所甚靳則不兼其所可得又謂才者致窮之具人何用有此而天亦何用靳此又未易以理曉者余嘗摘此語以唁景思曰子何必以才而致窮耶子何必發天之所秘而逢天之所怒耶子何必爭天之所靳而不取人之所可得者耶景思笑曰子不見唐人孟郊賈島乎郊島之窮才之所致固也然同時之士如王涯賈餗豈不富且貴哉當郊島以饑死寒死涯餗未必不憐之也及甘露之禍涯餗雖欲如郊島之饑死寒死不可得也使郊島見涯餗之禍涯餗憐郊島乎郊島憐涯餗乎未可知也子不見本朝黄秦乎魯直貶死宜州少游貶死滕州而蔡京王黼相繼為宰相貴震天下當黄秦之死王蔡必幸其死及王蔡之誅黄秦不見其誅使黄秦見其誅亦必不幸之也然黄秦不幸王蔡之誅而天下萬世幸之王蔡幸黄秦之死而天下萬世惜之然則黄秦之貧賤王蔡之富貴其䆒何如也且彼四子之富貴其得者幾何而今視之不啻如糞土而此四子之貧賤所得者如此今與日月爭光可也然則孰可願孰不可願乎亦未可知也今吾不才豈敢擬郊島黄秦而吾之窮有甚於郊島黄秦吾何幸得與郊島黄秦同其窮而不與涯餗王蔡同其達而子為我願之乎且吾與詩人同爭夫天之所靳是天之横民也同犯夫天之所惡是又天之横民也治横民者宜以横政既與詩人同為横民又欲不與詩人同受横政可乎余賀之曰子既無遺力以取所靳無懼心以犯所惡無怨言以安所致然則延之為君惜延之過也余舉延之語以唁君亦過也然君必欲専享詩人所謂才之所致者而不顧不悔以不辭造物之横政亦過也子盍持此語再見延之為余問之石屏詩集前序樓鑰唐人以詩名家者衆近時文士多而詩人少文猶可以發身詩雖甚工反成屠龍之技苟非深得其趣誰能好之黄巖戴君敏才獨能以詩自適號東臯子不肯作舉子業終窮而不悔且死一子方襁褓中語新友曰吾之病病矣而子甚幼詩遂無傳乎為之太息語不及他與世異好乃如此子既長名曰復古字式之或告以遺言收捨殘編僅存一二深切痛之遂篤意古律雪巢林監廟景思竹隠徐直院淵子皆丹丘名士俱從之游講明句法又登三山陸放翁之門而詩益進一日攜大編訪余且言吾以此傳父業然亦以此而窮求一語以書其志余答之曰夫詩能窮人或謂惟窮然後工笠澤之論李長吉玉溪生言甚悲也子惟能固窮則詩愈昌矣予之言顧何足為軒輊邪嘗聞戴安道善琴二子勃顒並受琴於父父沒所傳之聲不忍復奏乃各造新弄廣陵上息之流皆與世異其孝固可稱然似稍過果爾則琴亦當廢矣式之豈其苗裔邪而能以詩承先志殆異於此東臯子其不死矣石屏集後序呉子良石屏戴式之以詩鳴海内餘四十年所蒐獵㸃勘自周漢至今大編短什詭刻秘文遺事廋説凡可資以為詩者何啻數百千家所游厯登覽東呉浙西襄漢北淮南越凡喬嶽鉅浸靈洞珍苑空迥絶特之觀荒怪古僻之蹤可以拓詩之景助詩之竒者周遭何啻數千萬里所唱酬諗訂或道義之師或文詞之宗或勲庸之傑或表著郡邑之英或山林里巷之秀或耕釣酒俠之遺凡以詩為師友者何啻數十百人是故其詩清苦而不困於瘦豐融而不豢於俗豪傑而不役於麤閎放而不流於澷古澹而不死於枯工巧而不露於斵聞而爭傳讀而亟賞者何啻數百千篇盖嘗論詩之意義貴雅正氣象貴和平標韻貴髙逸趣味貴深逺才力貴雄渾音節貴婉暢若石屛者庶乎兼之矣豈非其搜攬於古今者博邪豈非其陶冩於山水者竒邪豈非其磨礲於師友者熟邪雖然此舊日石屏也今則不類行年七十七矣焚香觀化付斷簡於埃塵隠几閉闗等一樓於宇宙離羣絶侣對燭影為賔朋而時發於詩曠達而益工不勞思而彌中的然則詩固自性情發石屏所造詣有在言語之外者非世俗所能測也題陳夀老論孟紀䝉葉適古聖賢之㣲言先儒所共講也然皆云至二程而始明凡二程所嘗講皆曰至是止矣其宻承親領游楊尹謝之流而張吕朱氏後時同起交闡互暢厥義大宏無留藴焉竊惟數十年士之詣門請益厯階覩奥者提䇿警厲之深涵玩充溢之久固宜各有論述自名其宗而未聞與衆出之以扶翼其教何哉豈敬其師之所以覺我而謙於我之所以覺人歟天台陳耆卿生晚而又獨學奚遽筆之書然觀其簡峻捷疾㑹心切已則非熟於其統要者不能入也總括凝聚枝源派本則非博於倫類者不能推也機鑰嚴秘門藏户攝則非老於其室家者不能守也勾萌榮動春花秋實則非妙於其功用者不能化也盖數十年所未見而一日得之余甚駭焉嗟夫余雖後死而素無其質終不足以進此道矣使子及其時步趨規矩於親領宻承之間回復折旋於互暢交闡之盛不挺然異材乎不柄授之以扶翼其教乎愧余之不足進余昔之言也美子之不可及余今之言也當以余之言為掲題陳夀老文集後葉適建安中徐應陳劉爭飾詞藻見稱於時識者謂兩京餘澤由七子尚存自後文體變落雖工愈下雖嚴愈靡古道不復庶幾遂數百年元祐初黄秦晁張各擅毫墨待價而顯許之者以為古人大全賴數君復見及夫紛紜於紹述埋沒於播遷異等不越宏詞髙第僅止科舉前代遺文風流泯絶又百有餘年矣文之廢興與治消長亦豈細故哉今陳君耆卿之作馳驟羣言特立新意險不流怪巧不入浮建安元祐恍焉再覩盖未易以常情限也若夫出竒吐頴何地無材近宗歐曽逺揖秦漢未脱摸擬之習徒為陵肆之資所知不深自好已甚欲周目前之用固難矣又安能及逺乎君之為文綿涉既多培藴亦厚幅制廣而宻波游浩而平錯綜應㑹緯經勻等膏潤枯筆之後安徐窘步之末若是則薦之廟郊而王度善藏之林藪而幽願愜矣若又審其所從不求强同貴其所與毋為易得趨舍一心之信否臧百年之公則何止於建安元祐之文也君必勉之桑澤卿莫庵詩集序陳亮余平生不能詩亦莫能識其淺深髙下然嘗聞韓退之之論文曰紆餘為妍卓犖為傑黄魯直論長短句以為抑揚頓挫能揺動人心合是二者於詩其庶幾乎至於立意精穏造語平熟始不刺人眼目自餘皆不足以言詩也夫桑澤卿來客西湖為詩數百篇無一句一字刺人眼者可謂用工於斯術者矣劉牢之大小數十戰方為名將何無忌從容坐談而靈寳以為酷似其舅一戰而勝彼亦畧似之終非其真澤卿試問之渭陽李靖之兵法既盡乎骨肉之間有留則君集將議其恡矣曽使君新詞序謝伋臨海使君南豐曽侯惇字谹父以故相孫習知臺閤工為文辭年踰二十當全盛時官中都諸公貴人一口稱薦王邸戚里名勝豪俠莫不願交而谹父亦善與人交笑言靃靡各適其意名聲一日滿京師酒酣耳熱遺簮墮珥之前滑稽放肆之詞播在樂府下至流傳平康諸曲皆習歌之以是樂府尤著盖識其小者輕千金重然諾夸承平公子之豪而見其大者英妙卓絶可繼門户鍾鼎之盛此谹父異時之作也伋政和末肄業太學同舍生多能語此後十四年谹父丞大府伋丞大宗正相遇行在所叙中外契明年同出尚書省見其文詞日益多而樂府傳者少時中外多故雖官曹令休反室無私恩意皇暇乎朋友燕集之事哉及十三年歳在丙寅谹父來守臨海四方無事屡豐穰不鄙夷其民教以禮樂老者安而少者懐矣於是以少日之所自樂而與斯民共樂之變歎息愁恨之音為樂職中和之作合樂府五十一轉而上聞則安靜平易無煩苛廹急辦治於談笑之間殆將於此乎政小而行逺則髙下抑揚曲折變化人情物態莫不周知雖異世識其人矣既秩滿去郡門生故吏相與裒次屬黄巖長刻諸板將傳之又屬伋為序伋應之曰曾侯知我不能度曲嘗觴我顧其侍兒誦蘇東坡前後赤壁二賦曰聴此文也畢之何敢序侯詞則又合詞來嘗曰是亦侯之心也固辭不獲故序其自所見聞者如上篔窻續集序呉子良文有統緒有氣脈統緒植於正而綿延枝派旁出者無與也氣脈培之厚而盛大華藻外飾者無與也六籍尚矣非直以文稱而言文者輒先焉不曰統緒之端氣脈之元乎自周以降文莫盛於漢唐宋漢之文以賈馬倡接之者更生子雲孟堅其徒也唐之文以韓栁倡接之者習之持正其徒也宋東都之文以歐蘇曽倡接之者無咎無已文潛其徒也宋南渡之文以吕葉倡接之者夀老其徒也夀老少壯時逺參洙泗近探伊洛沈涵淵㣲恢拓廣大固已下視筆墨町畦矣及夫滿而出之則波浩𣺌而濤起伏麓秀鬱而峰崚嶒户管攝而樞運轉輿衛而冠冕雍容其竒也非怪其麗也非靡其宻也不亂其踈也不斷其周旋乎賈馬韓栁歐蘇曽之間疆場甚寛而步武甚的也不幸吕公不及見而葉公晚見之驚詫起立為序其所著論孟紀䝉若干巻篔窻初集若干巻以為學游謝而文晁張也至其獨得於古聖賢者中夜授垂死嘱焉而曰吾向以語吕公伯恭今以語夀老四十年矣葉公既沒篔忩之文遂巋然為世宗盖其統緒正而氣脈厚也自元祐後談理者祖程論文者宗蘇而理與文分為二吕公病其然思㑹融之故吕公之文早葩而晚實逮至葉公窮髙極深精妙卓特備天地之竒變而隻字半簡無虚設者夀老一見亦奮躍䇿而追之幾及焉然則所謂統緒正而氣脈厚者又豈直文而已余十六從篔忩二十四從葉公公亦以其嘱篔忩者嘱予也惰不復進每遐想太息之故於篔窓初集既以鋟之海陵而今復併其續集鋟之豫章使夫統緒氣脈之傳來者尚有考也赤城志序陳耆卿圖牒之傳尚矣今地隃萬里縣不登萬户亦必有成書焉矧以台為名邦且稱輔郡綿涉千歳更數百守而闕亡以詔難之歟抑因陋襲簡不暇問歟有守四人嘗勤其力於斯矣如尤公袤唐公仲友李公兼類鞅掌不克就最後黄公榮辱以命余偕陳維等纂集焉㑹黄去匆匆僅就未備也束其藁十年矣更久則非惟不備而併與僅就者失之今青社齊公碩始至欲迄就未暇踰年報政遂復以命余於是郡博士姜君容總㩁之邑大夫蔡君範以下分訂之又再嘱陳維及林表民等採益之既具余為諗沿革詰異同劑巨纎權雅俗凡意所未解者恃故老故老所不能言者恃碑刻碑刻所不能判者恃載籍載籍之内有漫漶不白者則㫁之以理而析之於人情事立之凡巻授之引㣲以存教化識典章非直為紀事設也如是者半載而書成嗟夫同是州也非可成於今不可成於昔也或曰有時爾昔歐陽公論學慨述吏道以為有司簿書之所不責者謂之不急夫豈惟學哉語以圖牒非不急之尤者耶然而莫奥於圖牒莫渫於簿書有司之所不急固君子所急也今公之為政也剖叢滌煩燭幽洞隠於有司所急者誠井井矣而於君子所急者尤惓惓焉用能以半載之間紉千歳之闕増十年之未備洗數百守之因襲成四人之勤嗟夫此豈以其時哉書成者時也所以成者公之志也其志立則時赴之矣無其志而曰需其時者吾未之聞也豈惟一圖牒為然天下事皆然赤城集巻十七
