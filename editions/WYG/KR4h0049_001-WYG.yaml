body:
  text: 赤城集巻一宋林表民編台州新城記蘓夢齡自昔天下有大菑大患民敝且死而仁人任職能禦捍之者未嘗不見於文辭也慶厯五年夏六月臨海郡大水壊郛郭殺人數千官寺民室倉帑財積一朝掃地化為塗泥後數日郡吏乃始得其遺甿於山谷間第皆相嚮號哭而莫知其所措主計田侯瑜聞之震驚亟乘傳而至籲衆慼而視之問其食則糠覈而臭腐焉問其衣則藍縷而顛倒焉問其居則草茇而漸洳焉横屍塞于衢窮盜充于郊乃喟然曰兹不可以久生矣繇是移文其鄰貿遷用度以衣食之相奠厥居躬自安輯然後民始知其可造之漸且先以章言状朝廷得章而憂盖以水不潤下之沴因以必復之責屬於外臺故所請亡不獲于時司憲王侯偕亦接迹而㑹焉乃相與言曰兹殆小康矣今可圖其大者於是始議城之俾監軍王世雍錢塘從事曽公望慮其事度髙厚攷徒庸籍糗糧訂材用將以授于有司然思夫臨之以為成命者非擇賢則莫可遂請以太常博士監新安郡彭思永權守之秘書丞定海宰馬元康為之貳已乃量功命日屬役賦文分僚職而帥焉繇西北隅以黄巖令范仲温専掌之從事趙充參綜之西南隅以臨海令李匄専掌之從事蘇夢齡參綜之東南隅以寜海令呉庶幾専掌之從事褚理㕘綜之東北隅以臨海尉劉初專掌之決曹魏中㕘綜之其址凡環數里而四隅三面壤界相屬惟北面以破山而闕焉城制雖存然實巨防也中以仙居令徐﨣専掌之獄掾宗惟一參綜之又命司邏喬筠邢昭素宋世隆迭畨譏呵以警非常㑹世雍换丹陽而新監軍胡禎代終厥緒彭侯感厲撫綏諸大夫各祗所職役徒忘勞三旬而成羣議又曰城則信美矣然萬分之一復罹水災而激突差久則懼其或有頽者不若周之以陶甓則庶幾常無害歟外臺然而行之曰雖重疲吾民其利至博也已惟黄巖令曰陶甓雖固猶未如石之確也乃請兼用石役將興田侯親按勉之士志増倍主計李侯仲偃司憲李侯雖領部惟新而實協心同功良無間然新守元侯通守黄侯繼以循吏之選懐保捐瘠而慮忠計逺一方䆒度背春渉冬厥墉甫畢論者咸曰休哉仁人之經營也始終之畫無一不適於宜費貲不踰千萬而國之大事立焉使斯民知免於旤而日就蕃育其施何如夢齡不侫雖知此徽烈當書太史而欲有以永台民之傳故妄志其大略云台州重修城記呂祖謙臨海郡南東西三方岸江湖秋水時至北限大山蹙不得騁怒齧隄足生聚廪廪恃城以為命距海餘百里逋亡剽俠之所遭惡嵗輒睢盱洲溆睥睨郛郭徼警者不敢弛柝故閉修之政在是郡為首務盖所以逺菑害銷姦萌非徒區畫封表備侯邦之制也慶厯之水幾不為郡元章簡公絳來守城復立宣和中盜發仙居闖虚罙入突薄欲登時則有户掾滕君膺帥厲吏士圉以方畧冦不為患父老紀焉乾道九年里旅不戒於火延及郡城堵隤甃弛徑踰無禁菑氣未格民譌不寜間一嵗太史趙侯汝愚自信徙鎮暇日循行牆落屬丞掾而告之曰置守所以衛民顧屏蔽廢徹若是其何以待不虞土功於古雖有常律傳春秋者復出啓塞從時之例豈非城闉之啓閉寔有邦之大紀隨時築治有不得而已者邪況壯城之卒月粟嵗帛凡以為此益其廪而寛其程宜無不可以是軍事判官蘇延壽受役要司輂輦金穀之稽兵馬都監胡勝督栽巡功察其勉與不勉者命羣有司各保其所奠地守傳衆力俾増卑薄塗塞空郤環城諸門作新者四曰鎮寕曰興善曰豐泰曰栝蒼修舊者五曰崇和曰靖越曰朝天曰順正曰延慶起淳熈二年六月癸酉訖閏九月戊辰絫日積工凡一萬五千三百七十有六大抵取具於壯城之籍聞民願即工者厚醻之不欲勿彊㑹其數眎役兵纔十之二鍜斷鏝塈黝堊之工畀僦直如其數醪醴之饋勞來之問相及於道其材瓦石甓之用積二十一萬七千九百錢以貫計米以石計者合四千六百有竒維侯憂民急病之意既達於下而精知周慮又足以綜理之故公無羡費民無留力工無餘技役事首尾厯再時版牐竝作觀堞堀興而近郊之甿初未嘗釋隴畝也始侯之至詔奉計最朝十月報政之期甫半嵗而贏或謂是邦特侯假道休沐之地繕營之鉅者必姑存以須後乃獨於入國阡陌未習之時驟舉力政百年之蹟成於指顧邦人徳其賜而樂其成請書勞於石抑不知因事而功見已事而迹泯一壘培之緒業於侯何有哉至於不以久暫易意𦕈然長慮於丼目之外以無負於寄委識此者盖亦鮮矣遂書以諗台之君子重修子城記王象祖子城東自皷樓踰州學過東山閣包職官㕔厯玉霄亭入於州之後山西自皷樓介于内外班之間内外班錢氏有國時子弟為守兵所居也親而長於内外班曲而為洞門又曲而依於大城今越帥徽猷郎中葉公之再造台邦日以修城之餘功修之也初子城堙於圜闠蝕於民居寖侵寖削而又乘以巨浸剥落無幾乃出遺址展閭巷定丈數立表識器利用備築之登登甓之稜稜或帶之抱或翼之展或䋲之直物采炳耀威儀章嚴侯度改觀矣既成將筆之於石或謂物大者體必重力微者事亦輕舉其重則輕可略環台城而新之既鑱諸珉矣因大成而及其㣲不書未缺典也故大城東西南三面為丈二千四百有竒州後北山城為丈九百有竒而子城之丈不過三百有六十積長較短曽不能十之一也方城増髙加厚挺髙斵深邉江蹙水包山越谷其用物也洪矣其取功也多矣子城量材數力曽不能五十之一也大城水潦毎降江潮互凝舂撞無時傾圮有自不逺其防曷善其後於是為長堤一千四百丈以捍城足渉江之西有盤石潮汐上下飜濤攻擣長堤復慮其難恃乃撤樁於江深踰二丈累石於樁結成三疊復以捍堤以牛練土以水試滲萬杵同力百材共良門闗如鐵雉堞可礪發掘所至監紹定之水力功物可施増至和之人謀精神心思盡於此城而子城因平地施版築費公之規畫曽不能百之一也若何而筆嗟夫談曷其易郡國之立城郭惟重重則俱重孰為彼此魯城中城春秋屢書鄭郛之入說者謂郛者郭也内必有城矣然則城有分於内外無分於輕重明也且作者必紀以有俟也紀而獲傳以有考也有千年之州治必有千年之保障並存並久一成不隳豈非後幸而城復于隍泰必有否山附於地剥乃先復變與時㑹不能無也然否終歸於泰剥必繼以復者以前作後述有傳有考書契所以有功於天下也自慶厯至紹定浩浩蕩蕩幾二百年而載見豈數乎事之方殷千里一壑懵不可䆒有一儒生茫搜遺迹得蘇君夢齡修城記於倅㕔面壁之刓碑模以片紙如獲千金數而不足證則子城與郡咸休存片石於樓側之隙地公之功固多矣數而或有證則隙地所存片石可考功不又多乎故子城之記書之詳辭之復於公之功巨細不遺以俟後人雖獲罪於或者之論不辭也公名棠字次魏乾道丞相之孫詳見於生祠記築城議陳觀自古城邑或圮于水但聞遷居以避患不聞補築以俟患契湯仲盤展轉於商亳耿相之間一時大家世臣盡舉以遷不憚夫勞苦者誠不欲盡劉其民聚無辜於受死之地也赤城置城巾山之麓背負大固山天台仙居二水併流直衝城下每遇秋雨時至海潮怒漲官吏閉城捍水如禦巨冦慶厯間嘗一大圮殺人萬餘不仁哉此城再築也舉萬民𦵏之魚腹未厭又聚魚腹之遺子以傳孫坐待今日之禍嗟夫慶厯以前事逺不能詳也今去慶厯耳聞目見猶可接也況南渡以後生齒日繁奈何又欲今日遺子若孫俾後之視今亦猶今之視昔為人臣者以天灾為不常至不為國家逺謀恐不可謂之忠臣為長吏者徇目前之苟安不為聞之朝廷施實徳於民恐不可謂之良吏為父祖者以慶厯距今百八十餘年為已逺不遺子孫以生生自庸者恐不可謂之慈祖父觀二年竊禄其地歸卧衡茅猶未浹嵗遽聞此變實為痛心未免犯衆忌拂衆情言城不可補築招禍惟有位及闔城之父老實圖利之上丞相論台州城築事陳耆卿某等生長台城竊見去秋水溢之變亘古未有其間委折當已備徹鈞聴大造矜憐推飢溺由已之念蠲租弛禁移粟散財務使厚徳深仁浹于存没誠不幸中之大幸矣然自遭巨變以來死于溺者既不可生而生者復憂死勢甚岌岌臺郡愛民體國必有以其實上聞者今不敢贅惟是城築一事係闔城生靈之命利害最重敢不避煩瀆言之某證得本州雖居萬山之間而實瀕大海之角每遇海潮大汎與山水迎合則城外之水已常及街或值淫霖山水暴漲則城中圜闠之水便溢半壁盖不獨去秋極潦可畏而常年固患苦之也所以蔽其南北者幸有兩山而所以捍其東西者幸有城爾徃嵗慶厯之水死者良衆然視今日纔十之一朝廷極力拯䘏尤以城為重事至命憲漕倉三使者同司督察而一郡之寮屬與五色之令佐分隅受任者凡十有七人計度經營井井有緒蘇夢齡之記可覆也次年秋水之至太守元章簡公又増之至至和之元年守孫礪又増築之嘉祐之六年守徐億又増築之淳熈之五年守趙忠定公又増築之夫前數公之城皆得所聞忠定公之城或得之所見皆言補築也包砌甚厚且堅邦民不勝按堵至張弈所為至和城記亦有驅人趨作如赴敵陣之語可見其工程之嚴而慮患之宻矣夫自慶厯至淳熈百三十年其間非無水災特以城不徒修修必可久故水不為病民亦無自而告病也自淳熈以後又幾年矣求如前政數君子畢智盡力固已寥寥莫見然猶毎嵗檢舉修補或遇雨水則料撥兵卒儲積土木巡守諸門以為不虞之備故其間小水可以無患大水縱入屋不至没屋或能遷徙人而不至殺人也獨自近嵗漫不加意甚至常用之閘板預備之泥土亦皆缺焉盖非惟不能如淳熈以前之宏規而淳熈以後之故事亦不復舉矣以故去年之水自西門奔迸而入其勢如河崩川決而其聲甚於浙江之潮澎湃滔天猝然而至人未及轉盼揺足而身與數口為魚矣當要衝者盡室墊溺餘亦罕有生全者至若室廬之飄蕩筐篋之漂流又皆不暇計也今士大夫之家稍富厚之家徙寓墳庵庄舍者所在相望次而捨已地段寄人籬落或僦或假畧不敢以為安而雖稍自愛之細民亦栖托城外以希旦暮之活全望有司監近禍之慘亟修城壁或可般挈來歸而自冬及春雨雪連綿度皆難於興役人心惶惑未知所依然以某等觀之固亦有要領矣盖此周回不十里而北南踞山自朝天門直北轉東至錢府皆因山為城自錢府直巾子山之東北角雖合修築而東面乃下流極易為力又自巾子山之東北角回環接興善門亦因山為城非所當慮獨自興善門越南門至朝天門乃當天台仙居兩邑山水瀰漫而下徑搗城足之衝水勢激湍最為可畏去秋之患盖正坐此若欲杜絶後患須合就此一面極力重築所築基址其髙厚當加於舊城而築之之力當如海塘之狀所用石板必須厚一尺長六尺闊三四尺先於其下直排平鋪一二層用山土杵築又側砌一層又土杵築務在以石壓石愈久愈固中間則用磚子木杵築取令十分堅實而後以大磚包砌之如此則水勢縱髙可以障塞而無摧圯墊没之慮此所謂要領處也今聞郡中築塞兩門已為完具但恐見修之處止用徑尺小石甃砌反不若三四尺徑石之固又所修者只去秋已潰之城而未潰之城置之不問焉夫以百八十年之間歴幾淫潦更幾巨浸簸撼衝突之後不惟敝者不支而堅者亦敝矣是故近年以來每遇汎濫外水皆由城罅以入東西南北所在有之不可恃萬一水漲竊恐塞於此而復決於彼新城縱固猶不足以支而況未必固乎是以邦人雖甚幸城之修而復預疑城之壊以為前痛未定後憂轉深皆不能安定厥居而惟轉徙以逃朝夕也某投身化治竊班著之粟雖幸親脫厄㑹而室廬生生之計至有蕩析絲粟不存者今族姻故舊類多流亡來者誦言其狀且謂某等以鄉人而玷朝士不能一言實重有媿焉用敢述所見聞冐昧陳控盖如某等鄙見城之依於南北兩山者已不啻三之一居下流當修而可畧者又居三之一惟西門一面正當水衝合用石板平側壓砌者亦僅三之一耳倘區處有方則成就亦易如蒙鈞慈終始矜念特劄下本州照所陳如海岸例築疊併將未潰城壁檢計鼎新用工或恐所費増多更乞優降錢粟以為之助則是大丞相再造此邦邦人永無昏墊之苦隂功盛徳與日月相為光明倘為不然則新城既未必堅而舊城復不可久後患忽集前功盡廢闔城生靈之命豈不甚可哀哉某等怵於一邦利害之深犯分塵瀆惟與千萬户稚耋屏息以俟仰祈鈞鍳台州雜記元絳州治据大固山介天台栝蒼之間北直大海海潮汐遡江薄城而羣山阨束水不得肆慶厯五年夏山泐海溢踰城殺人萬餘漂室廬幾半州既殘毁明年予來守兹土拊視凋瘵慼然出涕廼循周官聚養萬民之法恤孤終收介特招倈安輯之問軍政昔之闗戍過更疲佚不一廼取尺籍伍符而均齊之問吏蠧昔之疆宗囊橐為姦積嵗為豪者厭飫豢膄貧者擠轉溝瀆没齒不享斗升之澤廼為定規釐一櫽括料姦擿譎牢不容罅參是數物信以諗之法以束之故民罷者興兵勤者休吏窮者給繕戎械治囷簏完官廬秩祠宇表廛閈齊簿領平獄犴一一悉力問水害之繇昔之縁城之民刳去客土日以薄圮是有水敗廼因新城出帑金以購材募工礱石累甋環周表裏外内九門飾之樓觀縋木于門牝牡相函外水方悍以禦其怒作十竇忩裁以宻石内水方淹以䟽其惡又鑿渠貫城厮為三支達壅渟清餘波距川斵十二石杠蜿蜒跨渠舟車堨來行者不病旬嵗而工既於是秋水復攻城不没者三板乃循闉闍垂木闔忩或持編菅或捧蕢土輔堅窒隙扞有餘壯已而水亡以縱遂復故道昔之刺史廨舍在山谷間滔襄之餘雖不甚壊而潮波洄泊鞠為淖洿大凡署所以朝夕處君命之地不可以不葺乃培偃瀦支敝阤即舊而新之廨之四隅有樓及亭列峙而五至是摧圯悉欲完之則重煩里旅然士大夫必有退公息偃之地乃取城闉賸材於二山之交作䨇巖堂廡縁山椒作㕘雲亭天空地逈萬象在下射有長圃飲有曲水賔友衎衎哨壺雅詠日為文酒之樂粤今年春州人縱㳺皷舞於庭除之下有賔擊節而歌曰昔民墊昏今民庶蕃昔民齎咨今民熈熈惟君憂樂兮與民共之天惠其寜兮無以君歸予聞而甚愧因訓之曰予斷斷然一介臣素性狷直重以蹇連之分孤鳴自哀而朝廷不加誅猶名為二千石幸為僚諸君皆文學政事之選交修補察以禆不逮繇是不為司敗之謫者爾大扺刺史能休戚千里若政之媺惡則有輿誦盖春秋之法興作始事必書予是以雜為之記以俟後之知者臨海風俗記陳公輔臨海魚稻之鄉在東南一隅昔最號無事余少時見米㪷百錢魚肉每斤不過三十錢薪柴雜物極易得無寄居過徃郡官公事之餘日日把盞百姓富樂不聞窮愁嘆恨之聲比年以來國家多事官吏冗雜軍兵經由州縣需索供應不暇寄居官至有宰相者餘不可以數計過徃日日有之故城中百物騰踊價皆十倍於前余雖有弊廬度不可居於是遁迹村落然鄉下寂寞百物無有不免布衣蔬飯杜門待盡而已雖然嘗以西北觀之所在兵燹焚蕩千里無居民吾鄉僥倖未至殘㓕而更富盛如徃時庸有是理邪嗚呼天下之生一治一亂祖宗之盛承平幾二百年一旦衰微若此然今日之亂亦豈終於盡變哉古詩云得見升平有幾人吾老矣恐一旦先朝露不能復存子姪諸孫苟内無饑寒之患外無刼奪之憂他日猶幸及見之故書以記又一本作風俗序云夫輕死易發尚鬼好祀漢志以叙呉越之俗急於進取善於圖利本朝諸志以叙兩浙之俗然呉越之地邉控江淮閩浙六十餘郡兩浙之地近亦十五郡彼川谷異制民生異俗固有封壤宻接而習俗逈異者得謂呉越兩浙同是俗乎盖彼特合四方而論其㮣爾余采之記述訪之耆老以為天台介于東南之陬方承平時最號無事斗米不百錢魚肉斤不過三十錢薪炭蔬茹之類絶昜得里無貴㳺郡官公事暇日日把盞百姓富樂但食魚稻習樵獵而不識官府之嚴渡江以來國家多故官吏冗㳫軍旅往還取需郡縣供億不給寓士有官至宰輔者而城市百物貴騰視前時十倍民始逐末忘本機變巧出被甲荷戈出没于鹺茗之地吏胥持文書索逋負日呌號于細民之門自是訟牘繁多而民俗浸異矣雖衣冠輩出風雅日盛未之有改也然是豈徒天台一郡為然他郡往往或然則率薄歸厚以庶幾曩時之舊是則為政者之任而是邦賢士大夫之責也姑即舊聞以攷見是邦民俗本末如此赤城集巻一
