body:
  text: 赤城集巻八宋林表民編重建黄巖縣獄記周端朝自朝廷至州獄官皆専置唯縣否或曰縣卑事省無庸置也然則貤於丞若主簿不可乎或曰令官簿髙閱事熟柄任専丞若主簿不與是也夫縣雖卑獄實重事謂無庸置非也獄之生殺予奪其根乃在於縣自州至朝廷咸取成焉謂令官髙柄専而事熟是也然令官終不為髙所任終不為専則有疑畏牽肘輸訴咈情非仁與明鮮不脂韋以聴吏幸事晰情得所抑必富且强不得於縣則嗾臺若州之吏反責於縣縣不能勝也兩造至焉吏視財有無為白黒柔其富且强者而無後憂反是則財聚於上而責逮於下唯然故民習賂而輕犯法獄犴充斥縣多不理令之設豈端使然哉蓋令所不得為者一其所得為者二地迮勢壓辨數莫奪仰屋而竊歎有矣所得為者令無先入之見無喜事之心平受初情省絶旁蔓縱有不獲吾無怍焉又所得為者民不幸抵此矣察其凍飢時其燥濕狴廬勿瘐梏拲中程猶未至以菅蕕虺蜴視其民而况麗于獄者非皆狠戾犯法者也追胥之愆詿誤之累間多有之顧所以安全之者尤不可後黄巖壯邑事不能甚省而縣獄且百年風隤雨敗久弗及整紹定已丑令趙君汝駉始撤而新之為式敬堂問事㕔屋髙而廡深壁閟而板堅起五月至九月畢役請記昔后山氏記彭城獄請敬其社稷不以重法地分視之龍圖鄭公政法以戒獄具核獄醫為首敬其民者本也戒其具者末也白鹿隨車蒼鸞集舍縣尹事也豈直囹圄云乎哉然而本末具舉政教並行有能服不鄙夷其民之訓則改敝振新亦其事之一焉因記嵗月并縣之治理志之以告凡受王嘉師者台州州學三老先生祠堂記葉適學者聚道之地而仕所由出也或畔道從利苟榮其身欲復之於學弗可受矣况可祠乎台州之學得祠者三人羅提刑適陳侍郎公輔陳詹事良翰提刑用不究故事不顯余聞鄒浩言熙豐時貴人視民甚蒿菜芟燎恨不力也是時能慷慨建白保赤子以對天命惟江都令羅適弋陽令董敦逸二人而鄒公獨謂羅公見而得之然則推於所不見其不畔道審矣方靖康憂恐懲艾已泮豈不尚合侍郎發明四肢心腹之論無過此矣竟失措逺去然後徬徨宗周卒成分裂之禍及隆興英睿憤激大勢宜若遽振詹事力守絶和不棄地之䇿最専一也使堅忍待之中原當可復豈偏安至今哉雖紹興復用而已與大臣異議終不㽞雖乾道再入而既為近習擅事迄自退二公任諫諍位從官立朝本末天下誦之豈惟不畔道而固行道道雖難行而亦不苟榮其身而止也士在天地間無他職業一循於道一由於學而已道有伸有屈死生之也學無仕無已始終之也集義而行道之序也致命而止學之成也後世地或千里無學行君子以意行道晚進濶逺不知所從慶厯後名一功著一善往往復之於學矣今其秀人美士羣萃而校處朝夕瞻顧拂拭像服如三老之存春秋盥薦饔醴芳苾如三老之享而又仰其大節俯其細行無不皆可師也為聚道之助不既多乎或疑侍郎不右程公學術若少異然按程公親為孔文仲排劾而與孔公並黨籍史記晏嬰非孔子而弟子稱善與人交兩賢哉州學六賢祠堂記吳子良淳祐五年秋子被命將漕神京實忝兩道提學事不自揆庸陋頗欲恢教法振儒風俾州縣學於訓厲程别外各議祠鄉先賢之未祠者以示標表於是明年之三月台郡學始祠六賢曰金部郎鹿公何曰知南康軍石公墪曰户部侍郎商公飛卿曰郭正肅公磊卿曰國子司業陳公耆卿曰丞相杜公範建祠之日太守丁君璹教授王君宗率諸生奠謁成禮而王君以諸生之書來請記余告之曰士所藴抱者志所講磨者學所涵養者氣所植立者節若夫功業之鉅細𨽻之於其所處不較也爵位之通塞繫之於其所遭不數也使其禀純實之志明正大之學負剛直之氣著忠鯁之節豈不恢恢乎大丈夫哉雖然志與學根源也氣與節枝𣲖也惟志與學所向而氣與節隨之未有志與學純實正大而氣與節不剛直忠鯁者夫士君子莫重於進退語默之義天地間莫大於是非邪正之分嗜進而不知退當語而默是掩非而邪干正此之謂樹人慾滅天理罔君上誤國家自古亂亡繼此其出者總總也今夫朝廷尊安名位寖通顯矣而投簪於未暮之年脫屣於必爭之地孰有如鹿公者乎姦憸柄國羣小塞要津矣而或彈擊不避或封駁甚勇論諫益力孰有如商郭杜三公者乎大儒之與㳺匪但義理之空談名世之與偕不止文辭之傑出雖非必於退而亦非苟於進雖不得居彈擊封駁論諫之地而實凛乎有彈擊封駁論諫之風又孰有如石公陳公者乎是故鹿公之遯居野也貪頑者可使恥躁競者可使息商郭杜三公之鳴於朝也懦夫聞之而增氣權倖望之而禠魄石公之沈於州縣也寧忤郡將不肯以旱租困饑氓寜棄官去不肯以非義媚貴客寧身與獄卒對不肯使赤子死無辜陳公之滯於三館也鄉人屬以祠記諂權相則謝不為所親啗以兩制而索其文則拒不予陛對失人心一䟽則觸忌諱不顧端平用兵之議則衆辨之不隨也嗚呼是六賢者其於進退語默之義豈枉已而求容者哉其於邪正是非之分豈阿意而為欺者哉是其氣與節之剛直忠鯁豈非出於其志與學之純實正大者哉然則士萃而居上師而旁友志當何志豈非當志六賢之志哉學當何學豈非當學六賢之學哉夫志與學以六賢為宗而不止於六賢之所到六賢之所望於士也志與學不以六賢為貴而或出於六賢之所賤非六賢之所望於士也而况於絲粟之得喪瞬息之休戚曾足以汚吾齒縶吾足芥吾胷哉拜六賢之祠者可以凝焉思悚焉慕悠焉悟矣思賢堂三讚尤袤畢文簡公故大丞相畢文簡公於太平興國三年以選知台州淳熙丁酉袤假守是邦嘗立公之祠于郡學獨訪遺像未獲後三年袤來江東而公之六代孫希文為安仁宰迺知公自台移饒饒人嘗繪像於廟遂摹得之以寄今沈使君掲示祠宇俾邦人嵗嵗得蒸嘗云瀕海出日聲教初暨勞來拊循寄乎共理睠求惟良得此君子賢哉若人玉音嘉喟二百餘年遺風髣髴勱相我家流澤未已再拜徳容尚息貪鄙煌煌文簡照映青史元章簡公大㕘政章簡元公於慶厯六年來守是邦有功在民後一百三十四年得其畫像於裔孫康曾繪置學宫以慰邦人嵗時之思云玉堂之僊卒老東府􅂱如文章海内咸覩方其未逢出守兹土拯民昏墊寘之按堵完城浚隍植我棟宇百六十春尚芘風雨躋彼㕘雲人渺今古天空地逈遥接公語章郇公昭陵命相率用厚徳顯允郇公其儀不忒持循法度恪守繩墨視彼更張無異跳擲執久不行自觸墻壁使用公言治無今昔臨海舊邦杳𣺌音澤厥今甘棠二五詩蹟四先生祠堂記劉爚嘉定五年春正月天台郡學始建四先生祠郡侯豫章黄㽦使來言曰故侍講文公朱先生道為世師台之士受業於其門者衆淳熙間浙東大飢詔起先生為常平使者部内賴以全活而於台人櫛垢爬癢為徳獨厚蓋常比屋設位而祝之盍祠於學宫然先生之道濂溪周先生伊洛二程先生之道也故祠四先生焉庶幾邦人有所向慕而興起願子有以發其端鑰惟黄侯因邦人懷先生之徳而欲慰其思復推原先生學道愛人之所自出以風厲之其於化民成俗之意篤矣然四先生之道孔子孟子之道也今學者孰不曰師孔孟得其言孰得其所以言不入於清虚則溺於淺陋本源不正末流益逺是以義利不明習俗以壞儒者遂可厭薄天下不復見治古盛時然則長民者盍亦反其本矣今侯之牧其民芟夷暴彊封植善良政既行矣侯曰未及乎徳禮也乃建是祠率諸生而舍采焉執事以序雍雍如也禮成而退有進而言曰先生之容則既瞻而仰之矣先生之道可學而至乎侯曰善哉問吾嘗聞之惟皇上帝降衷於民本然之性無不善也學者窮理以致其知反躬以踐其實則施之家而順達於國而理措之天下無所處而不得其當若趍其名以為髙入乎耳而出乎口則非四先生之所望於後學也余既嘉侯之為邦知所本而其所以教人者又親切而著明可尚也已於是乎書陳忠肅公祠堂記陳振孫故贈諌議大夫忠肅陳公立朝著節為宋名臣去之百有餘嵗其精忠確論絶識危行士無賢不肖皆口誦心慕磊磊落落若前日事孟子有言奮乎百世之上百世之下聞者莫不興起也公之謂矣始公事祐陵為諫官首論蔡京交結外戚謫監當未幾以都司攝夕拜又坐上時相書言私史邊費謫外祠遂入黨籍遷嶺表甫自便則又以子訟蔡氏不軌謫通川以進尊堯集謫天台晚稍牽復則又以飛語連徙南康山陽以歿其平生出處本末如此知仁勇天下之達徳也士生斯世維其知不足以知勇不足以行仁不足以守則至於敗名喪節失身負國而不恤夫既知之矣而行之或不决守之或不固者亾他焉其知之非真知故也是故三達徳以知為首而大學中庸之教必於明徳明善拳拳焉公之攻蔡氏不遺餘力至以射馬擒王為喻凡人孰不樂富貴而悲貧賤公視美官若将凂已而甘心於廢放竄斥凡人之䝉患難始而安中而悔終而變者有矣公坐謫至六七不變卒窮以死可謂行之决而守之固矣其論絶滅史學比之王衍謂必有南北分裂之禍方是時天下承平不見牙蘖未三十年而其言信雖灼兆食墨揲蓍命繇不足喻其先見之審也公之所以大過人者豈非大學中庸所謂明徳明善之君子而兼天下之達徳者歟公之在台凡五年始至無以居借僦皆莫之與末迺寓寶城之僧舍故老相傳能指其處紹定癸已趙侯為州訪公遺跡而得之深惟昔賢遷謫之地往往有祠以見其髙山景行之意如韓文公之於潮蘇文忠公之於黄邦人至今奉嘗不懈台人之於公不可以莫之知也迺即其處而祠焉明年正月祠成擇郡士林表民掌之取田之在官者十有二畆畀寺僧以為晨香夕燈之費而屬振孫為之記後學不佞何足以識先儒之大節竊嘗論次其事如右遂書以遺台人使刻之侯名必願丞相忠定公嗣孫妙年擢世科立身有家法為政識大體歴數郡皆有循聲能名他舉錯率類是不盡紀今以直秘閣知婺州台州羈管謝表陳瓘臣瓘言政和元年六月初五日准通州牒准編修政典局牒奉㫖取索臣所撰尊堯集請速為檢取封角交付差去人續又准通州牒尊堯集係奉聖㫖取索不可遲緩臣即於六月十九日申通州迄依聖㫖發遞前去仍申編修政典局云上件尊堯集先合奏御今匣内黄帕文字等並題作臣瓘謹封伏望本局特為進入於御前開拆今於十月初七日准通州牒准尚書刑部符都省劄子奉聖㫖陳瓘自撰尊堯集語言無緒盡係詆誣不行毁棄送與張商英意要行用特勒停送台州羈管令本州當職官常切覺察不得放出州城月具存在申尚書省臣即時望闕謝恩發離本家水陸兼行不敢住滯今於十一月初十日已時到台州城内者畎畆之志一書可通芻蕘之言萬里不隔集羣詞而上達遭一覽以為榮竄路雖遥陳情已畢中謝伏念臣材如糞土身若梗蓬非敢以著書為能所陳者戴君之義知詆誣之不可志在尊堯豈行用之敢私心唯助舜語言無緒議論至迂獨歸美於先猷遂大違於國是不行毁棄有誤咨詢虛消十載之光隂靡恤一門之溝壑果煩揆路特建刑章若非恃庇於九重安能延齡於再造由淮入浙自通至台怒濤雖阻於重江毒瘴幸殊於五嶺尚留頂踵獨賴君親此蓋伏遇皇帝陛下天大并容日明洞照以至慈而善貸推觀過之深仁憫此顛隮欲其存在以身藏怨螻蟻之命至㣲徇國捐生犬馬之心未替夢馳丹闕日想清光重干擢髪之誅徒欝戴盆之望餘生易捨大徳難酬黄巖縣學三賢祠記陳耆卿三賢上蔡龍泉兩先生八行徐先生也初周程氏倡明絶學欲續孔孟氏其徒有四上蔡與焉學具在書後百年學幾絶朱張吕氏再倡又欲續周程氏也龍泉稍後出與之上下議論洎其歿獨自為宗兩先生天下師之非一鄉所得私也師之始一鄉者黄巖推八行八行從安定胡公學為司馬文正陳忠肅諸公所知遯徳丘園著行里閈嘗兩以應詔卧不起故黄巖之稱前輩者祖焉然未有表而祠之者紹定改元十月趙令汝駉始祠於學且曰吾不止崇一鄉之師也崇天下之師矣因上蔡之歿其子嘗廬於此諸孫育於此龍泉之生身嘗遊於此其友朋又多出於此遂合以祠焉或曰世殊也地隔也宗派異而名位邈也夫勢地古今不齊位與名有幸不幸皆不足辨也獨宗派不可不辨而極有易辨者焉亘古窮今所以贊天地者人也所以為人者道也手道而發揮之之謂文身道而踐修之之謂行故文者道之華采而因其文足以知其道也行者文之根幹而因其行足以知其文也上蔡之學葢宗孔孟氏龍泉之學亦宗孔孟氏八行之學出安定亦宗孔孟氏能宗之則能續之矣故其道續之也其文與行亦續之也大續而小有未續而亦續也逺續而近有不續而亦續也或渙焉同入或迥焉獨出人也或爆焉外震或斂焉内足時也要其歸而已矣江河淮濟皆歸海夫責其不歸海可也必欲使江為河淮為濟則不可也然則兩先生之與八行蓋同歸矣兩先生之學具在書八行之學具在心心與書一也故兩先生信天下之師矣而八行則不止一鄉之師也合而師之自一鄉始也合而祠之自一鄉推之上蔡謝氏名良佐龍泉葉氏名適八行名中行子庭筠亦以孝著號二髙士來孫曰升世其學董其祠之役且奉令之命求予文者也上蔡祠堂記葉適謝良佐字顯道受業二程與㳺酢定夫楊時中立皆為髙第號上蔡先生學者宗其傳謂顔冉復見也不幸遭黨人禁錮未解而卒諸子避難迸逸一死楚一死閩獨克念者落台州紹興六年給事中朱震子發奏官之尋亦死克念有子偕三貧無衣食替人承符引飬老母嘉定五年太守黄㽦子耕修郡志訪求故家得之請見抗賔主禮給冠帶錢米買田宅祠顯道於學在二程後郡人驚異曰自黄太守來他日邦賦之沒於郡姦者一收斂公使之消於妄費者悉減節遂能以其餘興小學作櫺星門增太學生食服有珩瑀器有罍簠又設熸火立養濟葬叢骸政通化達生死潤賴此吾等所知也惟上蔡事不可解甚或嗤笑曰奚不切若是哉夫意有逺近知有難易詩曰烝我髦士近也又曰續古之人逺也興小學近而易知也祠上蔡逺而難解乎道非人不行不行而天地之理不章古今大患也先王比聨閭附而敎其人不敢薄也然其致道而成材者幾絶都曠國不一遇焉故尊之貴之珍之重之哀其死也尸祝以神之禄位以延之更世千百猶未也蓋公之也若使人奮其私智家操乎異説各不相統而以已之氣血所勝者為善則道徳壞而義理滅矣解子耕之舉者宜曰獨上蔡事尤長非不切也昔正考父饘粥於鼎循墻而走其後孔子生而孟僖子命其子學禮焉謝氏之困於庸奴久矣子耕既洗沐之列於士大夫安知無達人出復佐二程之道斯可以占天意矣然則今之不切不愈甚乎赤城集巻八
