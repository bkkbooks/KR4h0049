body:
  text: 赤城集巻七宋林表民編天台縣學記洪興祖天台為山瓌富壯麗昔人於此㝠搜逺寄追王喬應真於疑似恍惚之間而不知赤城所據靈溪所濯其下必有儁偉不羣之士可與風舞雩而休杏壇者顧所以引而致之之道未至爾與其彷彿所於聞孰若合沓乎所見與其遺世而不返孰若逢時而一鳴吾友贊皇李君之為是邑也聖神在位登崇俊良加恵逺邇富而教之成均首善郡邑承命於是奮然度材鳩工起廢一新之而其民不知經始於丙寅之冬落成於丁卯之夏中祀先聖旁集諸生成人小子肩摩袂屬絃歌講誦洋洋盈耳所謂俊偉不羣之士既出而為之師且與其長論所謂逹才而善俗者是嵗貢於禮部者五人齒於鄉飲者數百人文質彬彬有鄒魯之風焉嗚呼使天下之為邑者皆如李君吾知泮水之有人使泮水之為師儒者亦復如是吾知成均之多士抑嘗聞之士而懷居不足以為士矣孔子蓋轍環天下而七十子之徒不皆生於魯而老於魯也古有分土無分民比閭族黨非一方之民則庠序學校非一鄉之士周家徳行道藝之舉蓋取天下之善士豈求於一鄉一國而已也耶成均古制也郡邑之學必占籍乃得肄業非古也鄉使是邑無所謂俊偉不羣者則如之何學者不可一日無師模不模範不範揚子雲非之故愚既為李君書其事又舉是説以告來者李君名亦字原仲觀其所立可知其人矣天台縣文宣王廟記陳襄孔子聖人之大備者也使得百里之國以為政於天下雖堯舜不可及為天子者不以有已聴命以治天下為諸侯者不以有已聴命以治其國則必期月而為東周矣惜乎天民之不遇命也自唐以來天下郡縣始立孔子廟追尊王爵春秋釋奠天子以下皆執弟子禮世以為尊用孔子之道如是豈其然乎生而有盛徳於民死以祭禮報之如曰尊用其道則未也天下之文弊久矣自周迄於今宜出浮偽尚忠實百物或有失職者宜正名王澤或有壅滯者宜任大臣逺邪佞官政或有濫冗者宜官賢者以黜不賢者教或有未至者宜興學校隆師儒禮或有未修者宜敎民冠婚喪葬樂或有未作者宜攷五聲十二律放鄭衛豪傑或有未出者宜㧞賢才舉逸民鰥寡孤獨或有未養者宜弛力舍禁授田以制取財以節民之蠧或有未去者宜黜佛老邉圉之患或有未備者宜足兵孔子之道用之則必先於此數者夫能立廟以守其祭祀尚未為得禮者而况於用乎天台縣有孔子廟不修縣令石牧之始至嵗十月相縣之東南隅大作新廟為屋總六十有二楹先樹正殿塑孔子南鄉左右十哲曾子自為門弟子六十有一人與諸儒傳經者二十有一人皆圖諸壁間各以其所追爵等降如周之服冕圭璧惟孟軻荀况揚雄韓愈氏服儒服焉中立講堂圖古之輿服禮樂之器於其兩壁間又設學舍師生講習咸有位序祭器在西房庖厨在東房周回門廊環以墻宇又考古器作籩豆簠簋樽罍俎爵之屬十二月廟成明年春秋釋奠入而行禮生徒興事品物如制像圖尊嚴籩爼新嘉神明燕喜人物觀化先兹邑民不識儒學又故廟湫隘與民雜居侮慢不尊至是耳目開覺始有學者嗟乎石君可謂有志矣區區一小邑而能為孔子立廟制度以禮春秋以時祭之俾民不忘是已無愧於心如其欲用孔子則天也非力之所及也天其不欲以斯道覺斯民也則亦已矣如欲以斯道覺斯民也石君之志其必有遇矣乎寧海縣文宣王廟記李慶孫或曰上古有賢不肖而為帝王者則仲尼反為旅人何哉天止生仲尼以聖徳不授仲尼以寶位聖故有作徳乃有位所以辨别其賢不肖上以品藻於夐古下以繩凖於後世俾自天子及諸侯皆折衷於六籍故舉世之人歎其無帝王之位待仲尼之深也自仲尼沒至今四十六代而天下自京師至於郡縣以廟而祀之不絶則與夫父祖雖授於天命子孫不守於宗祧者異也台州之屬邑曰寧海作新廟於縣署之震位遇能政而興舊址也且縣之經始有圖牒在此乃不書引領四顧馳心萬類海際境上山入天半地如雍壤人似魯俗蓋王化所及而儒風如素然向之宰是邑者或因循玩愒或才識無取忽似堯之貎蔑棲神之宇投繪塑於地棄梁棟於野雖黽勉以釋奠奈淒涼於肯構於是皇帝東封之三年廷授武功蘇公為此民之父母既進謁於先聖則惕然以傷其蓁莽越明年乃與少府展公進吏民於庭諭以新廟之志吏民喜曰向之不葺是邑之不幸今之云葺是敎之將興若其經費則民恱而子來也唯命爰拓其基而廣其制正其位而辨其等殿如嶽峙廊如翼舒門如洞闢然後以山龍而下九章被於先聖之衮立先師十哲之像配享於左右圖諸達者於屋壁如進賢冠之服彩章著明儀形具備尼丘之祥庶幾之聖升堂之列如循循於善誘若拳拳於服膺類孜孜於好學當此時也則蘇展二公修禮文而落之集邑中吏民長㓜以觀之皆匐匍奔走俯伏抃躍果不以鄙邑為夷故幸二公掲起斯民使我民復見於先聖之容學校載興庠序益嚴詩書以存絃誦以繼嗣而朝廷頒以祭器故上丁之禮由兹而為新廟之殊觀也且仲尼之生厄陳則絶糧今乃血食逰鄭則喪家今乃廟貌去魯則旅人今乃王爵加以今天子登封降禪之後幸其居而增其諡是其亂代之痛心遇治世之尊教否之於生前泰之於死後也噫廟之既成則先聖之神其不福於斯民乎斯民之性不臻於聖域乎必也異日多君子之稱不獨在於魯衛而將變於是邑也豈不美哉有問蘇公之為人則曰咸平三年以文章擢進士第以孝養辭賔從職而甘屈跡於縣道以迎侍母氏凡所歴任皆以㢘明稱故今之來澄清弊源崇樹治本躬易峻嶺通為坦途緑毛附龜山來殊貺則秩滿考績或外莅繁劇内列華貫動静語默率以仲尼之道為意迨未可究其遐邇也抑展公乃衆仲所封因官以賜姓而命為展氏族分為隴西世襲有常家尚儒術祥符初以禮經中第初命作尉兼職簿書性直道充官清譽至故和而為政民以受賜今以後亦未測其所至也僕以旅遊叙蘇公之鄉故見展公之勵誠相與守天子之法制修文宣之廟宇真吾徒也辱命作記乃摭實以傳信云耳僊居縣學重修記周必大孔堂髙第猶分四科性與天道未嘗輕言世之學者乃欲徳行言語政事文學兼而有之其不可得而聞者每求於議論之間往往名是實非言出而躬不逮此今昔通患也古靈先生陳公諱襄字述古福州侯官人時方以雕篆為學獨與陳烈周希孟鄭穆唱道海濵鄉人化之號四先生皇祐中令台州之僊居篤意學校首為文勸人讀書次諭以禮義之俗又擇明經之士朝夕講說詢問大義間入程試髙不躐等卑不流俗示之以方期造於道而進取亦在其中士民懷之奉祀今百五十餘年嘉泰辛酉夏通直郎四明林岳來治兹邑歆慕前哲凡庠序堂廡門觀舉新之厥初祠宇庳下遷至中門之右極其嚴潔刻公遺文二十五巻得謝雨詩於斷碑增置集中學有射圃淪棄榛莽亦加薙葺别市民居剏觀徳亭總為錢千二百緡皆出節用籍贓田十八畆輟務塲餘財月萬錢以贍給生員請尉簿嘉禾錢撫専主教導於是學職林宓吕咸陳頴王述不逺二千里以記為請夫教人必以聖人為師古靈學夫子者也林君希古靈者也學者誠能各因其材孜孜弗怠尊所聞而行所知豈特無負賢令亦將無負先聖可不勉歟按國史古靈傳惟載其宰河陽典數郡所至必務學校而令僊居則畧之是尤不可不書也台州補軍額記陳耆卿國曰軍國州曰軍州非先軍而後國與州也窒暴穴夷厲階㣲軍則國與州潰不治雖先軍可也相州之小大而為兵之衆寡舊蓋有額焉多則贅少則缺缺額之弗補匪惟一朝而亦不止一州矣諉曰省廪食者縮於財也至以餌市人販子取籍具勿問藝云何桴皷鳴望風迎且遁若是者不誤其事哉嘉定十四年毗陵齊侯守台州優其粟與衣而精較其材與力故甚嚴於春秋二閲尤嚴於月按士勸且勵樂而歌之然未足以盡侯徳也其最可紀者士不幸死則以其子弟之有材力者補焉無子弟則婣黨而後許凡民而補焉蓋為彼計則一兵死得一兵之養為吾計則一兵死得一兵之用以故無不補之額亦無不練之卒樂而歌之者又日以衆矣於是相與請於路分林君訾而林君復請於余願礱石以報焉余惟自昔誦美邦侯止紀民政未有紀兵政者雖然民馴易感也兵伉難齊也以伉而難齊之兵過於馴而易感之民至於樂而歌之請於林君如此請於余如此其兵政可知也因其兵政而民政又可知也民政不勝紀紀兵政自今始可也補額雄節四十有八人威果三十有五人崇節一百一十七人壯城三十有二人外寨八十有七人今而後又不知其幾人矣答之曰礱石以報詎若礱汝心以報哉台州奏蠲酒禁記謝采伯臣聞諸父老台郡通閩廣嵐瘴為厲非酒無以禦其毒故其民食酒習慣為常耆利冒禁曾不少戢紹熙間守臣徐子寅蠲其禁寶慶間守臣葉棠有志舉行會除常平使者繼奉詔攝州巨浸之餘民不堪命亦蠲其禁然皆僅僅兩載而不能以久者未嘗聞於上也端平三年守臣陳振孫因士民之有請稽本息之盈縮條公私之兩利以聞於上鑱諸樂石俾民歌咏聖徳以詔來者其慮逺矣臣以為𣙜酟非常賦也漢武帝用兵之餉而剏也武帝席文帝富庶之餘業用兵纔三十餘載而海内已虚耗遂作俑𣙜酟繼世亦悔其失固嘗罷行而言利之臣接踵於後世豈能悉意捐去是用兵之禍厯一千三百八十餘載而未已也臣嘗兩佐州四典州私醸亦固有之然令下之日秋毫無犯獨臣里中更守臣十餘人繩以一切其弊自若走卒坐舖譏邏旁午而匿姦藏慝反滋弊藪若官吏夫匠之屬日賂月餽皆有定數嵗終則倍之有挾者寄造率十餘家彊有力者抑又甚焉不幸而獲則不過升斗窮窶人也彎卒例擒以逃譴其始獲也必讓曰以供囚也其編置也復讓曰以奉䕶送也故酒麴秫米之四鄰與在城内外之飲客箠楚日報而私釀日盛官額頻虧本息折閲承流宣化者亦付之於無可奈何而後止其弊極矣小大之臣但知増取之為工苛慘以求勝而莫以蠲禁為上言者聖徳如天眂民如子豈忍與爭錐刀之利而戕民以徒流之酷哉特民瘼不即以上聞爾今賢守臣洞見官額初無毫釐杪忽之虧而在民獲安靜和平之福迺為奏請而賢相國為之敷陳聖主亟俞之頒降省劄以示遵守與國無極除漢武以來一千三百八十餘年之患邦民幸甚得保生業奉賔祀無刑辟之虞熙熙然若生於唐虞三代之世而聖徳巍巍軼唐虞三代之盛矣顧不偉歟新建鹽倉記陳淳祖浙東瀕海郡四𨽻提舉司置牢盆處所二十五在台者三獨黄巖于浦鹽屬焉曩鈔法行時巨商驟至常先挾劵置驛運鹽之艘纔達水歩紛售而去不暇積也數年來鈔屢更商筭日貧多徙業遁去鹽山積無可貯議者謂法不便夫法之變将以通之也豈料其窮至是哉今為鹽課之說三有拘𣙜之術有私鬻之禁有召誘之䇿其二者可令行禁止其一者非人樂趨不可強售也故法之行常患吏不通其意一於法則怨一以情則弛急則謗沮怨則奸勝反使下之人操其術以撓吾政者皆是也台雖號瀕海接畛聨麓猿居蟻附之民大抵皆山窟穴耳一監所積一嵗販夫至無幾何雪廩氷窖日融雨液吏常懷羽化之憂非開源疏流輕利以便法恐未易朝夕運掉也淳熙五年夏倉使章公端子至律已如嚴師不肯跬歩放䂓矩治官如當家不敢寢息廢扄鑰政出㢘平人樂其利浙東鈔法始流衍於他路獨台與温猶以發泄路狹未大至往往人勸趨之通判俞君益之以便宜來告且言都鹽倉久廢今所謂倉古浮屠半屋耳散積他處架漏日甚宜亟改圖舊有常平倉已易建遺趾尚存即其地為便公命亟行之遂以丙午夏經始明年春成為屋百楹内敞外周堂森廡衛公無重費私不繁擾若又慮運鹽之弊籍官舡而繕緝之刺兵為篙師以専一其用自是舟運倉儲皆有條貫其為公家計悉矣公嘗薦於朝謂君綜核精密通材有守信哉他日余嘗佐公議鹽事公曰國用全靠鹽耳㑹計者較其盈不肯捐直以售謂自銖兩而上總其凡而計之則為國用之失也滋甚不知鹽之為物不與他貨等坐一日失一日耳損益有道一朝而盡發之山海之藏固無筭也其未之思乎吾儒生不觧是以理觀之宜信㑹公移節治永嘉不及謀而去矣事之不可行何獨此哉俞君請記因識公語附之末云台州支鹽㕔壁記陳耆卿州縣官例有㕔壁記獨支鹽㕔闕豈其病在官庳耶鹽課至近代愈饒設職亦衆倉官主出納鹽塲官主辦集辨集難為力而出納易為功官雖庳不足病也台州之倉官有二所𨽻鹽三後以二𨽻四明其存者一以故倉官亦省一鹽之額以袋計者昔為五千有竒而今為三千有竒夫官既易額減又益易遇客鈔至鱗排櫛附隨先後給之責可塞賞可得爽敏之士噤無所用其力則往往求以自見於其職之外上而臺與郡亦曰是有以自見吾不敢束於其職之内焉蓋今耿君恱是也然則官雖庳不庳者人爾非惟不足病又足喜也耿君曰吾不以為喜而以為憂憂其無以視後人而又憂其無以繼前人也録其姓氏自楊燫以上分員者二十四人王栻以下單員者六人求余記兩年及是始筆授杜瀆鹽塲重修㕔記宋晉之杜瀆蕞爾地僻在海壖國朝熙寧初始議鹽筴建監設官以董之其課入居是邦三之一紹興間會稽姚君寛新舊治迄今四十年矣嵗月寖久日就隳圯當官者因陋就簡率不經意淳熙十有一年冬十有二月庚申臧君實來視事之始愀然曰如是官乎遂欲更其舊而新是圖貽書晉之曰煑海重利也𣙜監重事也風雨之不庇而覆壓之是虞觀瞻之不聳而服役之是懈奚以善其後君為我請之上官吾将佐以已俸晉之遂以其事上之州别駕州别駕又上之鹽司之長得錢十有五萬臧君慨然致力爰諮爰謀爰究爰度期於必成而後已㕔以治事室以燕居厫以貯藏亭以量稱廊廡門臺以翼以峙為屋凡三十有七間役工三千人有竒糜錢凡百十有五萬肇始於丙午之春落成於是年之秋工利其入曾不告勞民樂其均亦不稱病一旦輪奐觀者稱美韙哉為是役也噫士風凋弊誰能逺謀其有㢲懦退縮不克振舉視如傳舍攴撑朽腐以苟嵗月而已亦有奮然興作頗快人意往往挾公而私先䂓厚入利未膚寸而害已蝟毛矣有如臧君㢘勤自将誠實外應表表於流俗之上視民事如家事愛官物如已物捐清俸以就役集衆力以為助革累政所不能革之蠧成今日所不易成之績臧君其賢者歟里有貢士周鎬請曰杜瀆之鼎新也固臧君之美也君為邑長且職乎此者也亦君之力也攷之吾鄉决渠㣲勞也有記戒壇異教也有記孰謂臧君之事而可以無傳晉之於是乎書臧君名棟字元任番易人也謹記臨海縣獄記王謙之錢君温伯之令臨海也度時施宜得先後緩急之序越明年政成訟理顧縣獄嵗久庳陋傾側風雨燥濕之不時而疾癘間作惻然興念捐金五十餘萬鳩工度材撤而新之役不踰時屋室畢具夫環百里而為縣事之可舉者衆矣温伯獨以犴獄為急豈事無大於此者乎蓋温伯提刑君之長子也提刑君在吾鄉號丈人行耳目所接多中原故老之傳其居官尤謹重獄事每行縣録囚徒往往以寛平名温伯之政及此非偶然也又明年温伯過余道其事且求文為之記余謝不能其請至六七不倦余因復於温伯曰民生之不齊舊矣衆掩寡智欺愚勇威怯壯陵衰彼惟不得其平也然後决平於官官師察夫不直不正與夫強而不令者寘之於獄使之苦身體勞筋骨一治而終身創彼知長惡之非利則相率而歸於善矣是囹圄之設固遷善逺罪之端也子今廣其屋室至者頌繫與平居不大異然則所謂惡者何以懲善者何以勸乎温伯曰否人之不能皆善固也然其初生未始不善也自其蔽於血氣之暫乖爭陵犯間或未免及陷於罪未有久而不悔者官司徙以一日之故逆計其終身之不復遂以抵冐昧扞者加之彼雖欲改行為善而道無繇至習俗薄惡人民嚚頑非盡下之人過也今寘之囹圄中優㳺不迫待其自愧所以養其悔志而復其本心此字民之職先君之志直温之所不敢忘者也余曰惡者人之所共疾子必待其自愧子於惡者如此其於善者可知矣善哉子之志而未大也温伯曰願聞其説以開固陋余曰昔者夫子聴訟必使無訟蓋防其源也今必待其已入於惡然後感之使悔豈若教化之素洽俾之無入於惡無至於悔之為全善也審能此則臨海之民皆洽君之徳而無有司之犯狴犴之設將焉用之雖壞以為馬廐車庫奴婢室可也尚何俟撤而新之乎温伯曰未能也願學焉請筆其語因為之書赤城集巻七
