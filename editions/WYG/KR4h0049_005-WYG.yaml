body:
  text: 赤城集巻五宋林表民編丹丘州學記李防學之時義大矣哉人不學不知道道者非他道也安國家治人民之道也人能研味古訓鑽仰聖經將以演潤性識革去䝉吝究先儒教化之術貯乎胷中頤君子仁義之說裁諸筆下引而伸之利而用之發為徳光蓄為政本求其治也又何艱哉倘捨其學從其政有若擿埴索塗㝠行而已矣豈辨民哉噫三代之所以明人倫厚風俗者設庠序之效也兩漢之所以昌王業永帝圖者興儒學之騐也其人文肇生易其首焉則曰學以聚之問以辨之孔聖答問著成論語首曰學而時習之不亦說乎書曰學古入官議事以制詩曰君子能長育人材禮曰如欲化民成俗其必由學乎春秋曰學然後入政未聞以政學者也孟子曰謹庠序之教申之以孝悌揚子曰人而不學雖無憂如禽何荀子曰欲賤而貴愚而智貧而富唯學乎學者大富之器也舉是論之厯代聖賢垂諸典訓未始不以勸學為先蓋學然後知道知道然後立身立身然後從政從政然後致主非其學則仁義忠信孝弟禮法從何入焉既不以聖賢之道入乎心潤乎性則空空焉縱其心放其志事親則昧其孝事君則昧其忠臨民則昧其敎由是而言學者生民立身事主之大本為世之急務也可不在心乎景祐二禩秋八月防自澶移宋宋有府學久矣生徒實繁䂓模大備風教日盛詩禮日聞以是出名流取甲第者多矣厯公卿居富貴者亦多矣得非興學明道之顯效歟防俚人也遭遇明主坐寘周行每以為學之初渉道甚淺入官之後立政無聞不能探聖人文章之奥稽賢者政事之本徒竊厚禄以為尸素之臣故常有志勸人之為學贖已之不學欲人之多聞贖已之寡聞寶元元年冬十有二月自宋移台台之亞尹宗明晉卿真端方純懿好古愛公之士也暨從事會稽肅之隴西泰符及臨海長著作髙平貫之皆清慎有文之流官聨之間道義相得夤縁幸會有若舊交凡所建議躍然一心因相謂曰渉海則方丈蓬萊跨陸則四明天台以知天台者山水之秀甲天下也可無清氣以生竒人况趨走之吏尚弄翰墨而詢諸郡人則曰近世以來鮮登科者吁豈非出守者不以儒為意乎反以儒為鄙乎致學者鮮而士之寂寥乎又相謂曰士不以勸勸不以道則舍此而適彼者有之矣道聴而塗説者有之矣為西北之流而㤀反者有之矣且尚文之世素風四發普天率土咸建儒宫山竒水靈之地何獨未建耶晉卿曰久有是心而力不足也今日之事同志相符躍焉而喜濟焉而謀政之暇日遂卜方所郡署東南隅凡百歩有隙屋十數間揆而度之黙而識之又相會曰兹地也密邇郡署若建學館則有位之人易為領袖可計隙屋益而就之矧材甚省功無多苟見義不為是無勇也莫不亟召占吉日風斤驟運虹梁乍申制作有經簡質為尚止增十間舍遽成一畆宫自仲春十有一日起功至仲夏十有一日畢力髙門穹崇峻宇蕭洒靡踰百日衆心樂成詩曰不日成之吾今得之矣學既成會八使葉公清臣戾止是郡首登是學延與諸生從容論道謂防與晉卿曰既興庠序将變風雅不顯不敞何以勸人因而又建小樓以貯羣籍生徒怡怡郡人躍躍復有好事者願出書糧共三百石其助也翕焉其興也勃焉噫學校斯設縫掖有光而今而後越變至魯豈難也哉仍命宿儒特為主者詩書禮樂不得不興矣忠信孝弟不得不增矣愚者可以智賤者可以貴貧者可以富善者可以顯蓋學有所歸俗有所化自然時習而日益矣吾故曰學之時義大矣哉有君子與吾同志者諒無誚焉州學記章望之宋一中國而文教修學者大盛未免乎無師頃嵗詔許郡縣建學館養英才雖興廢在人然後生知鄉風教而大講儒雅斯道開明矣及慶厯癸未甲申用事之臣改革百度太學師生是非時政上懲横議學事中弛越明年戊子又命四方無改官學之人欲詳舉送爾執事者失朝廷㫖謂将廢學而迎合之學其廢矣尚不為立師生矧復能興棟宇期以教人歟自非知道識王化之本者孰敢尸其事台州之學在子城中之東實前守李君防再徙之嵗久卑敝僅存皇祐二年通判江執中攝州政謀盡革之會衛尉少卿吕侯來守郡嘉協斯議遂毁舊圖新倍隆前制逾月而役休有殿以春秋釋奠有堂以揖讓講論閣以儲書齋以居處門廡庖厨既周既飭凡為屋五十楹巖然而髙冲然而粹復有百物之用備以養官民子弟於其中異日台人道立而行明身寵而家昌且有魁偉特傑之才自致聖賢之地是惟興學之賜哉斯役也大理寺丞知臨海縣崔黄臣司理㕘軍王景實董之莅事有方故費鮮而功逸宫室壯好焉已而不鄙非才見托紀述百年學如不葺來者其媿斯文此碑已亡陳司業耆卿於李守兼所編中抄出台州重修學記季翔學之設尚矣堯舜三代皆有學春秋之時去古未逺二百四十二年一百九十三國能修泮宫者獨一僖公彼鄭子産號為名卿不毁鄉校僅如餼羊之存亦不克相其君以敎化為本務趙簡子以儀為禮晉士會不識殽烝使當時學校素修禮義素明目熟乎爼豆足習乎䂓矩豈有臨事懵禮之失乎由是言之子衿之刺何國蔑有我宋聖聖相承垂二百年庠序徧天下絃歌接閭里主上中興幸首善書六經製先聖七十二弟子贊風勵學者俾獲覩天地之純全何其幸也雖然興學者天子為天子興學者太守也太守賢則學校興人材盛否則學校廢人材衰政教汚隆風俗厚薄實係焉不知者乃區區簿書獄訟財賦之末所謂使民回心向道類非俗吏之所能為也太守臺簿黄公本以經術為諸儒倡故其為政知所先後台舊有學嵗乆浸圯公命工度材革故而鼎新之又增廪米出公帑加養其徒月謁殿成禮升堂講説學官職事以序進圜冠峩如大裾襜如誾誾秩秩有洙泗風諸生徳公又樂公教於是相與繪公像記其事曰漢循吏惟文翁以興學顯唐循吏惟常衮以興學顯至今閩蜀號為多士而二人之名與之俱傳今黄公篤誠於學士方嚮化異時人材作成矯矯虎臣在泮獻馘當有所謂允武之士也淑問如皋陶在泮獻囚當有所謂允文之士也以此導其鄉治其國平天下化獷惡而為良善揉不軌而為順從食我桑黮懷我好音又必自兹以始台之多士盛於閩蜀黄公之名蓋有出翁衮右者詩曰既飲㫖酒永錫難老蓋言僖公能飲君子長者以酒君子長者亦錫以難老之福欲其壽永作人也咏歌嗟歎之不足手舞足蹈而有餘至於象其形容非止朝夕望其儼然之威即其温然之色而不㤀欽慕之心亦欲黄公長於作人如魯之僖公爾薄采其芹薄采其藻則學者事也公字仲㣲名章邵武人也台州重修學碑唐仲友本朝以恢儒為家法自慶厯迄紹興命教益廣太上皇帝首善輦轂欵謁臨幸親勒石經以風厲學者聖主服慈訓復舉縟典橋門觀聴益盛肇建華閣嚴奉奎畫增飾黌舍輪奐一新風教所被無間幽逺矧在甸服敢不欽承仲友世以諸生受國恩淳熙庚子奉命假守嵗丁大祲夙駕至郡既謁先聖行視學宫將就傾圯惕然念非宣化所宜顧民艱食事有序既登麥命臨海令葺大成殿易腐苴罅堅緻可久至秋中熟乃議修學闢庭髙門崇垣修廡倫堂書閣因舊而葺鳩工度材慮吏竝縁乃集鄉之縉紳推其賢能者三人庀役事擇僚属四人取諸吏卒謹飭者行文書給呼召如作私室官不知役始作於壬寅孟春畢於首夏庭宇夷直䂓制宏壯悉過於舊材良匠能可支百載夫以天子命郡置學選明師教士以徳行道藝以培植風化震動習俗使人知有禮義以胥訓胥保於平康輯睦之地乃王道之本生民之命不可一朝緩養薄則不足移體居陋則不足移氣青衿挑闥而不孫業則風俗之苟簡熟爛至於扞格而難入無足恠也兹郡邇辟雍之流而以水火風旱之相承補敗不給顧視歎咨以迄於今又因循而不脩守之罪大今捐數千緡而賢士大夫樂與共成豈獨守之責塞實亦成前人之志副多士之願然鄉之賢士大夫勞其心力而守蒙成此非天子之徳厚而朝廷之化深與喜其成而推其本言之不足而至於咏歌詩其可無作詩曰有學之宫既久斯圯匪鄉之美孰葺而起伊鄉之英匪為我勞辟雍之化其流滔滔有廡斯修有門斯閌多士復來居移氣壯台山巍巍江流逶迤有學之宫與江山齊既安爾居既皷爾篋青青子衿曷孫爾業我風斯移我俗斯美詔爾多士毋負于天子台州重修至聖文宣王廟記范説夫後天地而生知天地之始後帝皇而出知帝皇之聖陶唐虞舜之化知所以盡美夏禹湯乙之嗣知所以純厖挺君臣父子之教成冠婚射御之統垂諸億載而不易其繄宣聖之謂明矣聖矣實惟生於姬周之季幽厲之後也有麟吐玉書於闕里以為神異以繡紱繫麟角而去又曰水精之子繼衰周而素王出蒼龍繞室五星降庭兹又竒怪惚恍弗可以具論厯聘列國不遇時君蓋所以然者患道之不行不患時之不遇誾誾於洙泗之表齗齗於龜䝉之奥讚明十翼之㫖開系太極之度三才之義博而益顯八卦之列變而益神述二聖三皇之言九宫五行之適引而伸之觸類而長之明悔過自誓之為賢發明十五國君臣善惡之本攄之為諷誦叙二百四十年治亂之蹟十二公承襲之宜大則申褒貶次則陳赴告三千之狀辨卑髙之體三百之條定名數之列裁六樂分四象雲門咸池所以興大倫大章大韶所以增廣懿大夏大濩所以象功成大武所以陳武功斯六籍者所謂之人文也洎兩漢而下建侯樹伯比比相尚嗣王封聖者綿綿徽號台州東甌之分野淛水之右界率有六朝之遺範粲焉衣冠素業者有矣而兹廟也舊莅郡署之背枕山之趾宫宇側陋鞠為荆蓁一日會僚屬而謀之祠不亦隘矣因圖完葺而遷寘之乃卜東城之維四向平易襟帶林藪腹腋刹廟薙草誅茅爰命哲匠授全模閎其桴棟博其楹磶有以髙為貴者峙之以塽塏有以廣為麗者敞之以廊廡磨礱砥礪周之四壁丹漆頳壤飭之叢綺中設肖像被衮冕於南面旁羅兖公而下象昭穆於左右列八十八座圖蘧伯玉左丘明公羊髙糓梁赤伏勝髙堂生戴徳毛萇孔安國劉向鄭衆杜子春馬融鄭康成服䖍賈逵何休王肅王弼杜預范寗髙柴宓不齊樊須琴牢梁鱣冉孺原亢漆雕開商瞿司馬耕子張巫馬期公冶長澹臺滅明原憲公伯寮燕伋南宫縚縣成顔路顔幸曹䘏於東向壁繢孔忠叔仲會秦祖鄭國公西輿如冉季漆雕哆左人郢亷潔歩叔乘邽巽顔之僕狄黒顔噲公晳哀樂欬公西蒧申棖曾蒧公孫龍任不齊秦冉施之常公祖勾兹伯䖍榮旂顔祖秦非申黨后處奚容蒧石作蜀壤駟赤漆雕徒父公夏首公良孺公肩定鄡單句井疆罕父黒於西向壁其豆實其籩實視牲器皆品著之其用少牢率以春秋置奠而常饗之景爍哉宣聖為王者師迄今千餘禩其道益廣其貎益嚴國家加號至聖文宣王不其然哉其地勿改其制益崇考室斯干賡之伊載鍾皷干戚落之惟熙若揭日月而行焉因琢石鏤文寘夫不朽台州鄉飲酒記謝升俊國家自中興以來追復舊章一新典禮用底太平之治以紹我宋累聖之休是以崇宗廟以寧祖考躬郊祀以饗神祗闢賢士之闗以長育人材凡所闕遺莫不振舉惟是鄉飲之禮久而未講今又詔頒郡國悉令推行將使數千百年之曠典亦幸遇於旦暮間甚盛舉也郡太守秘閣張公偁適當奉行恪䖍靡忽不踰旬月大講於鄉校仰副詔㫖舉行之意屬升俊實書其事欲鑱諸石為永永無窮之傳升俊竊謂先王制禮之意悉縁人情人情所欲因以行之其所惡因以去之君義臣行父慈子孝兄友弟恭所謂六順也是人情之所欲其可不行乎賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也是人情之所惡其可不去乎鄉飲酒禮實後世逆順之所自正孰謂今日可廢而不行耶大哉鄉飲之為禮也古者賔興賢能則行之明養老正齒位則行之春秋習射於禮則行之鄉大夫飲國中之賢者則行之時習雖不同然其為禮之意則一至漢唐間固嘗舉行不過一時尋即寢廢詎曉先王之深意哉是禮之設初不䂓䂓務為籩豆脯醢合歡於飲食間謂夫主賔介僎之有象辭孫獻酬之有節拜跪升降之有文坐有序豆數有别凡禮之意悉寓焉故行諸一鄉之内則父詔其子兄敎其弟目熟於所見耳熟於所聞不獨識禮之制又且達禮之義居於家者弟長而養老仕於國者尊君而親上自然教化行習俗美人人知順逆之理皆有士君子之行而乖争凌犯不生焉孔子曰吾觀於鄉知王道之易易又曰鄉飲之禮所以明長㓜長㓜之序失則爭鬭之獄繁矣殆謂此也台之為郡實東浙樂土生齒繁息事物猥多所以去逆效順在所悉中於禮觀之者如堵皆知為士之貴而加歎仰見今日化行之初風敎之美天下靡然丕變嗚呼豈不韙歟台州州學藏監書記季翔文籍生於虙羲六經成於孔子子出論語史始編年厥後書日益繁六經之外有傳註傳註之外又各有書諸子亦各有傳註史家又有雜說學者恥一物不知昔人有願入秘書一讀平生未見之書夫為士未入秘書必㳺學校求多書者假之以觀而貧者苦於無資其力能以置者固不知秘書之富也非賢師帥為之置書其間學者非自致青雲之上求入秘書終未得盡讀聖賢之書如古人矣此為士者公患也上即位之首年敷文閣待制趙公以同姓之賢來守丹丘下車敦庠序之教士知嚮矣明年春陟巍科者十人江山之勝蔭牛宿而直台躔長才秀民間出其間每三嵗南宫有司以名上者不過四五人至此遂倍蓰於他時豈非教養作成之有道耶一日公謂翔曰來學之士宛然洙泗之風獨書籍未備不足以供其觀覽未免假書於市者於是出帑藏之贏五百緡置監書三千五百巻命藏之學俾登吾藏書之所如入羣玉之府球琳琅玕無所不有仁智各隨其所見大小各隨其所得異時推其得於書可堯舜其君民是藏書之效也已嗚呼賢矣哉仁人君子之用心也兩漢四百年傳循吏纔十有八人文翁興蜀學遂冠西京循吏之目衛颯興桂陽學遂首東京循吏之名彼之興學未暇藏書也固曄猶歆艷如此睹公勸學之勤藏書之盛又當大書不一書為時循吏之冠冕矣翔非其人也而公命記之姑叙藏書之嵗月俾取書而觀者曰是趙公之徳也書之藏不朽公之名亦與之為不朽書之澤無窮公之教亦與之為無窮昔召伯聴訟南國去左右於成王人懐之勿剪其甘棠公今易鎮四明行勱相于朝是書之遺徳多士奚止甘棠之遺愛比耶公有才美文章而無驕吝之私天資至誠樂成人才治郡煒然有聲為前人之未為能前人之難能其藏書于學尤為可書也若夫得魚忘筌得兎忘蹄得道忘書雖有不容贅者要之得魚兎者必自筌蹄始學道者必自藏書始州學更造釋奠祭器頌賈南金郡刺史以恢儒為政政之本也儒宫釋奠政之大天台在浙名邦釋奠有器非惟不備且不度行刺史者㮣未遑及人乎數邪嵗乙巳天子重遴侯度毗陵丁侯璹繇棘正來莅次春丁夘行事因嘅然曰無乃太簡乎此規不規彼矩不矩禮自聖人出乃不足藏報奚其禮按朱文公成式寅夕斤察詔工授指蓋侯宰新昌曾以公定於太常者授今刺郡宜汲汲期春始告成於是丁亥先夕戒設由殿庭溢兩廡位各有器陶不窳斵不鏤麗牲於碑奏割如制黄流洋洋椒飶上升刺史衮冕赤舄登降鏘鏘猶天之靈肅若在廟一郡既觀且唶曰夫子之禮如此夫吾徒豈可不恪事畢諸生亟請於南金曰侯以仁義為堂皇以禮樂為宫牆民格其化而士尤沐厥澤可無以魯之頌僖公者為侯頌乎是可以觀政矣嗟夫子入太廟每事問而祭器之簿正尤急曾子亦謂之有司存葢道不能虚行也而寓於器謹其器存其道也子曰我祭則受福政非禮不行禮非儒不舉侯將以儒道天下可無頌以祝其嘏其辭曰我瞻芹宫猗祀之器昔不度兮今何偉我瞻庭廡猗祀之位昔不専兮今何備誰其繩之文公興之卓哉我侯今其新之禮既周矣神具歆矣繄千萬年作自今矣邦人有祝祭則受福詎邦之福實侯之糓侯曰不然天子我先我將以禮樂佐天子惟四代之似赤城集巻五
