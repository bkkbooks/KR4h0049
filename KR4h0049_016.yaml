body:
  text: 赤城集巻十六宋林表民編有宋八行先生徐公事畧陳瓘瓘謫居台郡嘗徃拜八行先生之門先生姓徐氏名中行世為臨海人父都使公有逺識不事生産毎樂教子幼遣就學鄉校已有雋聲聞安定胡公講道蘇湖間其徒各以經轉相傳授又使之逺游求師友淵源之學先生至京都首謁范忠宣公一見賢之繼薦於司馬文正公公謂斯人神清氣和可與進道他日不為國器必為儒宗㑹福唐劉彛赴召得安定所授經館于梵舍熟讀精思攻苦食淡夏不扇冬不爐夜不安枕者踰年然後歸葺一小室終日危坐幾於解悟凡誦先聖書必為之冠帶開巻得意者用片紙記錄黏於壁間以備觀省杜門却掃歳或一出識與不識者皆知其為安定後學也祿未及養而都使公以疾卒先生純孝天通垢面跣足廬墓三年甘露累降躬耕以事毋毋老齒髪不衰以其餘力葬内外親及州里貧而無後者十餘喪人嘉其行誼與山陽徐仲車並稱累舉進士不第以明經教授鄉邦逺近來學者肩摩袂屬至僦舍處之先生之所以教必自洒掃應對格物致知達于治國平天下俾不失其性不亂其倫而後已故髙第弟子仕者多循良處者亦修潔台學之盛獲冠疇昔赤城羅適與先生為莫逆交元祐間持節本路率部使者以遺逸薦諸朝且舉代已官職其藁奏有髙蹈丘園沈淪草澤徳行純茂孝悌彰聞之語先生屢書力辭羅竟莫能奪崇寧中詔天下以八行舉士郡太守李諤保奏全備八行事狀躬偕寮吏造其廬具安車禮遣先生終不就聘去城之黄岩一日㑹親朋列飲酒數行取平生文藁悉付煨燼爾後服道衣戴華陽巾握青藜杖風晨月夕往來乎委羽洞天諸子以籃輿侍其後真有司馬子㣲之風忽有客謂先生曰世方爭奮以求舉公今獲舉而退避求舉者固可罪也避舉者非要名乎先生答曰人而無行與禽獸奚若律身治已直分内事使吾得以八行應科目則彼之不被舉者非人類歟是啓其鄉原之賊也吾且不忍沽一已之爵命以蠱天下之風俗何要名為客慙謝而退於戲賢矣哉瓘元豐二年塵忝一第經遊宦塗見賢士大夫稱道先生不脱口被謫此來猶幸親炙亦奚憾焉然先生髙節足繼孺子瓘之不肖深有媿於仲舉先生不以瓘卑鄙辱追雅好於千載之下果何幸耶政和癸巳黄岩隠士左緯經臣裒詩訪瓘于寳城方丈語及大畧經臣勉瓘紀之越十載先生之門人陳公輔遽以即世告瓘發緘慟絶亟起為之書謹授介紹俾藏之泮宫以詔來者作傳杜孝子傳蘇舜欽台之黄巖有至孝之士曰杜誼誼性敦篤不苟惟信義所在事父母極其孝其父剛狷獨不良於誼惴惴憂恐不自容竊伺顔色更端而進進則呵逐笞擊而後已日日如是而日益勤康定元年九月喪其母踰月又喪其父號慟晝夜不絶勺水不入者累日卜葬於仙村之山下徒跣負土為墳往來十餘里日渡塘澗泥水沒於骭雖大雨雪未嘗少止手足皸裂血流則以漆塗之毎覆一畚必三遶墳號而後去如是者三年既葬遂茇舍墓旁人往視之輒遣去日一飲不葷暮夜狼虎之迹交於廬側誼獨不恐明年呉越大水所在山皆發洚推巨石走十數里台山於他山為髙而水又至並山之民居廬田墓畜牧漂壊者衆而獨不及誼邑人數千迹誼所為以詣郡郡為上聞天子下詔書奬慰賜帛粟予謂父嚴子孝人之常理又烏足道之哉後世寖薄乃有孝悌之舉人始知勸而克厲近世孝悌之舉又廢禮義之教不施於下為下者不相師友而道義蓁焉所在泯泯無所取法率情放俗蕩佚不還時或有至焉者則蕭然無所依歸朝廷不用州縣忽不為念不為世人笑且非者幾希矣非自信至明者故亦自疑其所為而怠焉爾不若古之士大夫聞一善則稱道而標舉之使為善者不怠下流聳激而慕向有所信而取正焉越俗浮於節行不堅務以華靡相馳逐誼生於今世而且又在越非至性安然趨就此行故非教之習之之至者矣非牽於世尚以沽榮利者矣使聞而慕效篤於親親者教自誼始余得實於台人故為作傳以俟史氏之求徐季節先生墓誌銘石墪淳熈七年春正月黄巖支汝續踵門拜且泣曰吾邦不幸去冬十有一月六日鄉先生徐公棄世晚學後進無所依歸諸孤將以二月十六日葬諸臨海明化鄉梅溪之原㑹稽孫君應時季和尉黄巖辱狀其行而幽堂之銘願竊有請予嘗與先生同場屋識先生望之儼然若不可親即之温然若不可捨逮今三十七年矣雖聞先生學日進徳日崇而蹤跡飄泊不克承教季和予友也毎趨郡輒為予言與先生遊處狀予方將拏舟造焉而先生亡矣兹銘也何敢辭然自揆不肖言不足以傳後彰之者晦之重為先生累則又不敢當既而季和數見徵於是叙而銘之謹按先生諱庭筠字季節曽祖議祖爽世居臨海父中行篤學躬行教授鄉里與提刑羅公適厚善崇寧中郡舉八行不就始徙黄岩先生幼有髙識十四入郡庠淳固修整輩行敬畏事父兄孝友天至居喪毁甚既免喪猶自傷不忍娶者十餘年朋友强四十乃娶紹興丁巳預計偕後再赴舉時秦丞相顓國有司爭獻諛策問中興歌頌先生慨然條其天下大勢未足以為中興者五識者韙之然自是試輒不利終不變所守以求合郡延充學正以禮法率諸生邑大夫故提舉王公然故待制陳公橐尤愛重之政事多所咨決尉今龍圖鄭公伯熊生日有獻歌詩者先生作上夀論貽之公得論喜盡郤賀者其罷也求言於先生先生曰富貴易得名節難保公敬受焉今上嗣位之初詔四方上封事先生述數千言將上之已乃不果即削藁不以示人尋有㫖加恩舉人五到省年及者與嶽祠先生適應格所親皆勸之先生曰吾嘗草封事其間言嶽廟冗録無用雖不達可躬蹈之耶因亦不就廷試深衣幅巾放迹田里不復至城府郡侯尤公袤聞其名特遣書致慕用意先生年益髙齒髪不衰一日忽命駕厯訪舊遊徜徉幾月歸感㣲疾革敕諸子送死一用司馬公儀諸子泣進藥即自力起坐神氣瑩徹目光烱然手納藥未竟曰吾往矣瞑目而逝享年八十有五先生娶陳氏子男四弗如弗為弗君弗思弗思蚤卒女三適章化鵬牟述牟如璋孫男女十有一先生天資剛正質實不事緣飾服食器用專取朴素事無細大必誠必敬卧必登牀而後脱巾旦則巾而後起終日危坐不欹側口無戲言不祠神佛獨嚴其先祭以分至祭之日雖疾必扶以拜不焚紙幣不事陰陽吉凶之説師慕洛學讀書不治章句務行諸身手疏聖賢格言掲之忩壁朝夕對以自警接人和易無貴賤之間不輕臧否人物與人言依於仁義忠信朋友有過面責不少假借小夫賤𨽻一善可取稱嘆不容口家甚貧授徒為生所入僅療饑寒餘悉以濟人之急其於族婣尤厚嫁兄之女及友壻之女凢六人天寒遇人於道意有所憫惻輒解衣遺之不問姓名僦居六十年泰然不以為憂邑長有好事者援洛人獻地於邵康節先生之説欲率錢為買田廬又録沒官田宅之善者以歸之先生皆笑不願晚歳諸子始葺居同嶼屋纔數間而先生以為過其欲名其房佚我嘗曰君子為善欲無愧於心而已非求人知也故平生潛徳絶口不自道其容貌辭氣無一毫矜見於外粥粥若無能者臨終謂諸子曰吾少也寧無過晚而自覺其庶矣乎吾惟以不欺心一語佩之終身汝宜念之季和狀先生之行如此惟先生窮居海嶠非有師承之自薰陶漸染之助而徳性精明學術淳正施諸言動舉合節度其亦可謂特立獨行之君子者矣銘曰天之生民厥有常性物欲蔽固以失其正先生之學誠敬是先視彼忩壁無非格言處已接人有權有度我躬則否我心則豫既夀且康聲問日隆謂天難知而報亦豐梅溪之原先生之竁過者歛容千載無替方山隠士杜君壙誌趙師夏君杜氏名知仁字仁仲台州黄巖人也曽祖誼祖舜卿皆不仕父春當仕不仕名其燕遊之地曰樊川鄉人謂樊翁者是也母商氏徐氏君徐出也以錫類恩封太孺人娶阮氏繼戴氏四子長曰思睿先君一年亡次思大思永思兼皆業進士三女嫁從事郎紹興府石堰慶元府鳴鶴鹽場管押袋鹽林仲謙進士徐津王賔男孫曰石孫野孫田孫女孫賀生於紹興庚辰卒於嘉定庚辰其日五月癸巳也有詩文十五巻訂禮讀易説詩多所論述未及裒次以是嵗十二月庚申葬於東奥之原樊翁有二子皆以文行名於鄉君其季也君少有俊才為舉子文操筆即驚人措詞命意必異凡子已而曰是不足以為能乃刻意於詩雕搜鍛鍊不竒不已可以肩隨古人矣則又曰是不足以為學於是即六經語孟之言考論一時諸老先生風㫖至武夷之書則拱而曰道其在是窮理求仁吾知所止矣偕其伯氏反覆論説於朋友間一言一字必明辨乃已至其通洽則凡人事之當然與陰陽造化之所以然無不䆒悉君數試於鄉比皆不中乃大棄科舉絶意榮進時方壯年人驚其決盖將以求其志也自是刺字不出於鄉閭足跡不至於城邑鄉大夫欲識之者有往謝無往見人有結駟而至則辭以疾望劔佩之顒卭則趨而辟而讓道於樵降色言於寡弱施鈞敵之禮於後生自號曰方山友民示已志也予與君共學友也知予莫若君知君莫若予君疾且病予亟往救則已屬纊矣悲夫乃書其導匶之旌曰有宋方山隠士衆咸曰冝退而為之誄曰君學足以有為才足以行之致命委順不競于時無喪無得謂之有徳匪徳其徳以居其則故曰有宋隠士百世以無惑思大等泣拜曰子既命之矣請勒諸壙草廬先生墓誌銘葉適草廬先生姓林氏名鼒字叔和黄巖縣人事父母兄無違志朋友不倍其言妻子裕如也鄉里懽如也其行既修矣少而廣問博請長而探幽索㣲老而愈勤窮而益信其學既明矣面於方山木或春彫草或冬蕃井不先汲炊不蚤熟蹣行株坐自若也邑後生聚而謀曰得無從草廬遊乎先生得無思見我乎邑大夫作而顧曰某獄疑先生決之乎某政謬草廬知之乎年七十一一日筆數牘緘題竟就牀若將寐者視之已卒其為士者無不弔而哀如不欲生也卒之十月丙戌明年嘉定十年正月丁酉葬於樟槿山其為士者無不送而號如不欲歸也或肖其像恍乎草廬之容也或玩其書泠乎先生之音也嗚呼世謂文華之俗薄雖躬行樸厚不能化曷不視此乎自孟子為論世尚友之説始輕視一鄉之善盖天下所同善者猶未足也況一鄉哉按周官鄉即國也黄巖古伯男國也二鄉公也公旦君奭預焉一鄉卿也閎散南宫适參焉王國之善即天下之善也豈孟子未見周禮而以戰國近事言之乎然則一鄉之所謂君子者固無往而不為君子矣夫疑天下之善不足於鄉而又以一鄉之善不足於天下者惑也先生之子季復幼常除喪來告余既竊有感於孟子遂以記其墓兩夫人皆陳氏女嫁胡惠連銘曰噫昔追隨五十年近離逺合交傾宣一札不至奄重泉矢詞如忘徒泫然大田先生墓誌銘呉子良王徳父既沒余為叙其遺文十五巻將葬其子勵復以銘為請嘻叙且銘是歐陽氏施之聖俞子美隣幾者余何敢僣而於義何可辭余二十五六聞徳父之賢耳熟盖水心葉公之髙弟樂凈五公之重客篔忩陳公之畏友也他日㑹之篔忩所樸厚嚴重色正而氣和不以余晚出辱交焉自是歳必一再詣詣必盡日留聽其言出入經傳百家上下古今數千載勘訂東都南渡諸儒精粗異同領挈珠貫海湧而嶽立也間出所著一讀怳眩不可知再讀驚喜而猶疑三四讀乃始凝焉㑹豁焉通吻膏舌腴淪浹肌髓盖其思也苦故其入愈奥其見也獨故其出愈竒嘻是真水心所謂蘇明允之流也是時徳父有重膇疾一室黯黮纔丈餘家具左右逼塞若悶悶不能出氣而徳父終嵗處之安然余亦盡日對之欣然也值其疾少間侣行田間倚枯藜傍流水且笑且歌雞犬桑麻俱有自得意第舍傍耕翁樵叟舉手問學正安往亦若喜動顔色者徳父好語勞之恩意敵朋儕而獨以見達官為恥以對俗子為無味以入城市為不得已以非義之獲為泥為滓自試禮部歸即謝舉門不入郡博士倚以紏郡庠故里人稱學正而亦棄不就太守縣大夫願見之不可得逺近宿儒新俊聞風慕重不但稱學正以其居大田又稱之曰大田王先生云嘻何必蘇明允龎徳公之流耶然徳父雖閉闗毎惻然有憂當世意而慨然談當世事真公之在建安藉余寄聲徳父徳父因貽書勉以救時宜學孔子不止學孟子李公既相素厚徳父者也徳父疾已侵藁數千言規正之及公不及私何必龎徳公魯仲連之流耶余不足以知之矣徳父名象祖家世著臨海祖衝文學行義有名孝宗朝為校書郎父應之豪邁博習遍交乾淳諸老贈承議郎妻陳氏男勉勵勤女長適李宗次先卒孫男五殁於嘉熈三年四月晦年七十六葬於淳祐元年某月某日墓在重暉鄉三坑山銘曰夜光出屋天不我匱連城幾何人不我玉雖不我玉不獻不哭亦不刖我足全而歸之賁林谷竹邨居士林君墓碑陳耆卿君名師㸃字詠道其先曲阜人五世祖廣之卒天台縣税官依郡城以處彬曽祖也㳂江制司差使黻祖也修職郎信父也君孝友孚達廣學而苦成少所從多有道師儒壯所交多有道未遇卿相跨郡所接識多海内名勝居家所振膽多境外旅窮好客如饞耽士如醉而尤嗜書傳扶竒斸𦕈近購逺求家已巻數千猶典衣抄傳恐晚丹鉛勘㸃蠅頭蟄然至遇古帖祕文斷刻墜簡不啻虞簫振耳商彞奪目積之久亦餘千巻焉篆𨽻尤留心以張謙中虞仲房為法虞號君嫡授簡俾代已書毎扁榜熒熒必君也夫士剽盜漁獵以聚書為贅疣弗之好矣或心好而力不能聚諉曰窮至字書不待達以工而聽其委落曰淺事淺事拙何病然則鄴侯永逝而陽冰輩真不起矣如君聚人所難聚而工人所不工非愛古博雅能然哉金夫人行實嫓君空嫁奩助之奉親餘則以觴客姑久疾舅幾喪明親煑藥臑食以供不解衣三載舅姑曰活我無以報願汝生好兒長夀爾表民自幼即鄉學受父母督程其愛古博雅信好兒而所儲書益富獨貲用窘書又以水多散亡併失富寥寥也故君死以甲戌七月十八日金夫人死以戊子二月十七日至乙未臘月八日始克合于浮岡祖壠之側盖君七十五金又加五焉其長夀信夫孫曰錫疇銘曰吾觀近世藏書之家多燬於火而君復圮於水也或曰至寳難久聚有是哉雖然其外可圮也其中不可滓也四朝布衣竹邨林君墓表呉子良篔忩先生既銘詠道林君子表民復請余表其墓余謝曰銘具矣不滅矣雖表奚加焉表民請弗置曰所以傳載吾父豈嫌乎多余無以答則為摘其可表者三君生事薄萊田不足支豐歳然酷嗜書質衣貨家具購書至幾千巻名帖亦數千巻毎一巻入手喜津津校讎考訂忘日夜可謂貧而富於書君卧窮巷聲援絶然師友皆名輩勝流王公卿月虞公似良李公庚徐公似道錢公象祖謝公深甫張公布商公飛卿丁公可徐公大受林公憲桑公世昌君陪從於鄉邦者也陳公傅良樓公鑰張公孝伯萬公鍾龔公頥正王公厚之鞏公豐真公徳秀楊公長孺君承接於他邦者也可謂約而廣於交君屢試屢跌以老然不自憂而憂人憂龍舒呉㮚長樂王作古栝陳百朋㑹稽潘方謫台州君館置其家接歳踰時經紀之後皆成名去可謂困而勇於誼然則世之非貧非約非困而棄書棄交棄誼者曷不視君乎是三者可表已而又有一焉夫身貧則子宜裕不然書為無益矣身約則子宜泰不然交為無益矣身困則子宜亨不然誼為無益矣君一子表民也其貧其約其困復似君而不悔書書益多不悔交交益宻不悔誼誼益䖍然則世之能以書以交以誼必其身不能以書以交以誼必其子者又曷不視君乎君名師㸃字詠道臨海人自號竹邨居士死年七十五葬浮江所為詩文數鉅帙藏于家他行能若世出若死葬月日見銘中赤城集巻十六
