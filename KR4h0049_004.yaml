body:
  text: 赤城集巻四宋林表民編黄巖知縣續題名記蔡範設官分職凡以為民陳力就列凡以行志然而去民最近與民最親知民之休戚最詳繫民之利害最切則莫重於縣之有令仕而欲行其志盖必由是官始況黄巖之壌襟山帶海膏腴百萬畆其地日益墾闢甍宇十萬家其民日益蕃庶故凡賦輸之富倍於旁邑訴牒之夥夐絶浙地於是為令不亦尤重已乎範有生最晚冒焉試邑更嘗未多觸事墻面顧累月以來食息無輟區區此心未嘗忘民訪利害察休戚因其可近易親之勢思為之計然誠雖存而力弗逮念雖専而事易移縻困朱墨而志有難行者矣悚然以思寜不自愧㕔事舊有石記前令名氏厥後弗繼近事無紀乃咨問父老訂正嵗月次其後先用續前石暇日摩挲尋閱緬懐景慕因人考政擇善而從苟克利民循守惟謹期以充範之志焉黄巖縣尉題名記孫應時凡官之府舍冝有壁記記在官者名氏嵗月示民不忘其故且繼者有攷也黄巖置縣盖五百年昔之尉於斯者宜多名人顧未嘗有所謂記者何哉豈其因陋就簡否則卑之以為官不足記甚亡謂也余之來詢諸邑大夫士與鄉長老而所稱道省録率不過數十年之近又採之所在屋壁碑識之間盖可知者僅如此嗚呼其可感矣其愈久而愈不可知矣屬將去官迺書而次之石以俟後之人有所聞者附益焉若尚書右丞忠簡許公之事則其遺文可見噫州縣之官莫如尉最卑然而亦最近民有志之士如欲深知民生之艱與為吏之不易以推及乎世之遷變觀古今風俗政事本末求切於實用而精思其所不及則雖犇走勞悴於塵埃箠楚之地疑非所當厭也聞古之士不卑小官而必行其義觀斯記也其先乎余者有可慕其後於余者不敢不敬告也重建黄巖縣尉㕔記此碑磨㓕謝直四明楊璘子美作尉黄巖撤舊治而更創之凡門廡㕔事堂寢房舍庖湢其楹六十以為官者之宅居宅之西有地夷曠累臺以望曰見山之臺翼亭以憩曰傳香之亭即臺間中䟽池沼四隅雜藝花竹古梅怪松特為竒觀乃更結草扁以嵗寒以為燕適之所梁河重柝前直縣南所謂委羽洞天之山繚墻夾道卒廬射圃以為閲習之塲鉦錞皷鐸弓旌鉤格斧鋸搭筩杓具倉庫筦鑰以為警邏之備凡縻錢五百萬餼廪二百經始於辛未之孟秋落成於壬申之仲夏既乃因其長太末陳公魯叟請記直按開寶之元營繕大内告畢遂詔天下郡邑修立衙宇其制之大畧節察知巡罷者著隳修之籍迭相付授幕職州縣受代則對書考課之厯致損者殿一選増葺而不煩民者加如之厥後有司改而為他官不顯書吏績考功止批七事此制因廢弗問宦遊者視所居曽不若叔孫昭子之於傳舍一榻之寄凝塵滿席甚或撤屋破柱苟給竈飬迨其有所興作胥動繹騷斂怨一方無簡書之畏矣余承令君之命問子美以資費所出而曰縣尊所助益五十斛他吾自輸之擇材賦工必堅必良塗塈丹雘必緻必精吾計其久不計吾之費念其費不念吾之勞君其問諸野吾惟子美之輕財舉事誠非人人力之所及而子美之成功遺後者將非人人來則居之哉于以移氣體于以莅官事于以事父母于以樂妻孥于以燕僚友爾休爾逰爾宵爾晝無所不可詩云予室翹翹風雨所漂揺保固修飾使更閲終古而輪奂常新豈子美是為抑開寶之所以推躬逮下者幸萬世臣子尚有詔也記之謂何天台縣題名記韓元吉寓天下之治曰郡與縣其簿書期㑹獄訟米鹽之職縣實百於郡盖郡則有掾有曹各司其局而守特視其成焉縣之官丞主簿尉與令為四號為通其事然令無按察丞主簿尉掌治各有他例不能分總縣務其極悉萃於令旦起鬬訟者立庭下枚數其牒眊焉已不勝其煩獄之辭畢聴而後蔽暇則督民賦課出納謹帳籍官廪士學戍兵役𨽻月㑹而須給縣或當孔道執劵而候驛者日羅絡廡序持文檄相恐動赭皂之衣滿前間有率辦必取具於常賦之外上官便文自安不問所從來民或誚語則以咎令又為令者秩不過七八品勢力卑甚里居之豪寓公之老相與狙詿誤騰謗讟脅令以營其私不則揺撼囂譟必使之去而後已令之缺榜於銓曹者率數十閲嵗踰時皆憚不敢睨然國家之制由選調而更京朝必歴令而正其資號曰親民比嵗益嚴其格往往不得命為他官由是士亦勉强自勵其才以試於縣紹興二十五年吾兄子雲始為令於天台以為天台極兩浙之東南其地富山水玉京金庭俱天下勝觀可以乘吏役之休逃禅訪道從隠君子遊資禄以養親且應夫令之名而已則倥偬亦不暇給既而嘆曰縣固有劇易事無不可為者因為之竭日夜之力䟽剔刮磨不事表襮一意而持之未幾吏民亦坦坦向化始得從事於文墨之間而縣之前令名氏漫不可攷乃訪諸塔廟之題識推以案牘之嵗月得其可見者自鄭至道而下纔二十二人將礱石刻於㕔事之左元吉方學邑於建安從吾兄以問政因書其事以為題名之始云僊居縣令㕔壁記方行可台州之屬縣五僊居尤為古邑秦漢之交地空於荆呉閩越之間西晉置郡稱臨海而縣名始豐後析其南鄉别為縣曰樂安實東晉之永和二年也仙居即樂安舊壌宋齊因之隋既吞陳乃併為臨海唐一天下武徳辛巳改郡為台州縣仍𨽻焉至上元乙亥九十五年之間再廢再置且易曰永安而遷治盂溪即今縣舍也五季不軌呉越僣擅専二浙之地縣與州俱溺焉皇朝削平海宇蘇救疲瘵州治屬浙東觀察縣仍治盂溪者尚名永安逮景徳丁未四月詔改曰仙居以其洞天名山屏蔽周衛而多神仙之宅因以名焉民既康復日以繁冨今則鄉大而户逾萬嵗之常賦與夫苖役之息貫石疋兩無慮七萬其催呼期㑹輸入賦與先後不齊繼之以平決枉直應奉符檄矧復宣上之澤達下之情一繇乎縣之令令之職重於古今也盖以此夫邑之治否繫民之休戚在乎令之才不才然其所以為治一於奉朝廷法而所施之術則不同大㮣通才明識持以至公則教行令孚政成之速不然則嗷嗷之口豈易防遏耶新昌石君來令於此未幾而頗多豫暇於是稽版籍之簽書推而正之至於端拱令凡二十有九員端拱而上無從而考景徳四年以來為仙居者又得其始至與夫代去之嵗月各從而書之刋于壁石嗚呼諸公之名久塞而遽通昔晦而今顯由吾石君以發揚之也僊居縣題名記許景龍令壁有記所以紀逺近别同異而治政之能否遺愛之淺深可不須而自見也仙居舊有題名繇端拱以來凡九十五人中更兵盜自何中以下不得其到罷嵗月者十有三猶闕疑以待知者遺墨所存將浸就漫泐大懼不足永其傳余將代去廼亟伐石更刻使行列相從粲然可覩嗚呼三百年間善政有足稱紀殆不一二而邑人相與祠祝之者宻學陳公而已然則令兹邑者陳公其標準歟余故表而出之且以自警僊居縣重修丞㕔記趙善宿安州長貳之居古傳伉壯遭煨燼餘惟長所剏幾古貳以佐官略於籌逺僦工輸材取具一時規模湫隘纔半故基耳中更繕修亦復因陋就簡隨治隨圯震凌不支嗟夫事土木殫功役固非為政者宜先然莅官之所視漏弗填視傾弗持斯豈人情也耶政三嵗一更僕來一嵗官㣲事簡思無以遺後龜日鳩工制不踰度役不淹時合内外而一新之兹非為身計姑以貽將來云僊居縣重修尉㕔記俞建丹丘列邑凡五僊居雅號簡靖然勾稽巡徼恭事視他邑獨旁午居官者諰諰犇命疇暇過土木而問錢君子立繇璧水擢太常第英粹恢裕不卑其官敏以濟恪事修政舉莅職之又明年顧㕔事撓敝欲壓創始宣和今垂百禩紹興丙子小嘗繕葺寖復四紀繼者惮費忽傾謾弗訾省子立從容諗邑大夫林君岳曰朅來充位再稔閱期月即踐更宦㳺素諱營創矧氣力差卑敢犯不韙徒念録録塵埃蔑圭黍禆縣官此屋不修且壊誠不忍絫後人寸鏹粒粟縱乏敢或一毫蠧民寜輟已不靳易腐苴罅儻支永久吾心庶幾焉邑大夫嘉其言而慫惥之謂愒日浮食逆施尸厥官舉世總總子立問津青㝠慨然自詭為來者地端未多見廼率先捐錢五萬佐費子立復捐俸繼焉木取之官山他費率視市直隨給工徒就募計日疇與棟幹之蠧敗瓦石之闕裂悉易新之東有老屋三楹隳仄罙甚併復増葺閎壮加昔合其費實半鼎創輪奐飛峙丹堊照映經始於中夏之旬有七日不匝月斧斤即工役成而民不知過者交口歎羨寜知子立刄有餘地兹特經畫之𤨏𤨏者歟夫擾不及民仁勞已佚人義役不淹時智為人所難勇捐俸克費亷疊是五者可書不可書子立名撫家檇李余里人也僊居縣主簿㕔記俞建簿職勾稽上而臺寺監下而縣崇庳雖異責成之意畧等縣隘或不具官尉供二尉逐逐警邏無寜晷自捄弗贍又分其力於簿簿責未必塞併與尉事漫弗理近制簿不檄委督覈不同他曹僊居縱號清簡無簿得乎前郡守李公亷奏置簿於戊辰官具而廨猶闕越四年趙君彦儋來僦舍隘陋不堪著足得舊營廢址屋之簿有廨自君始寸甓弗思徵民期年班輸僝工翬飛翼翼士民創見率譽其才余告之曰子居官而不治其舍耻也治舍而或尸厥官亦恥也子奉職以勤恪聞昕暮坐曹無曠事是能治其官如治舍矣事固有大於簿者孜孜振飭眎今所立不既多乎落成請記就以勉之寜海知縣題名記樓府政和六年余自連山儀曹用還堂闕改差四明儀曹掾是嵗孟秋假道兹邑遇青田劉侯倚友之為丞也宣和二年自明州昌國縣令改秩堂除越州餘姚縣東歸待次是嵗季秋假道兹邑遇劍川沈侯賢佐之為宰也二侯鄉曲親故皆得以賔禮敘舊每遇僧坊一宿而邁見其市井蕭條人物稀鮮官舍卑陋山嶺﨑嶇無一事之可人意誓斷不復過此洎兇賊殄滅汎海之官至越而舊物已為有力者奪徘徊未知所向朝廷不忍無罪報罷忽降御筆易地於兹顧雖有平昔誓斷之言而君命不敢逡巡遂以宣和三年季冬廿六日赴上始即奥席竊歎三至皆有為焉治事旬浹四壁蕭然獨有題名一記以木為之龕于㕔角余又嘆前賢製此將以為名也殊不思邑之窮僻既不足以得名木之易朽又不足以久其名政宜付樵蘇不若已之之為愈逮攷其姓氏同桑梓者二人楊光祖沈賢佐有雅故者三人呂康卿孫人亷敖知言常半面者三人史邈殷李陳預或以政事稱或以文章顯其聲稱籍甚固不俟龜跗玉箸已自流傳於無窮矣然念古人好名尚有沈碑江水俟千嵗之後谷變為陵庶幾可見余又安敢以邑之窮僻木之易朽以廢前賢為名之心哉於是礱石移刋以成其美寜海縣尹題名記呉子良寜海令題名記不知始何時宣和間樓府為記稱始鋟以木更用石焉然頗以井聚僻寂小其縣寳慶二年冬㑹稽王君至僻寂者漸稠宻矣君顧謂縣當問民俗不但誇井聚民俗厚雖僻寂未冝小民俗薄雖稠宻未足誇也寜海之民力耕釣安賦輸見謂勤樸於今尚爾意其在宣和前未接京邑華靡事其俗之厚無疑矣而可以僻寂小之哉然今既漸稠宻亦漸熾於爭盖地迫山海産慳食嗇有足憫者未可遽咎其俗之薄也且人情本尚平縱趍險可復御以險乎人情本尚易縱趍難可復御以難乎自是潔己䆒民隠每黎明達夜分甲是乙否語同家人所與奪一於理義威術弗仗也㕔之東有堂老幾仆葺之如新榜平易以見其志既又謂題名雖更用石刻亦磨漫不可讀别市石重刻之増本朝而上三人焉曰劉轂曰陳仲通仕梁唐風蹟不大著曰陳長官名莫詳矣而知其仕吳越呉越議増賦上書死争以免由是觀之果援其民以避險難千載詎終泯耶今石之上名氏班班苟過其下一二數孰為追繼陳者孰為逺愧陳者有聳慕而遐思有怒眥而切齒蚩甿得以肆臧否賤𨽻得以公賞誅可畏而不可誣也式勸式戒具兹石焉然則以僻寂小其縣民之望於令者安在以平易孚其俗君之望於後者有竟乎君名凖字端已遂初先生之次子於是世其家矣寜海縣丞㕔壁記劉倚友崇寜甲甲大觀戊子是邑两置丞職皆踰年詔罷政和壬辰丞職復置余以初第承乏兹任前此雖越兩政皆以中廢而公廨不克治余至則僦舍編民隘陋苦之既而得地於縣之西隅以嵗在癸巳九月經營越明年正月告成址而柱者凡二百二十有二他木稱是又闢縣之垣以跨橋曰通徳因㕔之餘以構堂曰松吟亦足以資出入燕息之便也一日落成士民縱觀有驚眎夸睨若見賞者有俯眉顰語若見勞者又有欲笑而頥不解欲言而聲不揚若見誚者夫見賞者余知其樂此基構之成也見勞者余知其䘏此造為之勤也求其見誚者不可得竊思之固有在矣得非謂仕宦所寓比傳舍為稍久今基構造為之功非不知其備且至也然斧墨未乾㸑突未黔代者告至徒役役為後人資耳況繼而居者未必察察而未必徳也雖然彼見誚者固有理而所以誚者乃余志也士之有為於世者期以身任天下之重要皆使人人獲安利而後已況朝夕從事無非盡其所以為人者於一室勞佚又何較焉若夫察與不察徳與不徳尤非所問也雖然繼是居苟能壊者思完弊者思新毋頽我忩牖毋毁我器用毋以一時苟簡而忘後人長久之利使向之見誚者於余心為無媿亦仁人之賜也因其落成故序此以俟賢者寜海縣主簿㕔壁記季知㣲設官分職各有攸司自一命而上至于天子之大吏繇簿書期㑹達而至於坐而論道俾各務其官而修其方用志不分若將終身則事無有不舉而民無有不理雖至於大治可也仲尼至聖之徳祭必先於簿正迨俗化陵夷乃有髙士不為主簿之說余嘗疾之寜海亦萬家之邑官簿散脫為甚盜而去之者家日以益裕而名存實亡者致無以自給今欲一釐正之使黠吏不得竄跡於其間而良民受其賜不在勾稽之職乎主簿栝蒼陳公儒家者流沈靜端敏莅事兹久官修道行廼以壁記之闕一朝作新命知㣲記著嵗月故因進其說如此異時必有指是刻而相告曰自某充是官而籍之散忘愈甚也自某善其職而散者因以復合也則斯記之設豈無所取云爾哉矧厯年于兹故多聞人則揭而著之以示不忘兹亦後來者之責也陳公名雅盖學校舊人今所可得而記者僅二十有三人云寜海縣新建衙樓記錢惟演古者郎官出宰雖班有土之權縣令得人自契震雷之象所謂子男之國實為父母之邦其政不得不修其門不得不壮是故羲經設位式著乾坤之名老氏垂文亦陳道義之說盖以限閫域於内外順闔闢於徃來其或肇創重樓齊列大道斯又為一時之輪奐使百世之謳謡者也當邑漢㑹稽之回浦鄞二縣地也後漢改回浦為章安晉孝武太元二年分鄞章安户置之唐武徳中改海州為台州寜海屬焉自開皇迄唐大厯其間興廢靡定遷改不常圖牒具存斯不復載眷惟靈壌實曰奥區地接天台路連石姥時生英秀代出神僊一𣲖桃源阮肇舊遊之勝境千尋瀑布興公作賦之鄰邦自武肅有國縣署之前本無崇制門闥之設止乃平居浸厯嵗華率皆頽毁梁柱悉蠧陶甓不完風雨雪霜欒櫨莫庇皇上耕籍之年秋八月我武寜章公來莅是邑性惇寛裕動合典常専文學之科預英雄之選以詳雅鎮俗以惠愛字民雖位屈於十銓而利均於千室下車數月布政多閒睇廣厦以爰周歎閈閎而未備有邑人陳繼安暨鄉䣊耆艾等列狀獻誠願謀新作既輿情之允洽豈人欲之可違公察以由𠂻聿從其志故冬十有二月因農之隙庀徒以時大則輸梁棟之材小則致榱桷之用官無醵斂民皆義從押録薛宗等夙事公庭恪居吏局共謀樸斵盡瘁勤勞髙卑悅隨上下胥樂一心衆力百倍厥功景祐改元門與樓成軒檐半空烟霄咫尺欒栱交結丹漆相鮮晴曦下照於觚稜翠巘四圍於爽塏䨇扉洞啓冝駟馬之並驅層構鼎新若蜃雲之擎出華不極侈儉皆中規仰之彌高觀者如堵翼日公乃謂鹽𣙜侍禁王君賛府評事闕君曰我之必葺幸已成矣豈非由能幹之宏才假通明之奥思以兹公政共成此門不然則何以致累任之闕一旦而備宜乎張絲竹羅樽爼㑹同僚登是樓而凭之逺可以觀耒耜之勤近可以採風俗之語比夫庾元規之登望王仲宣之消憂彼皆賞翫物象娯恱情興不足同年而道耳於戲斯邑也剏置近數百年斯門也朽腐知數十載是邑之民得不思經度乎所以然者盖以待明公而作之庶播其芳風者哉余受代葵丘經㳺花縣俾兹撰述靡容固讓敢以直書是嵗五月二十有七日記赤城集巻四
