body:
  text: 赤城集卷十四宋林表民編桐山石橋記羅適距縣東北隅半舍之近有聚落焉曰桐山而一溪經其中溪亦因山而名按圖志詰諸父老而皆莫究其所稱謂之由每以霖雨暴㴻諸壑畢會則是溪漱齧堤址汹汹不可禦昔為梁以木濟諸行者曽無期月之固由是往來之人嘗病其涉邑姓有應氏名宗貴者實良民也其先京洛人錢氏伯國始居於此亦有承制而為校書郎者宗貴視昔橋之不能固而人病其涉也遂一日集其族人與一鄉之强有力者議之曰橋之為患也如是吾屬餘金榖矣將焉為哉苟能置石而易之其利不亦博乎諸君朂之於是各捐鏹以給其用召一釋子普寧以督其役不踰月而橋成凡植柱二十有五鑱板二十為錢總五十萬一邑之老幼四方之商旅有過而觀者莫不喜嘆之噫東臯野人世服農力穡而已非有文史之教也非有法令之驅也其守鏹嗇粟以愚其子孫也冝矣而能捐有餘之資興無窮之利以起千萬人之喜嘆者不其韙哉使之推大是心能擇子弟率親戚教之以儒術已而成粹美之器中廉能之選俾德澤仁術有所沾潤其為利也豈止若此而已哉彼之喜嘆者又豈止千萬人哉邑之士民羅適嘉其存心也為之序其本末而書其同議者之名氏則附于碑隂焉重修桐山橋記唐仲友淳熙辛丑嵗余守天台既作浮梁有自四明來者曰水無大小苟無阻咫尺千里寧海塗有二澗橋廢病涉能復之乎余以救荒辭越明年邑民張潭以狀請曰邑有桐山道士二橋將復之當得官為之主余喜問曰客告我久病未能汝慨然當之此富人之美事能不作輟乎對曰某非富室獨好周急食餓施棺顧惠尚狹今投老若二橋復願畢矣余察其貌端而柔言寡以慤似表裏相副意能成事者為出公錢十五萬榜募助役未幾余解去越三載持邑符與吾里僧良又書來曰自經始連嵗歉竭力成桐山一橋曩許為某記敢以請且言橋故以木不支朞月嘉祐中邑人應宗貴與其族更以石鄉貢進士羅公適記之繼亦圮壞某相水勢不可與爭架木為飛橋如兵書所謂天潢者三節兩重長七尋有六尺覆以板甓甃其上翼以石欄岸髙尋有七尺疊石各廣九尋總公用費千緡郡邑錢合十八萬民錢三十二萬餘皆某力始於十年孟冬成於明年季春某志其二幸一成余歎曰吾去郡意橋難就汝以家當郡邑豪民之力以績於成可謂仁且勇矣古人有言以功濟人者報以夀茲橋獨非濟人者乎徒出力猶當曰功况費財汝惴惴以老為憂天獨無報乎汝年未也吾聞戰勇氣一作再衰唯仁者之氣異於是利及於人中喜之氣自倍桐山之利博矣吾猶以初約望汝則吾言於傳逺猶信對曰謹受教因書以授之橋側有大松竒蹇如龍行者遊息亦道塗之勝當與橋相為久者南塘記胡融有宋南渡之明年吾大父自峽溪翦棘荆蓬藋始居此斗指兩辰越今二十有四閠矣蓋吾邑之山發源自鳥石隆隆隱隱東行三四里始折旋而南故凡邑之公廨與民之屋廬皆在爽塏環邑內外為陂池為沼沚者蓋寡也胡子之居適當卧龍之脅其地形稍正其土之支𣲖稍分其坳塹處稍有泉升髙而望其坡陀之形或如瓜蔓如博局如叉之折股度其勢可遏可截可瀦可滀顧吾力未能也丁未之秋始羣役人輿壤而築之不踰月而堤成一夕大雷雨里巷之水爭相灌注詰朝門牆之外髙下皆水揚瀾起波匯為藪澤氣象如在明越苕霅間也一年而荷生二年而魚肥三年而桞成四年而鷗鳥馴五年而堤上之竹秀既而遊者來漁者入滌者至汲者集胡子與客常㳂堤而行折荷弄流渺然起江海之想夫一水之縱廣不能十數丈視三江五湖財一席爾而胡子侈然自大詎不陋哉蓋天下之理巨細廣狹皆生乎人之心逹乎此者閬崑近在於蓬室一闥室小而八方存焉事固未易以形論也苟不以形論則洞庭彭蠡不翅乎礨孔而蚋翼蚊㫸亦可以覩嵩華矣今吾之水兩涘渚涯之間雖可以辨牛馬烏知其不如扶桑之東渤海之尾彼又烏知其一滴一勺不可以浴日月而涵魚龍也胡子方將築亭其上投幘解屨以洗去其平生功名之念具釣車舴艋笭箵罩罟以窮烟波之樂願從吾遊者當艤舟以待之縣學新泉記李知微土之有泉如人之有血脉自非磽硧斥鹵不毛之地則凡都居邑宅雖百人之聚亦未有不依泉而立者甚至權其輕重以驗其氣之粹駁俗之薄厚好事者或又從而品其味之髙下以别之廬山之簾泉惠山之梁源至瓶榼走萬里相餉其為世所重蓋如此寧川海邦也瞰臨渤澥鹹氣所鍾宜不知以泉為貴乃嵗甲寅有泉溢於縣學講堂之左不假疏濬自然清甘凡學之用汲盥灑濯以烹以飪取給而有餘識者以為是學校之祥焉世方隆儒重道闢館以延英俊則論秀當自茲始其謂之祥也固宜然解散於數十載之餘收拾一二年之頃纍功未深美意易虧則隂相默祐俾之持久而不廢者匪兹泉孰聚之乃歌曰挹泉之清兮澡我煩襟雋永芳㫖兮憩息書林自今而往兮無有遐心再歌曰人莫監於流水而監於止水積善於躬兮其觀在此自今兮欽於世世歌闋而去放生池碑張端恭惟主上臨御以來履國步艱險痛二宫蒙塵憫生靈塗炭念祖宗以仁孝治天下乃廓度量戢干戈同盟鄰壤冀以迎奉二宫而息生靈之禍十有六年秋翠華南旋極為長樂是後屢遣間使􅈤迓淵聖皇帝鑾輿其親親仁民愛物之心可謂備至明年大臣百辟思有以發揚盛德而伸報上之誠以祝萬年無疆之夀以為孑孫千億之祥援唐肅宗遣使天下置放生池故事以聞詔可其奏爰命措置蓋將示天下以好生之意俾人知為善物遂其性也臣仰嘆聖恩沾被動植古無倫比恭與官吏士庶尋訪舊跡皆云昔雖未有今上皇帝與人為善與物為春濵海之民感被聖化洽於其心創而為之孰曰不可垂髫戴白衆口一辭於是度邑治內外之地乃得妙相寺之舊池闢而新之疊石而甃之環以欄楯周圍十丈有奇命寺僧守之遇天申聖節舉而行之使含生之物圉圉洋洋頒首莘尾不罹罾笱網罟之患其利博哉臣庶以此而奉吾天子吾天子以臣庶所奉而承顔長樂其樂烏可已耶况魚之為物非若獸之善走鳥之髙飛網罟所至罾笱所及雖婺婦亦可得之先王為是川澤有禁漁舍鰥鮞美萬物盛多則以魚麗為王者之政言萬物得性則以魚藻思王者之德今天下州縣率遵聖意思波所鍾罔匪文王之靈沼豈止肅宗八十二所而已行葦忠厚指日可致萬夀無疆本支百世永保宗社以太平茲天下臣子之公願而感召之理固亦宜然臣謹拜手稽首而獻文曰天地大德惟生之云德配天地與萬物為春何以先之親親仁民皇帝即阼國步多艱生靈塗地二宫蒙塵痛軫宸慮以柔圖勳乃戢干戈敦好厥鄰奉迎太母長樂極欣繼遣􅈤迓淵皇是謹同樂宇宙開樂寧親大臣百辟誠欵獲伸放生之池唐肅是因伏於閣門拜章以聞詔可其奏臣民率遵恩波所鍾遍及無垠能盡物性至誠則然於物咸若詩書備陳今吾天子克光於前俾爾含生游泳淵淪池也如此江湖不言四海歌誦天子之仁必得其夀億萬斯年本支百世繩繩振振大開明堂四夷咸賔薛公井記齊碩薛公井者故寧海知縣毗陵薛公抗之所鑿也隆興甲申公來長斯邑利興害除衆以便安初市去水逺汲者頗囏於挈㩦公浚大井於縣治之東北廣度坊泉源寒冽惠利博甚厥後泄治弗以時殆泥不可食嘉定癸未郡守齊碩訪得其處而溝渠湮塞甃甓傾圯非復舊規乃捐緡錢命縣丞張修董其事既加浚治復作亭覆之庶無負前人開創之意且丐名翰墨手大書其扁揭之亭上并銘而列之石於以永邑人甘棠無窮之思云其源也深其澤也永流祉不窮如酌此井八景樓記高似孫帝子降兮北渚目眇眇兮愁余嫋嫋兮秋風洞庭波兮木葉下此瀟湘風景屈宋情思筆力不可控書不可殫杜工部詩天寒漁父網罟凍洞庭瀟湘雪千里兹倣佛爾可控耶桞桞州詩烟銷日出不見人欵乃一聲山水緑亦梗概爾可殫耶控耶桞杜以江山自任目厯身涉大略若此若之何并包也囊括也山水之壯壯於湘中莫如海風物之神神於湘中亦莫如海六鼇出沒三山若沐乾浴坤一碧萬頃天琛水怪鮫室珠宫何有何無祕怪恍惚尤非湘中所可及然騷人所少至壯士所少遊故事軼而不著跡鬱而不彰然如隂鏗詩海上春雪雜天際晚帆孤羅隱詩洞連滄海濶山擁赤城寒韋述詩樹入江雲盡城銜海月遙祖詠詩海色晴看雨江聲夜聽潮耿湋詩海田秋熟早湖水夜漁深包何詩海雲朝滿市江鳥夜喧城喻坦之詩海曙霞浮日江遙水合天李頻詩隂霞出海散落月向潮流顧非熊詩塹起背城鴈帆分向海人李益詩片雲歸海暮流水背城閒詩家者流雋賞固不一可景名尤不一也英英哉陳君堯章甘栖其濵斫其麓凡海情狀以智受之又希昔人所以心乎愛矣者為其游息之物髙明之具雖未得拍斯䦨建斯酒固已翛然望蓬萊之雲氣懷乘桴之壯遊為之辭曰鯨可鞭兮走鱗洲右洪崖兮左浮丘拂北斗兮違玉樓閬風寒兮雪意秋天不濕兮海西流腳踏月兮舞鼇頭兩鼇前兮挾吾舟龍起舞兮魚飛浮酒注海兮不可籌蕭玉裂兮慿夷愁呌夫君兮一夷猶夫君醉兮吾歸休應心泉記賀允中居士賀子忱編茅為屋與其孥寓居於天台山萬年禪院之西地勢爽塏土脉深厚植花種竹日以成趣惟是水之去人稍逺而饙餾滌濯之用不足上有小澗走以竹渠則寒月常氷下有廢井汲以桔橰則人力深勤一日居士齊心炷香仰首穹靈而祝之曰聚族百指結草而居上下蔬食甘苦一律所需於世者甚薄而瓢飲之樂未適其願昔耿恭拜井而泉溢王霸濟渡而氷合雖今昔異時閒劇殊事而約已為衆有求斯應誠苟至焉理則均也神其吐之乎既祝之十日旱陽驕亢氣蒸如焚舍之東北相去十步不加穿治天冽之泉既潔且豐其甘如醴其寒如氷其澤如玉其清如鑑由是一家之用不煩人力而遂給足衡茅之勝寖以膏潤矣山中父老明日舉相謂曰此地無泉何慮𢾗千百年君居未久而浹旬之間忽於平地湧激靈源若出造化如是之敏是何祥也豈天嗇其竇將有待而出耶抑時至事契而適相濟遇也將以化尼父之雨以資之後學耶將以興傅說之霖而被蒼生耶不然則泉源混混不舍晝夜胡為一日而驟至也居士曰汝無佞豫豫將告汝夫通天下者一氣備萬物者一誠我之禱也以衆泉之應也以心天地鬼神昭昭然常在人上若將閔豫而告之曰爾家何貧爾志何清棄官何勇樂閒何真人棄爾取人疏爾親處荒山以自適邈四顧而無鄰地若有泉而不畀天下其孰與為仁以吾心如陶潛故得泉涓涓而始流以吾心如李願故得濯清泉以自潔吾方將拜天之遺落泉之成借此之居以為斜川盤谷求諸文人作賦序以侈其貺而流其聲不亦可乎父老曰唯唯居士乃命工甃康濟泉記顔度臨海令顔度乾道三年五月二十四日祈請白鶴山靈康祠見寢殿右階下水津津溢地面穴之得泉自殿址出與左靈濟泉適相直無分寸差因名曰康濟以廟名且取人兼濟也築亭泉上如其左八月二十六日亭成書是為記節孝巷記石墩淳熙二年臨海郡尤侯袤奉慶赦書上故鄉貢進士朱伯履妻陳氏賢行天子嘉尚有詔特封安人旌表門閭仍宣付史館明年春三月詔下侯即其家樹闕復其子孫世世毋有所與如律令又名其巷節孝大書而揭之郡人創見奔走觀瞻歡呼嘆羡歸告其家室及其姑姊妹女子相勉以安人為法安人子希尹希牧移書墩曰吾母旌表吾將求諸給事吳公為之記節孝名巷子其記之墩安人甥也二表兄命墩墩何敢以固陋辭竊嘗謂天之生人莫不豫之以仁義禮知之性使之有君臣父子兄弟夫婦朋友之倫性焉安焉之謂聖復焉執焉之謂賢窮人欲而滅天理民斯為下矣夫先王之時道化行人倫明故人不失其性雖江漢遊女無思犯禮汝墳婦人能勉君子以正去古既逺上之人專以刑政為治民免而無恥所謂士者固已馳騖乎利欲之途一遇難厄往往忘君臣父子兄弟朋友夫婦之分彛倫攸斁有不忍言况婦人女子乎國家聖聖相承為治不專以刑政比之近代習俗最美忠臣孝子義夫節婦名聞於時不可概舉求如安人節孝之全則亦絶無而僅有貢士之沒也安人方豐少或以再行為言安人號慟引刀自刺左右救護得不死事父母舅姑孝姑百餘嵗安人順承無所不用其至教二子問學皆有聲稱為女為母之道於是乎盡天瑞孚應園桃異實庭萱合頴卒之郡侯有請帝命下頒行成閨門名垂史册節孝之巷輝映山川盛矣哉惟天子仁孝本於天縱以太上皇帝夀登七十亘古未有躬行慶禮恩被臣庶訪求節行尤為丁寧思欲風厲天下俾天下之人不失其性不亂其倫以漸復三代之淳厚故能旌安人之賢惟安人髙節至孝為人之所不能知知而不惑仁守而不憂勇决而不懼故能膺非常之寵惟郡侯尊主庇民至誠惻怛故又能推廣天子德意而取節孝以名其巷者劉卿妻桓氏刑耳自誓沛相王吉奏髙行顯其門閭號行義桓婺殆與安人異世而同符視鄭公之鄉髙陽之里誠不足多鄉使安人生而男也術斯以往於治國平天下將無所不可婦人女子成就止是可不惜哉安人年九十有四齒髮不衰自今福夀益隆子孫益昌豈唯一郡一時之所矜式四方萬里之逺百世之下聞安人之風亦必有興起者矣安人奉直大夫守中之女太子詹事良翰之女兄朝散大夫景山之子婦朱氏望出義陽五代之季縚自永嘉徙臨海世以孝義相傳至安人始益彰著遂逹於上云朱氏旌表門閭碑吳芾淳熙二年今皇帝以太上皇帝夀登七秩亘古無有思鴻厥慶施於臣庶乃十有二月赦文孝行節義著於鄉閭者長吏以聞當議旌録先是元年正月台州守臣詹儀之奏州之任者暨士民凡百一十有七人合詞言臨海縣貢士朱伯履妻陳氏有節行伯履早世年盛子幼媒氏請復有行陳氏撫膺慟絶既蘇歎曰吾寧速死忍聞此言引刀欲自翦侍婢亟持之乃免事父母舅姑至孝姑宜人林氏年髙齒豁陳氏手調㫖甘動能順適其意姑垂絶執其手曰願婦子孫夀數如我訓二子希尹希牧有法以文行孝友稱陳氏年九十有三齒髮不衰姆則壼彛州里所矜式天産祥嘏厥有桃實萱頴之異請以其事列諸朝特加褒表以為節孝勸州遣吏按驗如狀謹以聞十月守臣趙汝愚繼剡上皆未報會慶禮行耆年髙節悉加崇奬邦人援以為請守臣尤袤申前奏上嘉其節明年三月壬戌有㫖特封安人旌表門閭仍宣付史館詔書至闔郡歡迎耋稚竦觀植門建臺諏協令式臺成有白雀翔於上見者異之一日希尹希牧踵門曰母氏之節亦既列於贊書詔於太史矣願公勒諸石益為不朽傳芾辭不獲命則進二君而言曰豫昔與君之諸父逰習聞君家事君之祖母林宜人治家以禮法教子以義方聚族千指內外無間言宜人年百有一嵗時郡守宗公頴欲請表其門會頴去弗果善積益豐委祉厥婦安人實太子詹事陳公良翰之姊風節義概濡染素熟承姑慈訓厥德惟肖庸能身享上夀保有全節方聖上以孝理天下湛恩下逮首承天寵為世世萬子孫光耀且俾鄉之為婦為母者以安人為法今君又克順承侈大之是皆可書也已豫既紀其略而又繫之以詩詩曰婦德之修至隱而昭行成於家而列於朝國有勸懲當罰而止孰觀而化表厥宅里淑哉若人識明志堅之死靡他不二所天節則髙矣報亦云侈既畀以年庸介爾祉嶪嶪崇臺左右其門匪臺之崇維德之尊詔而子孫勿替勿懈永言保之毋俾臺壞告而里閭而婦而母惟節惟孝惟臺之視聖孝不匱善推所為我詩於石垂世作規東巖堂記曽丰天台鴈蕩二山見謂二浙第一勝處山距郡逺近郡士大夫往逰焉酷愛之觴酬詠酢之不足假繪素以幻其姿行輒自隨又不足假石以幻其態坐輒自對又不足相所居前後左右山天所豫形峥嶸耶畏佳耶陂陀耶壇曼耶百爾屈竒與二者倣佛則又因天之資參地所宜宜花藝花宜竹藝竹宜木藝木以為家園因人所藝參地之利利亭築亭利臺築臺利榭築榭甚者軒堂樓閣具以為園觀公退私郤曼賔客不者道家人濕則從目燥則從足花竹木之間醒則從坐醉則從卧亭臺軒之上嬉忘倦倦忘歸士大夫之所及類然也今臨川史館修撰郎中陳公又有出乎其類者存曰山勝不失兩全園勝寧容一偏於是劃所闢城東𢾗十畝而東西之東所揭曰小瑶曰生秋曰瓜風曰蜜露曰齊芳凡五匪亭臺伊軒榭西所揭曰閙春曰見笑曰問開曰花嶼曰飲巢曰數紅曰記好曰涉趣曰四友凡九匪伊誰之外則二堂突兀五居右故東曰東巖五之會也西曰勝賞九之會也物不兩大東巖又西勝之會歟公自慶元丁已經始於茲未考工且治且享自為韵語樂章發揮之諸賓客賡音就詠創思别吟又從而推廣之園無遺景景無遺勝卷軸轉至余嵗在甲戌矣徽音徽思殆盡式紬且繹堂為園不可泛觀圍為山不可常見設也夫山鮮有不屈奇者惟士大夫胸中自有屈奇然後山之屈奇聽命焉園所揭十六大歸取花竹木故事命之東堂則惟巖勝屈奇之最而巖體中虛又與道似故耶道以虛御羣有巖以虛御羣勝魏國張公之紫巖衛國留公之梅巖侍郎李公之巽巖雖莫非以其與道似取也抑亦三公道與巖似此以此之屈奇命彼之屈奇聽交相合符然歟雖然三公者二職經綸一職論思畢然後退與巖休公出為使入為郎時則二未一職已經巖始亡乃太蚤計是不然巖之休公之心同一虛也心與虛俱道眇天下公所見未必不毛視法從粟視宰輔論思經綸國務所急者猶我須歟虛以應之不我須歟虛以聽之虛在我須在彼所虛大小何如我所計也大須則大應小須則小應豈我所計哉充公之虛應國之須大以小視小以大視無不可兹於臨川也小以大視來哉出守與虛舟俱戾止坐填與虛位俱歸歟入息與虛室俱而生白矣大以小視將不外茲意者巖特其虛所寄之一猥於堂之未記也周諸賔客推廣意記之公廣夀字成卿云明年寎月望日記赤城集卷十四
