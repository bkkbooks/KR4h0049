body:
  text: 赤城集卷十八宋林表民編赤城續志序吳子良台為郡餘千年赤城志猶未就卒就於前太守齊公碩其未就者何見聞狹而亡以證事蹟散而難於聚也其卒就者何來訪於士友屬筆於篔窗有以證易於聚矣今其書凡例以義起去取以法定著善别流品因事列篇什按是非於故實感得失於世變寓勸戒於微辭實關教化何止證之聚之也哉雖然證之聚之愈詳無害也而一時采訪未免豪髮之遺宜續書志以綱系目廢牒墜翰無所系難悉録雖不録又不欲棄宜續書今太守王公梴廣齊公之政百緒厲翼若浚河復經界以便民修學闢貢闈以便士最要者也前者幸有繼後者期有考冝續書於是教授姜君容條畫以屬東魯林表民逢吉總書之為八卷俾子良參訂焉門類率與本志協所證所聚愈詳矣而書豈徒取其詳而已乎使讀赤城志者詮評流品而思勵其行紬咀篇什而思暢其才睹是非而開漫漶念得失而重沿革悟勸戒而審趨舍詎小補哉夫然後取是編而續之見其步驟前作殫智苦心謂皆無補不可也書豈徒取其詳而已乎赤城三志序王象祖赤城志作於太史陳公耆卿凡例嚴辨去取精確諸小序凛凛乎馬班書志之遺筆莫可尚矣其友林君表民與修焉而林君又為續志紹定己丑郡陷於水倉使寶謨仙遊葉公再造有邦復俾為三志博雅考訂有源有委非斯人不可也君謂豫曰志數百年不克就今就未十載而續志三志繼作不贅乎古事備矣今所書止城築建立不略乎豫謂作當問可否非贅非略之嫌也今郡之圖牒古諸侯之國史也春秋非魯之史歟大水以災書城邢城楚丘以存亡書新作南門雉門以修舊書後世圖牒之所有者多經之所無則經之所有圖牒固不可遺也三之何害又問人物有志今天下之母育於吾邦之相門書乎否乎豫謂紀季姜歸于京師過我猶書況所自出哉三志於是論定嗟夫水之方作咸謂郡無前聞爾有老父指暗壁浸宇示子孫曰慶厯五年有此矣已而儒生考載記搜碑刻惟蘇君夢齡新城記得於倅㕔壁之刓碑書城築頗詳而城築之外無見也故字畫有考則老父之暗壁猶信紀述不備雖堅珉深刻可憾焉傳春秋者謂其不詳也使後之指今逺而猶可考不在兹志乎蘇記謂慶厯必復之責屬之外臺當時未有倉臺也漕憲畢至而元公絳又為之守今一人任三人之責而功又倍之兹而不志則後之恨今必甚於今之恨昔也林君又立災異紀功二門有得於春秋之遺意皆郡國圖牒所無者繼或有因必自赤城三志始矣養濟院創置修復本末序趙必願恭惟國家上接三代以仁造邦凡顛連鰥寡無告之民恤養涵囿載在令甲咨爾守令宣上德意乃奉行不䖍視簿書獄訟財賦之外漫不加省惟我先祖忠定公將漕江西創院養濟廪租設廬可利永久尤文簡公繼之不替舊規用加惠於一道元祐黃太史之孫監丞君實家于洪其守丹嶠乃倣斯制度地城南為贍養之所又撥在官之田籍其數以須奏報所以為民慮至悉也嗣是不能世守給復者不辨請鬻者不遏因循釁災籍蕩無有紹定癸巳朝廷不以必願不肖守藩於此實惟我先忠定公之舊治視政之始按養濟之籍名存實亡暇日與同寮趙君體要閲視其處則敗屋數楹壁垣不備因念承乏牧養幸前人規置尚可討理不待更創乃核現存之租增撥入之田庇存有宇給用有器經今圖後以待其久既為條列鋟梓又命所司别藏其副雖不敢自謂詳密然推而行之或庶幾焉雖然必願之來適繼水旱補苴罅漏日有不給而又守此未朞易而去故他欲廣聖朝仁厚之意以續我先忠定公之遺惠者多不暇講而於此僅舉而未備後之有志於民者儻不以人而廢其政則必願拜賜宏矣事難成而易壞大抵然也況於天民無告者哉送滕子勤赴衢州司録序陳公輔天下之事得於所聞固不若所見為詳且確也余在都城聞賊攻台所賴以無事者滕子勤爾初未以為然及歸見州人稱子勤不容口無大小貴賤皆以再生之賜歸于滕公是知不妄矣嗚呼時方無難賢才隱於難知欲觀賢才之實必在有難之時疾風徑草歲寒松柏誠言非虛語初賊起青溪二浙方驚子勤以為攻守計寅夕警備誓與台人同其死生然賊鋒尚逺人固未知其果何如韋羌羣冦已破仙居水陸夾進逼于城下太守且奔矣軍民皆解體其他官吏皇皇莫知所向子勤獨奮然曰今日之事吾誓不與賊俱生扄其家人輩不使聞變而擾申戒諸門有出城者斬之官吏始不敢動羣情稍安願效死以守城凡圍十日不得逞而退子勤更益其備罄倉廪府庫以犒軍士凡所經畫皆觀時之宜身任其責無纎芥自嫌其忠誠所激如是後四十日賊復至民知子勤之可倚也捍禦愈堅賊徒數千擁衆而登城上皆鼓譟矢石如雨賊兵多被害遂退保招延去城四十里不敢進洎王師擒渠魁餘黨殄滅台州卒完微子勤吾知一州無噍類矣朝廷叙功京秩且患三衢經破蕩思得人以贊治令録州事將行民惜其去願借留不可咸謂功多賞輕未足以稱而子勤處之恬然乃曰臣事君無逃於天地間吾之遇賊以死守者義所當為豈有意功賞哉由是益知子勤之賢為不可及何以言之國家承平既久州縣玩不知備一旦變起如錢塘之大賊唾手取之自浙望風遁去殆百數輩責其死守者幾何人哉及賊已平或因人成事或既逃而還乃更較計功績規求國恩人人有徼幸之望是誠何心哉二者子勤皆所不為果不謂之賢乎子勤名家子少喜學問余初識之於台聽其言詳其趨操日已知其不凡決謂其能立事今兹果然余憂居廢筆硯於子勤行不可無言亦慮夫世人不能知子勤事詳且確也以台人所親見者録而序之庶以識别滕侯守台頌并序李昌齡自古以孤城弱旅抗暴悍之師而全名髙節輝于天下者幾何人哉必皆信以先之謀以定之而後勇以決之蓋非信不足以撫民而用其命非謀不足以揆事而制其機非勇不足以守死而克其敵故參成而後可以圖濟嵗在宣和盜發睦鄙天下平治既久民惟耒耜之知不識金革吏惟文法之守不習戰爭勢熖所焮聲震甚逺大將望氛氣而棄甲牧守聽音響而委城故盜得以狂奔呌呶不遇一矢之禦而攻取所至無留難者時旁郡羣不逞之人亦因其聲以相轉誘屯聚攻剽吳越沸然於是睦歙杭處衢婺六州悉陷於賊惟天台介六州之間於盜甚逼而獨以全何恃而然哉守之得人而已其人則睢陽滕侯也當是時侯非被長吏之命為守禦計然一版曹位甚卑不足以使衆乃能全郡於盜所甚逼必將有以矣聞之台人曰侯慨然興歎謂報國惟有赤心家人撼以危言撫劒逐之又為書屬其兄以後事信足以孚於衆也誘鄉兵得三千人分城排為十三寨部列有次號令甚嚴謀之臧矣冦至圍城數周火光燭天呼震林木衆皆股戰膽掉不敢下視侯擐甲冒矢石躬自率之士氣始振􅏌然有鬬志賊乃斂衆而去暨賊再來必欲拔城衝鏑之交侯遂以死囚尸諸城上且屬聲遍呼曰渠帥死矣衆響應之盜皆失色未及馳去侯以一矢斃其帥於是大潰旬日王師繼來盜是以殱台是以全當是時非侯之勇足以濟其謀而用其信台何恃而不拔也台人又言盜之未潰皆自相驚以為有神人金甲而身數丈者執弧矢以令諸城上兹實天之佑侯也已夫用武之世家習鈐略人便弓矢熟於戰爭能致其死與使人之致死則易時當和平家豐益人安富貴能致其死與使人之致死誠難而侯乃能之髙牙大纛前賞後刑其使衆則易秩不足以寄重權不足以用威其使衆誠難而侯乃能之則侯之功前於古而莫擬疇於今而莫倫矣惜朝廷之賞猶未足以稱其功也苟圖其勞登而用之謀諸帷幄寄以疆場使盡行其志則侯之功徒足以全天台也哉豫聞侯之先曰章敏公左右國家克樹勳績今其保世之人實濟厥美天且昌而大之使弼有宋苟將大之其在侯矣台人像侯之形紀侯之功以刻諸石俾流於逺且使其世勿忘侯德載瞻載嘉頌以贊焉頌曰赫赫王事被於九州彼冦維何有詭其謀裒鞠凶頑俶我吳楚狂奔呌呶肆厥螳斧民之玩治弗能勝兵冦乘其虛遂墮六城豈無斯侯不用其則豈無乘戎是棄其律彼台且都在冦之宅無競維人冦莫我即非莫我即莫我能克人謂伊何有侯之滕明信靖謀是圖是勤勇以決之孰余敢陵彼昏卒狂再干大戮斃之一矢駭禽奔鹿王師嗣來盡磔梟蝮天台之全吳楚以康維侯之功與勞於王誰以滕侯逹於旒綴登而用之以畢其智無俾封殖獨于台人俾乃勳德均我有民頌言不誣敢告司鈞送通判黃瑊中舍序陳襄台州慶厯五年夏六月大水死者數千人適遭周謝之政二公弗協天災致禍荼毒生民老幼怨咨無所寧息已而元侯受命作牧侯來為二小人間之且憂且寧有來勉侯曰元侯有材而賢侯好義而直重剛相乘其勢必爭今台民未寧侯惟念哉庶政惟和時乃生民侯曰然既至左右元侯侯先不疑辦事曲直不撓於氣不形於色無所不瀝肺膽而陳之元侯既信無所不以虛受之二公同心庶幾大和百姓康寧元侯曰吾無以為德尚賴侯侯曰某也惟公之德無曠厥官夙夜不忘終始惟一為可觀也已若元侯者可謂敏而不失其賢若侯者可謂和而不詘其道者也嗚呼彼之事君者何獨不然下焉者好已之勝人上焉者惡人之勝已材相似則爭位相近則陵和之不復可知矣使宰相以至百官和於朝百姓和於國萬物和於野至和之氣盈於天地唐虞之世矣夫某目二侯之德因有所感為侯序之以送其行送葉孟我官寧國序陳耆卿嘉定改元夏五月鄉先生葉公孟我出為宣之寧國主簿是行也邦之大夫士樂而賀之走獨以為歎宣言曰邦人知公耶公問學如禹治水政制度如周公畫井田制賦落筆為文章如庖丁奏刀而匠慶操斧少已負聲望入太學名流特異之當是時謂萬里可立致命不隨汨汨以老諸凡友公研席者或已為公相師公方册者多已為卿大夫公獨栖遲故山僅僅妻子養寒月半簾清風一榻蕭然弔影居人之所不堪是坐何尤哉寧國小邑也主簿卑官也吾方以為公弔奚其賀雖然吾為公平心而言之公亦為我平心而聽之天靳才人樂富貴二者之難兼自古固然蓋亦造物之神機所以暝眩一世者必不得已而去曰寧去富貴富貴無聞者多矣而至於哲人雖餓且死名猶日月也然則將奈何邑小則便閒官卑則逺謗琴髙之山謝晀之亭前跡往事豈無怪怪竒竒為公獻者邪勾稽暇覽而歌之其聲與天籟相宫商而不雜則其視一主簿秩已為凂已無論其大詩云一日不見如三月兮況三嵗别乎此則豫之所以悲大成殿奉安先聖文王然維宣和五年歲次癸卯二月乙酉朔宣教郎知台州黃巖縣管勾勸農公事兼監鹽監王然謹以清酌之奠敬告于先聖至聖文宣王天台之南鴈蕩之北有古東甌薄于海濵地廣齒蕃多士攸集惟聖祠學序禮義所有往被冦攘延爇蕩盡然效官之始首議營建爰即故址改卜新宫寒暑載離一新廟室柱石磐鞏簷牙翬飛輪奐有觀華侈中度庶幾乎揭䖍妥靈昭示無極涓吉告成祗遷貌像以先聖先師爰暨十哲奉安于位仰冀威神俯垂鑒格尚饗勸諭文陳襄為吾民者父義能正其家母慈能養其下兄友能愛其弟弟恭能敬其兄子孝能事父母夫婦有恩貧窮相守為恩若棄妻不養夫喪改嫁皆是無恩也男女有别男有婦女有夫分别不亂子弟有學能知禮義亷恥鄉閭有禮歲時寒暄有以恩意往來燕飲序老少坐立拜起貧窮患難親戚相救借貸錢榖婚姻死喪鄰保相助無隳農業無作盜賊無學賭博無好相訟無以惡陵善無以富吞貧行者遜路少避長賤避貴輕避重去避來耕者遜畔地有界畔不相侵凌斑白者不負戴於道路子弟負重執役不令老者擔挈則為禮義之俗矣黃巖勸學文王然萬物散殊於天地之間其生不同其類甚衆而不能知道則物而已矣惟人受才於天地之中為萬物之靈故可以知道若夫不知道則非才之罪也不學之過也故曰玉不琢不成器人不學不知道且道不可以他求也所以為君臣父子夫婦長幼朋友者也是故其學之也有先後其既學也有始終孔子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文揚子曰威儀文辭表也德行忠信裏也此學之先後也孟子曰仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也荀子曰始乎為士終乎為聖人此學之始終也古者之學耕且養修其天爵而人爵從之而孔子曰耕也餒在其中矣學也祿在其中矣則學之不可以已也如此黃巖古東甌素號多士昨者廟學燬于兵火遂使承學之徒無所依止無所聽讀然受命作邑爰自到官首建鄉校遷于舊址今殿堂告成齊舍漸就亦可以招延士類修舉庠序之風矣比已擇請職事在學欲取新歲肇開講席以來生徒竊慮鄉士在逺有所未知故述斯文更加勸諭非勉之不至也切冀見聞咸悉此意毋忽仙居勸學文陳襄咨汝邑父老夫人之為善莫善於讀書為學然後而知禮義孝悌之教故一子為學則父母有養一弟為學則兄姊有愛一家為學則宗族和睦一鄉為學則閭里康寧一邑為學則風俗美厚其間雖有惡人將變而為善矣今天子三年一選士雖是山野貧賤之家子弟苟有文學必賜科名身享富貴家門光寵户無繇役庥廕子孫豈不為盛事哉豫自到任以來居嘗憫爾邑民不識為學父子兄弟不相孝友鄉黨鄰里不相存恤其心汲汲惟爭財競利為事以致身冒刑憲鞭捶流血而不知止豫甚哀焉奈何奉行天子詔條不可私怒每刑一人若傷膚髮而汝邑民不知豫心乃相扇熾構訟成獄自以為能使豫日不得食夜不得寢以與汝斷蔽略不能改是誠何心雖然非汝百姓之樂於此也蓋不知讀書為善之故也前年曽有文書告諭汝鄉民令遣子弟入學于今二年矣何其無人也古者十室之邑尚有忠信者況今百里之邑良民之子弟不少其間豈無聰明瓌茂朴美之器可使為公卿者然而不使之為學真可惜也今汝父老歸告而子弟速令來學豫其擇明師而教誨之庶幾有成如前所說豫明年十二月官滿即去汝父老亟其聽豫言台州夀台樓記葉棠台在天為泰階主風雨時又魁下而色齊主君臣和而晉志司命主夀獨屬上台何歟夫天生物必夀物生不夀匪天亡之人實戕之紹定二年秋九月丁卯大水壞台州城殺人民踰二萬先一年豫守台八月當大比吾邑士聞城中㑹日夜暴雨溪潦漲怒海潮角之濤波衝撞濺沫女堞城岌岌有聲豫身帥吏卒築闉窒竇迄以免禍居無何朝家不以棠不佞即郡畀常平使者節去數月而水竟作城竟破嗚呼痛哉大抵有物斯有數短長什百智者莫齊焉一旦無少長貴賤皆以水諉之數可乎豫時在越得變告疾馳來發倉捐緡竊用便宜既而有㫖俾兼佩故印凡厥控籲君相惻焉天人交孚晨奏夕報賑公錢三十六萬貫米斛十萬而民始蘇復頒緡錢二十萬米萬斛而城乃新初水之破城也入自栝蒼門豫塞之作樓七間据城上效黃樓以壓水怪邦人聚觀見謂雄麗或言城南有樓丞相趙忠定公所繇建摘興公賦語名為神秀山川宜之今西樓宜何名豫謂此州上應台宿三台之泉鼎足闤闠天台大山窟宅仙佛即上台主夀用夀台名吾樓庶幾夀吾民宜乎他日㑹僚佐落樓之成客有誦活人為勞者豫謹謝之曰棠不佞今日之事幸而集皆吾君吾相之賜棠特同諸君具文書母庸貪天功重謝之曰棠奔走四方久於台獨若有宿緣去復還者五年然僅能止水患於先莫能彌大菑於後可愧也已猶幸使指蒞所部獲與饑溺相周旋不爾詎無章簡元公來棠也何敢覬前哲萬分雖然尚有以諗諸君凡民宅生於刺史縣令民生囏哉同其癢痾時其渴饑天下莫不夀奚獨台民夀不然椎其膚蠧其脂殘椓其元氣民夭矣非吾命樓之意也抑豈上台之心哉客曰敬聞命寫以為夀台樓記城成法當書有今代巨筆在赤城集卷十八
