body:
  text: 赤城集巻十三宋林表民編延慶院免科折記陳耆卿戲龍山在靈江西十里上有澄潭其旁鉅木槎牙拏雲擁日土人謂龍掛其末蜿蜒若戲狀故號戲龍然其潔且嚴不可䙝近慢者斧斤及木溪輒改流其靈怪若此而能赴誠如響吐慈若幻徃徃奠斚未墜傾盆以集大畧見宋進士夏文莊碑然則其靈怪冝若此哉雖然龍固靈物也必有人之靈而後可語龍之靈靈雖有殊而靈於為民則一爾延慶院址山下職潭事供郡邑凡禱之百須其勤與勞得非欲佐人之靈以致龍之靈者哉然則非為民而然哉先是香積法安以龍故得免科折此院獨否太守邢俊近曰不可使我有二三於釋氏廼亟免焉然則侯為誰亦為民爾夫為龍以捐薄少之賦纎損也依龍以治衆多之命鉅益也故他寺觀不得免惟三刹得免焉豈私之葢公之爾嗟夫世謂緇流不耕而食徒蠧民甚不知其徒逐上下佐人之靈以致龍之靈也使旱魃逝而雨師降也豐年而多黍多稌也是雖不耕而食能使吾民耕而食也果蠧民乎哉子規葢主僧宿練精勇喜院之沐優假而欲以著不忘也刋州移於石而請予為之辭州治浚河記姜容嘉定甲申台有浚河之役是役也自慶厯一見乾道再見今方三見也台城山阻江蹙鱗集數萬家迫隘湫鬱於其間為河以導溝澮使人脫沮洳宅亢爽風氣宣洩疾厲不生葢非一日矣按舊志河舊通舟注之江唐許渾陪鄭使君汎舟詩可覆也後淤塞舟不能通值潮溢輒迸城於是慶厯丙戍守元章簡公絳始鑿復其舊而是役一見焉久之注江之衝堙為平陸則自發源北山越郡治平橋至括蒼門匯而之東遂分道為斗門以出河非其舊舟不復通矣而閼塞又甚於是乾道己丑守向侯汋悉力浚治之而是役再見焉河之舊雖難復而閼塞者沛如矣未幾癸巳大河蔽於瓦礫以迄於今非惟閼塞而貧侵富蝕上廬旁塹河幾廢矣雨俄頃濁潦沒道甚或破扉齧屋春夏濕烝疾癘以滋於是今守王侯梴慮之而是役三見焉始季秋迄仲冬命一戸曹恵孔時緫其要喻民治溝溜使各逹於河僦夫具畚挿使輦河之淤土續㫁潢引别𣲖深廣各倍於初因民所利不擾而辦河以丈計緫千五百六十有八而内歸民之侵蝕者什三夫以工計緫萬三千九百有一而内參以壯城者什二錢以貫計米以碩計緫千五百七十有奇而外饋勞之費什一河之舊雖已難復而平瀾衍流環映庭戸易沮洳為亢爽無雨潦疾癘之憂晏然如己丑時矣嗟乎郭内之河民之同便者也通舟注江尤便者也尤便者既以難復而併與同便者幾廢由慶厯而下百八十年而是役始三見時邪人邪余求其故昔之通舟注江城袤而民稀也慶厯復舊城與民未改也至乾道城既縮入而居民多故復之難今愈多故愈難愈難故其尤便者幾廢俗無長慮眡河滋不急遂使同便者又幾廢侯能深念獨决逺慕元公之志近追向侯之蹟幾廢者得不廢焉然則天下事亦係諸其人而已厯百八十年而能浚河者纔三人今而後其獨無人乎夫河不必幾廢而後治人豈必百年而後逢也河自是可無廢則邦人感侯徳與河為無窮修東湖記王亷清天台為郡負山帶江地形嶮巇草木翳薈人烟繁夥萬室鱗比隨山髙下無平川大陸以洩水怒每隂雨霖霪則水泉噴薄澗輸壑委奔流疾走自髙而下如建瓴於髙屋之上閭里之民咸懐决溢之懼厥初經營智者相攸鑿湖於城東當衆山縈匯之要以受百水即城徑庭為瀆以疏之湖高而江低並湖為斗門泄水以注之江旱則瀦畜以待灌溉之須民用奠居無復水患嵗月既久畔援施易土石傾圯啓塞無時葢自皇祐熈寧以迄于今屢作屢廢至是極矣每大風雨至闤闠寖有蕩沃之虞水無所歸不循其流理則然也乾道五年冬秘閣河内向公以淮南連帥移守是邦始是見民吏具宣天子徳意問民所疾苦舊聞此湖湮廢弗除即躬至其所環眡利病考卜協日興工以役公以浙東路兵馬都監開封俞紳才幹有餘敏於集事即檄以董之臨海令會稽陳居安方以民功薦聞興利除菑實惟其職公乃覈舊迹披故道昔之沮礫鬱積者今疏鑿之昔之侵漁蔽虧者今疆理之浚城中之水溝剏城闉之斗門覆以亭屋以引左右之水以進懐義橋之南北又即湖東故城之址舊斗門築三閘以通西江總為斗門者六為亭者一凡湖其南方東西十六丈五尺其北方東西六十五丈五尺南北通袤三百二十丈計其廣輪二百十三畆有奇其深七尺興工於六年二月之丙戍而訖於三月之壬戍凡用功八千九百有奇長隄崇崇清波綿綿夏屋渠渠坊址暨暨不勞於民不擾於市宏壯深廣煥然一新烏虖偉哉厥功告成郡僚邦人咸願刻石紀績屬僕以文乃為之記曰惟昔水利取備於周官溝洫澮川遂人掌之蓄水止水均水舎水冩水詳於稻人在漢召信臣杜詩號為循吏之冠其功始於鑿六石門晉杜元凱儒者之宗請二千石修理堰谷以積其水原其用心豈專為耕耨浸灌之計哉惟公夙以風力知畧為世吏師凡所臨郡國興滯補弊壊奸𨽻之機埽險健之訟施恵於斯民以廣我國家之盛徳是役也披蓁刈荒窮源探本發明前人久廢之績推尋百里堙汨之弊啓作竣事必躬必親無一弗盡以為邦人永永無窮之利用心亦可謂閎矣公今行且歸闕左右帝旁推此心以利天下顧豈久留於郡哉凡此父兄戴公之賜自今其謹儲泄之節相暵潦之宜疏導以時渟汙無壅甘棠峴首之思俾永勿壊尚千百年公之恵澤其有既乎黄巖浚河記王居安古人治田必先治水水有常利故田有常豐禹曰濬畎澮距川孔子曰禹盡力乎溝洫凡此皆治水以治田也周人治野之法夫間有遂以逹溝由溝而洫由洫而澮以逹於萬夫之川自廣尺深尺而為溝為洫遂又倍之而為溝為洫至於澮則廣二尋深二仭是畎澮之間治水有常制也甸方八里以出田税旁加一里以治洫積而至於四縣為都方八十里以出田稅旁加十里以治澮是百里之間治水有常人也若是則水烏得而不利田烏得而不豐今居田者唯恐其不廣不暇為溝洫之地取民者惟恐其不多不復弛溝洫之税是宜與古異也黄巗為邑為田可百萬畆而水鄉之田實居其半其地負山瀕海山多則溪流易漲海近則水澤易洩言水利者有浚河置閘二事而已而二事又復不宻昔之為閘者慮未及河也紹興以前初未有閘大率為埭以堰水頗為髙田之利而下田病之水潦大至下鄉之民十百為羣挾挺持刄以破埭遂有鬪争殺傷之事鄉人於是始議建閘酌髙下以謹啓閉解仇怨以全鄉井此意美矣然諸閘既立開時常少閉時常多潮水一石其泥數斗朝夕淤塞寖成平陸方時巨浸閘雖啓而流實壅於是下田之被害反咎夫閘曽不若埭之可以破决洩水之易且速也東嘉蔡君範來宰吾邑深䆒水利之源初年遂决閘外之港使水有所泄明年遂開田間之河使水有所瀦不特河為有功而閘亦有利矣是役也君實啓之常平使者齊公碩為請於朝役不逾時厥功告成君適被命通守四明属予以記予方守東嘉尋又有帥閩之役未暇也君移書速予記曰苟無記後之人且因循弗圖民復病矣予謂今之為令者以三年為任其始至也一邑之事未必盡知及其知之也簿書詞訟委積紛遝又力所不給大抵趣辦目前数日以待去者既爾來者亦然民瘼之不暇䘏率由此也倘來者念淤塞之易而常加疏導之功知開浚之難而常加葺治之念則君之利吾邑者雖千祀猶一日也君尚書文懿公季子賢而有文克紹其家邑治故有河經闤闠以環公廨嵗久湮為民居君盡復之而民不怨皆可書也予因序河閘之本末俾後之為邑者庶有考於斯文新建中津橋碑唐仲友郡介栝蒼天台間水源二山東南流合於城西十五里東注於海城臨三津其中最要道出黄巗引甌閩徃來晝夜不絶招舟待濟寒暑尤病颶風無時篙師牟利弊舡重載命寄毫髪仲友以淳熈庚子來守辛丑三月常平使者循行迓於城南戊夜登舟篙工失度比曉乃汔濟因問父老江可橋未作何故對以潮汐升降經營為難食於津與瀕江之市又沮之皆中輟仲友自念承乏牧養繼歉嵗入境人草食頼朝廷勤䘏牟麥告登病少瘳矣橋大利可毋作廼分官吏庀工徒度髙下量廣深立程度以寸擬丈創木様置木池中節水以筩効進退觀者開喻然後賦役始於四月丙辰成於九月乙亥築两堤於皇華亭之東甃以巨石貫以堅木載䕶以菑楗中為給道两旁為却月形三其層以殺水勢南堤上流為夾木岸以受水衝堤間百十有五尋為橋二十有五節旁翼以欄載以五十舟舟置一碇橋不及岸十五尋為六栰維以柱二十固以楗筏隨潮與橋㟁低昻續以版四鍜鐡為四鎻以固橋紐竹為䌫凡四十有二其四以維舟其八以挾橋其四以為水備其二十有六以繫筏繫鎻以石囷四繫䌫以石獅子十有一石浮圖二䌫當道者植木為架遷飛僊亭於南㟁遷州之廢亭於北岸以為龍土神之祠為僧舎及守橋巡邏之室二十有一間南僧舍為僧伽之室凡橋欄舟栰之役五邑共之黄巗預竹䌫之頒餘皆属臨海金木土石之工二萬二千七百用州錢九百八十萬米四百五十斛酒二百六十石橋既成因其地名之曰中津第賞官吏有差燕犒以落之命臨海尉支鹽官主橋事两指使同視啓閉擇報恩寺行各二人奉香火置吏属行文書畨將校主巡警邏者二人守橋十有四人皆厚其廪給又以度𢾗名物為圖書禁防法守為要求田畆財用版籍東湖嵗輸公帑數百緡改入焉以備葺費命臨海黄巗令董葺事所以為橋計者粗備矣夫民可與樂成難與慮始方議作橋則疑中則謗既成則疑釋謗弭而說繼之是皆常情耳然慮始之難未若保之之難金石既堅久猶刓而泐况他乎故記其大㮣使人知所勤尚或繼之且為銘曰台江之津憧憧徃來橋之未作吾民其咨豈無智謀亦阻浮議橋之既成其難在繼矜吾民兮憫吾勤兮永詔厥後視斯文兮重建中津橋記髙文虎上即位之明年六月武夷周君曄自大理正行臨海郡守事既一年其始至之两月秋大風㧞木江海為立輙齧岸防及鹵民田而有雨浸滛害於秋稼郡之田事既弗登城東南偏有舟梁以登濟者悉與濤浪入於海時天子抑畏勤䘏詔天下郡縣以災異水旱奏者發粟捐緡錢委長吏阜安之而臨海君其一君既奉詔議賑貸而川涂弗續行者益病有言天台山谷間木之仆於風者可作舟梁而僧又樂輸乃命臨海丞戴若水戸曹趙汝逹程其事而受規畫焉鐍金繩筏舟五十橋為節二十有五祠廬徼屋撤其頽者守僧校兵汰其久施者皆眎昔有加易欄為桓舟設柁楫貫木為筏維䌫以柱則又創謀制良可衞悠逺役興於十月百三十有五日而梁成為錢百二十萬米百三十斛酒七十石施於工者八千六百有奇方是時郡國從事捄民者懼不克支君當蝕弊之日囏蹙之餘公私蓄積可痛饑甿拱手祈命羣情嗸嗸獨能以仁厚明逹清訟省罰調娱全安民迄和裕宣著上徳歸報於天子又能不剥於下民罔聞知植大恵利寓以康䘏用利我台人厥庸為冘大然古者治輿梁大抵以利勝害郡為縣五而天台僊居限以巗嶺少漁鹽舟泝两谿而下者率尚貿遷比嵗始謀橋實規截舟以事征剥意靡在民今所謂啟橋錢者是也夫設橋以恵民乃售錢然後啓檢匿煽虐嵗月未艾是豈善政哉誠能悉捐其舊以盡恵台人則橋可損益而恵無窮已也前十三年余及觀橋之成既不能伸其言後於此乃及述橋之再猶覬其言之聴也乃酌民辭而詩之曰皇矣帝仁子視下民其康溺饑於以對天凡百郡縣孰保畜之顧彼海邦繄君來儀之適是濤颶君不遑處圖厥奠濟孰穡靡實孰艱難蹙孰甿靡食未知㫖蓄孰以川梗梁仆於潮舟流水磔委命寸篙廪之阜之戮力富之楫之翼之輿而及之若時履圻式靖且安父母於君怙恃君恵余亦順理母事令刑君飭津橋湜湜流水後有闉郭前有山趾君與民逰其旂韡韡君戾津橋賔掾静樂陸有擔屩川有檣櫂好歌以誦其旂翿翿君在津梁君諏民害君暨掾賔敷利與愛僝功不揚民用詠載江有菑廬有賈有漁公在中流禁弛征除宜而邦人歸美帝家重修中津橋記葉適人情欲永逸而物廢興不常成之未幾壊已至矣而况聫竹比板以鬬江潮日渉之厄尺量寸度而當徃來無窮之勞則安得支而久哉故台州始作浮梁十餘年而脩者再未二十年遂大壊矣嘉定六年太守俞建以為不可復修也議别造新橋按前郡記以橋為重事使五縣共之其再修也取財於寧海取木於天台侯不以責縣堅木厚枋傭工如家髙大重宻費踰昔數倍既成遺余書曰吏治欲其無跡吏術欲其無煩天下之格言也雖然可以無跡於已不可以無跡於民可以無煩於人不可以無煩於身吾為是州不敢一日怠肆顧瞻郊垣百堵勵翼錢與劵提衡必均而後通今世之至難也吾州既稱平焉穫與耨殊時榖糴復轉糶他郡所未有也吾州又稱寛焉若是者民惟恐其無跡也州道絶東南民須橋如地之載孩提之背負壊甚則墊且溺吾旦夕去此民之所煩敢不自煩乎故吾竊有記焉使知有跡之為無跡自煩之能無煩也嗟夫侯之力勤矣不可無述然而以予所聞於古無跡者常治無煩者常術爾不以為異而記也今星已三周而記是橋者四百年之外千嵗之内記凡幾筆橋凡幾成中津之亭碑無所容而讀不暇徧矣多而不專無乃為名之病乎侯曰不然浮屠之法有度人而籌以記者室縱廣肘三十其籌滿焉苟有以利名奚厭其多且後必有考於此時之久近可以驗工之良苦會之出入可以較用之少多作之緩急可以知吏之賢否此有志於民者之所求也豈若峴首之為隘也獨計一身之名而已哉予無以奪其請因併録其辭新建利渉橋記葉適嘉定四年二月黄巗縣浮橋成林􅕔叔和為其知縣楊君言曰橋長千尺藉舟四十欄箘繂索隄其两旁箘圖狻猊訖三十旬斤鐡九千木石二萬五千夫工六萬餘縣東南車馬擔負而客之塗皆逹於橋西北樵採擔挈而民之市皆趨於橋諸公跨天台陟鴈蕩行過黄巗皆喜曰增一橋矣葢奔渡争舟傾覆蹴踏之患既免而井屋之富㕓肆煙火與橋相望不絶甚可壯也古無而今有難矣橋於江之險又難也台州有橋自唐守始君一縣作之抗其力如州倍難也願子記以為君酬余病未暇也叔和又言曰橋以未成為難衆人所知爾以既成為難君所自知也今嵗别一囷以待異日之闕尚懼不足雖然縣籍壊七十年矣君聚田百萬畆算而歩析之更二載始得經界之舊君之力雖難而承其後者易矣易則思思無窮而橋可恃以常存也碩著之余卧水心久徃來皆村野人語不到門外不知君材迺若是鄭大夫非異人耶舉鄭國解落整比大效小驗具於春秋至捐一車則天下以為笑彼溱洧之易視今之難奚百倍翅耶豈古人於此則或有故歟世常言極今人所難不足以進古人所易而克古人所易不能為今人所難何哉叔和之論不余質也可無為書余少從叔和兄弟㳺每為余言縣直北山爽氣浮動花桞之麗雪月之勝無不在江北余間至程頭必裵衰顧瞻輙阻江而返屢矣今既橋而叔和與邑人日曳杖娱戲於北山潮生汐落隨江降升悠然如泳漢浴沂以歌詠令君之遺徳而余巳老不復有四方之事徒慨想而不能從也因附見之亦以志余之不忘斯㳺爾楊君名圭字國瑞建安人其來黄巗監司固以材辟矣天台臨川橋記陳騤臨川王公琰紹興三十二年春綰一銅章以荆國文公濟天下之緒餘濟天台越隆興元年冬十月甲戍新作橋於邑西之谿從民欲也谿距邑庭可一里源自五峯雙澗北迤而至衆山複迷傍流輳委會霖潦則激焉如轟湧焉如奔防隄室廬蕩如也平時馬渉則濡纓負渉則濡橐聫約以度嵗作嵗圯編列苦其役行旅咨怨前後尉李琰李異俱有建橋之役作百丈隄以捍衝溢功竟弗濟後為令者睥睨難之迨公之來嘆曰大害也不在我乎大抵銳於土功者利在亟成以要虚名肯為逺計今我則否會費五百萬錢出俸四十萬為邑先源源而應數則充矣爰即故址相之然後奠之奠之然後營之斵者鑿者陶者墁者梩者築者從焉非驅作焉非督公曰有穡事者與乎有焉毋納其力穹石以為楹植之屹如也巨木以為梁横之妥如也甓以培石欲其埤也魁以塗甓欲其確也尺有五十何其修之㬅㬅然尺一十有九何其博之衍衍然尺二十有五何其髙之岌岌然復亭其上迺寫迺飭迺敞迺奕可以息行邁可以樂暇閒可以逺眺望卓哉美乎疑混物初剖有此壯觀非人力能為也二年閠月丙辰告成公廼率僚友會稽陸君溉金華陳君恕永嘉丁君康時池君虞鄉觀焉公曰吾與諸君既作於斯僉曰大夫之力也名則在大夫士之豪民之耆老於時咸在翕然告曰願即以臨川名表公功也請既獲遂歌以落之曰壯兮滄溟跨蛟龍麗以霄漢垂螮蝀疑若有神施磨礲鞏然不動嶄華崧環瞻山幄凝翠空俯睨谿紋織微風夜半横浮沆瀣中朝來暾應扶桑紅車馬颯沓西復東宏規碩利繄誰功競將大年夀我公願與此橋俱無窮赤城集巻十三
