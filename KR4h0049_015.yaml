body:
  text: 赤城集卷十五宋林表民編雪巢記尤袤吳興林君景思寓居天台城西之蕭寺破屋數椽不庇風雨榜其燕坐之室曰雪巢日哦詩於其間客有問君所以名巢之意君曰天下四時之佳景冝莫如雪而幻化變滅之速亦無甚於雪者方其凝寒立水夜氣贔屭紛紛皓皓萬里一色瑶臺銀闕亦現於俄頃間然朝陽暿暉則向之所覩蕩然滅沒而不留矣自吾來居天台時王公貴人比里而相望朱門甲第擊鐘而鼎食童顔稚齒羣聚而嬉戲今未二十年其昔之貴者則已死向之富者或已貧而往之少者悉已耄回視二十年直俄頃爾其幻化變滅之速不猶愈於雪乎知其非堅實也於其俄頃起滅之中乃復顛𡨕於利害交戰於寵辱汨汨至於老死而不自知非惑歟今吾以是名吾巢且將視其虛以存吾心視其白以見吾性視其清以勵吾節視其幻以觀吾生則知少壯之不足恃富貴之不足慕貧與賤者不足以為戚非特以此自警而且以警夫世之人使凡遊吾之巢者躁者可使靜險者可使平而汚者可使之潔不亦休乎余聞而嘆曰浩哉斯巢雖方丈之地其視廣厦萬間而不與易也夫樂莫樂於富貴憂莫憂於貧賤然有馬千駟不如西山之餓夫紆朱懷金不如陋巷之瓢飲孰知乎匹夫之樂有賢於王公大人之憂畏也哉世之附炎之徒方思炙手權門焦頭爛額而不悔求而不得則躁得而患失則戚戚與躁相乘則心火內焚日夜焦灼聞君之風亦可少愧矣君少嘗從髙僧問祖師西來意又於方士得養生術其清玉潔其真竹烈其窮不堪忍而其樂侃侃然余來天台始識君一見如平生歡時方困郡事卒卒無須臾間每從君語輒爽然自失顧視鞭朴滿前牒訴盈几便欲捨去今得歸休林泉之下每一思君發於夢想則雪巢之境恍然在吾目圍中矣因述君之説使書于其壁以為之記香逺堂記趙師夏昔我大父宗卿隨蹕而仕南方再轉而丞兹邑蓋紹興之丙辰也今幾百年昔之故老遺民無有在者而階序垣墉亦非其舊獨所植酴醿在聽事便坐之左猶無恙也其子若孫培植愛護轉相告語曰是皆趙公宗卿之手澤其勿廢諸而官于是者不知更幾人矣亦皆知民之意恃以不伐嗚呼可謂盛矣今縣丞趙公因人之情追迹其所由始益加扶植表而出之名其燕息之堂曰香逺蓋取老坡酴醿詩無風香自逺之句而命師夏記之師夏竊惟人之仕於州縣豈不願有以在民者哉而得民者蓋寡也得乎民矣而能久者又寡也長篇短詠浮詞綺語播為謡誦遍於津亭未幾而蕩若風煙漫無遺迹而以怨詈繼之矣磨石礱碑稱誦誇詡以紀德政玉軸錦標散入侯門未幾而薦柱支牆斷棄弗顧而以非笑繼之矣圖形肖像托身佛老晨香暮燈飲食必祝號曰生祠未幾而塵罩鼠傷色沈蠧蝕人皆忘其姓名矣是何也顧此弱枝柔條非有吏卒之呵護法令之禁禦稍失顧盼斧柯及之而本根拔矣乃能至於百年之久乎此又何也然後知實德在人非智力之可取人心所孫亦不以歲月而有異而人之有恃乎物與物之有恃乎人其效固殊也今吾贊府之名堂豈不足以有警世者哉雖然今贊府以儒學發身以經術從政不皎皎以為明而人自不能欺不孑孑以為義而人無得而議寬厚慈良視民如子敲撲榜笞審而後發而必寓以不忍之意歲大侵郡檄視田公盡厯徑術皆以實聞上為之蠲租發廪獨最他郡又為緩征弛禁以來旁郡之米於是商舶合集民忘其飢皆公之惠也繼自于今民之有其生而能有子及孫者不知其幾千人矣而在人之心宜莫可測則是花見愛於人而迎風浥露吾知其又有百年之夀矣後之有繼公之志行公之事則花之夀又不知其有幾而我先公之流芳因有托無窮也記其敢辭公名彥珽字廷玉師夏宗藩諸父行也東嶼書房記周端朝地靈境勝為燕間之館圖史橫列昔人所謂天下至樂終日几案者也然則學道者亦樂此乎孟子有言讀其書不知其人可乎是以論其世也因書而得其人因人而得其世所樂在是世豈遂逺哉曩乾道淳熙間異才輩起其大者蓋已接紹宗元振擢光焰或統紀自命前無古人雖不得於時猶能激議論之波瀾暢文章之氣脈也松山二丁君好學喜事家有海山竒詭之觀諸公間多過焉極談浩歌愕神鬼而變風霆若其抽架而資諷詠題紙而寄吟哦厯厯尚可想見纍十年英淪哲謝往時議論風節凋靡如絲雖其文章亦纎嗇而弗騁後生思見前輩如遂古之世也子植少而嗜書唯諸父遺汝是念作東嶼書房而誦讀其中夫書在則前輩風烈尚未亡固春齊暉而秋合照也而子植得以朝夕涵泳於斯可樂也已抑余聞之世蓋有蟬蛻塵垢酲飫簡編者矣雖然其書具焉物情世故綱挈目從淺深有則廣密有度凡事之條理不可越也其所歸宿無不驗也世蓋有棲身事役委迹周流者矣雖然其書具焉隨事偶變賔敬主肅混混而壑藝藝而根其油然以光者不可沒也其悠然以長者不可遏也蓋施止牾合時事萬殊如環無窮而書無不具也在人常自體之而己今子植嘗仕於時親逢施止牾合之異以書為我而退求其心其追省前賢出處語默之際宜多有慨然於中者歟況其施而不止合而不牾其事乂有大於今者歟松山之園池館增修臨望增闢幽泉故井吐芳而效潔夀藤繁含淑而噓清詩人墨客掇蘂而裁冰金石相宣東南有園稱丁氏而東嶼有書房則自子植所以承其先焉子植無嗜好之流而有深湛之思園雖華其心何往非寄也書房寄也其書非寄也康吉堂記吳子良侍郎王公榜林君詠道之堂曰康吉林君死餘十載士大夫猶喜道之聮篇續詠堂之光輝如新而林君殆不死也吳子曰世之營屋室以求安身者衆矣計其宏傑詭麗百倍此堂者又衆矣蕩然而丘墟蓊然而荆棘者相望也不為丘墟荆棘則頽簷敗棟風掀雨摧行路為之太息也夫興壞世之必有而悲喜異焉豈固以屋室也哉人之智力有盡而義理無窮義理之萌裊如一線亡而存絶而續也智力所到煙雲排空存而亡續而絶也林君死於布衣無寸爵以自援智力微矣余友其子逢吉而間過其堂則環顧皆書也書者義理之會也聖賢淵微古今謨憲進而範俗退而禔身取之書沛如也林君之所以遺逢吉亦逢吉之所以遺其後也余不識林君而考諸鄉論信儒者已今逢吉又博而詢古約而通今沖實內充章采外炫此義理之傳書之澤也夫心恬於義理之謂康不必其身之老夀家裕於義理之謂吉不必其後之顯榮世以智力而林君以義理此悲喜之所以異而屋室之興壞不足論也雖然義理一而書萬殊毫釐之際逢吉盡心焉于以訂家學之源流正後來之趨向使義理愈傳而喜道斯堂者餘百載而未厭林君終不死矣林君名師藏逢吉名表民盡美亭記張景修仙居邑之美者也而一山盡焉福應山之美者也而一亭盡焉盡美亭者非盡一山之謂盡一邑之謂也朝奉大夫龎公倅台之二年季按屬邑轍環七百餘里可謂勞矣然至於仙居福應則徘徊四覽嘯咏終日欣然忘歸信乎美哉一日謂景修曰昔朱超石云登北邙逺眺則衆美都盡豫於此山見之矣山距城二里崢嶸獨秀浮圖居其上而亭居浮圖之南余名之曰盡美焉子為豫記之景修曰唯唯雖然公之意豈有窮也不遺一景一物兼收而並采猶東西之不可相無邑之栝蒼章甫紫韋羌皆峯巒險絶巖洞瓌怪而溪流渺然煙雲晦𡨕鷗鷺出沒平波魚唱斷壠樵歸有騷人畫史不能工也夫豈易名哉邑令劉君襲明雅為公知圖序以告於是又知福應山者皇祐間令樞密直學士陳公述古名之也陳公賢先正勸學文垂於世踰四十年公實作是亭公賢宰相子人門冠代不驕富貴而意乃在乎山水之間愚將見其美不專於竹石花木風晴雨雪之際而在乎學者之材也噫美於是盡矣種德庵記葉適余同年友瓊州刺史郭宗之既沒十年子森卿用舉者五人知崇陽縣磊卿鎖主簿廳中乙科皆會余容成之陽始余與宗之别長沙宗之卒而余有大戚不暇哭又不能弔相對慚惋而已故訪其家事甚詳森卿曰先人葬蓮堂蓮堂之山吾數世墳墓所藏也並墓之廬吾先人手所建也郭氏自鎮將傳祀三百約而久勞而安至曽大父正信均淑一縣所取平也大父施捨惠助一鄉所倚成也而後先人士以文顯吏以善最然而端直寡偶不視時向背縮斂自愛不倚勢進趨每曰吾欲先世流澤常在子孫使墳墓永有蔭託爾奚以多為故廬上之題我兄弟以種德為之名者先人之志也余聞而歎曰允哉夫家非德不興德非種不成雖一人之家未嘗不與天地同其長久所以不能者天地種之而人毁之也人之所就未毫末而以丘山之心承之為益幾何然則謙者種之盈者毁之也我可以得彼豈可以喪一夫攘臂萬人裂其肘矣然則讓者種之爭者毁之也義勇而先利怯而後君子也小人反是然則亷者種之貪者毁之也冥升疾走轡必失御必蹙徐行安步神乃泰氣乃舒然則退者種之進者毁之也為其厚不為其薄治於已不治於人寧散無積寧儉無忲皆所以種而不敢毁也朝種暮穫市人之德也時種歲穫農夫之德也種不求穫不敢毁不敢成聖賢之德也沖漠之際萬理炳然種者常福毁者常禍天地之德也郭氏其知所以種矣知所以種則知德矣雲海觀記丹丘列仙之所萃自昔有道術者多居焉歲在丁酉松山丁君少雲始即其所居之南依山之址闢而為園逺近蔽虧髙下輝映回還委折而曰堂曰亭曰臺曰榭曰林曰坡曰窩曰谷無慮二十餘許意匠翦裁各成面勢然已具載於雪巢林景思之賦詠矣至於一日千里偉然有竒詭特異之觀可以拒髙明排埃壒使人徘徊顧戀而不能去則自小垂虹而入跨蓮蕩不知其幾何畝有堂巋乎其上而曰芙蓉此尤雪巢之所長吟而永歌者蓋煙霞之吞吐雲氣之開斂日光之出沒野色之濃淡隱几而望有若道家所謂海上之三神山也相與隱約拱揖於有無冥漠之間龍川陳同甫來自永康一見輒心可每與少雲少詹擊節抵掌談王説霸窮日竟夜而不知倦間舉酒以屬少雲自李謫仙死世無竒士誰能騎長鯨駕大鵬徜徉恣肆以與之為沆漭汗漫之遊乎時庚子距今五十有二年矣子植倦遊來歸遐想舊事因芙蓉之故址敞為傑閣髙軼霄漢既成而以雲海觀目之蓋取坡公玉霄雲海之詞以足先世之所未為者夫紉隳緝墜使不一失夫前人之遺固非世其家者不能不惟曰世其家而斥大其所已成規恢其所未備西自秋堂廣袤開拓伐蓬藋列花卉極水石林麓之盛蔥蒨茂蔚對蒙泉精舍殆若異境且旁築客館數十楹東由松嶺度橫杓沿緣夷猶上下壠坂有幽泉溢出㶁㶁碎石間循其右以上挹蓬萊雲氣若几按間物而又於東北之隅揭為此觀是豈不足以𢎞先志侈後觀哉子植既集友朋以樂之且曰覩天地之大覽山海之勝吾何敢於自曠亦聊以憩其馳驟焉爾友朋悉詞請曰往者之屈來者之伸此易所貴乎隨時之義又奚必勤計慮於一出入息之間耶雖然巨浪喧豗迅風橫潰回轤轉棹則即有泊岸遵途之捷矣故進而競於物也詳不若退而反於己也約此惟有道者知之子植其不講於道乎子植名木藥園小畫記謝伋右藥園小畫一卷作雲林室廬人物草木鳥獸伋先世既無盈餘且漂流轉徙不能治生産久為祠官俸入至薄居不敢近州縣食不敢飽粱肉於窮僻處人棄我取粗辦一㕓家舍之旁買石田葺茅竹為園囿辛勤十餘年根撥皆自封植下澤欵假其來無時板輿輕軒或因分胙而至以為草木諸果物皆藥也總而名之曰藥園園狹小不足賦有僧了宗者來遊寫以淡墨樹輪相糾林木茂骫藤蘿滋蔓樓閣隱於其中靈石寺也出苔蘚山門緩步荒徑挾平頭奴載一壺酒貌伋也垂楊夾道叢篠插籬羅漢大樹映門者園也下􅠏黃甘塢後浸白蓮池池上偃蓋松紫霄諸峰羅列目下是為水芝軒蓬藋數楹中檻靈泉館僧間栖鹿於後有坐起更衣之房是為挽衣寮水泉甘香鄰曲汲不絶作屋陰樹是為潤畦亭把茅蓋頭孤鶴暮入題鶴乘後望古松百章籬內巨竹滿坡面雙槐背三章一堂二內榜曰斸青由堂而西上薜荔階别一小丘最後得之地多薏苡不絶其本乃結草庵簷以竹瓦榜曰明珠主人或挽衣於寮或抱甕於亭出灌諸畦或坐於堂上使童奴蘇蘭椒桂酌泉烹茶或採蓮斸藥惟意所在挾書登山山明水清人迹斷絶聞猿啼鳥鳴而已意隨事更景與時變而畫亦難盡也宗吳人筆迹甚可喜松山林壑記陳耆卿松山林壑者丁君少雲幽棲之所也余聞丁園名素著又以趾其園者多偉人遂益著按其所昉於少雲者二十有五衍於子植者三十有三大較松山其主名也而東際海西接仙源水自西南數十折而至東北其橫竪側出如一步武而神工隨也其倐窈忽爛如一頃刻而物候換也其遞涼燠雜幽麗如一拱揖而四序之變交吾前也蓋好境天吐佳趣人涉俯瞰而仰答逺矚而近觀萬象橫陳迥不可狀其以為幽棲則宜雖然古所謂幽棲者未必具是也今必具是哉夫具是心未必具是景也乃若其景具則是心益具矣心具無景不清否則無景不俗君之於此景也寄此清也其清非錮於幽棲者也自其善積於身孝熟於親義洽於人充其心可以達也或不得充而可充者在則雖窮無磷況復有不窮者邪故大而天地之周流細而魚鳶之飛躍攖吾目慨吾心景隨心生而心不隨景以逝是真幽棲者也非錮焉者也夫出處之義亦大矣幽棲者處而不出者也故少雲不及仕而子植既仕矣非可以處而不出也然則知所以處而後知所以出蓋處而不出固未礙於行義出而暫處又所以精於求志而章明之也故子植之歸也而於此尤惓惓焉蓋君兄弟所從遊如葉水心陳龍川正偉人之尤者皆嘗與之婆娑偃仰詠歌講誦於其間其笻影屐聲龜鷺猶能認憶也今二公已逝而清薌館方築當有名勝豪特袂連簮盍與之共籌此心者而豫以官守未能隨也子植又言山之阿幽阻面勢者尚衆規而未成者亦衆然則子植心固無盡而其景得有盡哉其心少雲之心也非錮於幽棲者也劉阮洞記鄭至道劉阮洞其傳久矣余竊邑於此訪於故老往往不知其所在此按圖得之以詢護國寺僧介豐者乃曰洞居寺之東北二里斜行山谷隱於榛莽間人迹罕及本朝景祐中先師明照大師嘗採藥還見橋跨水光彩眩目二女未笄戲于水上如劉阮所見此水仙之洞府也元祐二年春植桃數百本所以追遺迹繼故事也越明年三月十日丁丑寺僧報桃花盛開并以其景物之盛求名焉令率縣尉縉雲郭儀彥文監征開封曹􅀢得之來遊而黃岩主簿西安王沔之彥楚與其弟宣德郎知金華縣事漢之彥昭繼至乃相與幅巾杖藜徜徉行歌沼澗而上觀渌波之漣漪聽寒音之潺湲微風過之餘音清逺飄飄然猶鏘珮環而朝玉闕也遂名之曰鳴玉澗澗之東有塢植桃數畦花光射日落英繽紛點綴芳草流紅縹眇隨水西下此昔人食桃輕舉之地也遂名之曰桃花塢自塢以北行數步攢峯疊翠左右回擁中有澗流隨山曲折而遊人之道從之及水窮而道盡則有潭清徹淵澄可鑒毛髮羣山倒影浮碧搖蕩中有洞門潛通山底其深不測雖淫霖暴至而不盈大旱焦山而不涸此等僧見金橋之地也遂名之曰金潭潭之南滸水淺見沙中有盤石三不沒者數寸可坐以流飲自上流浮杯盤隨流蕩漾必經三石之間俯而掇之如在几案此羣仙會飲之地也遂名之曰會仙石擬石之端仰而視之三峯鼎峙峻極雲漢寒光襲人虛碧相照懸崖落花紅雨散亂其東峯則孤危峭拔儀狀竒偉上有雙石如綰鬟髻遂名之曰雙女峯其西峯則壁立千尋上連巨嶽朝陽方升先得清照遂名之曰迎陽峰其中峰則居中處尊以雙女迎陽為之輔翼羣山之翠合而有之遂名之曰合翠峰三峰之間林麓疏廣草木瑰異左連瓊臺雙闕之山右接石橋合澗之水採芝茹术擷翠珮芳杖履輕而白雲隨笑語髙而山谷應翛然而往直欲跨雙鳬御清風逍遙乎不死之鄉而不知塵境之卑蹙涉世之有纍也遂名之曰迷仙島以出至于迎陽峰之下有巨石偃于山腹廣袤數丈寺僧目石為址構亭於其上畫角雕楹翬飛鳥革前臨清泚瓦影浮動魚跳圓波光弄樽俎浮杯之迹顧指在目遂名之曰浮杯亭是日也天氣清明東風和暢巖端過雨疏雲漏日余與諸君㩦裀席挈壺觴上登崔嵬下弄清淺流觴籍草惟興所適山殽野蓛具於臨時膾靈溪之鱗茹金庭之蕨無備具之勞也挂衣長松落帽幽石帶慵則披衣履倦則跣足解巾漉酒玉山自頽無衣冠之束也意所欲飲命尊注之一引而盡量窮則止無鐘鼓之節也酒酣浩歌聲振林木音無宫商惟意所發樵夫牧厮為之捫髙崖履危石荷柯倚策而視之彼烏知其非劉氏之子阮氏之孫厭洞府之未廣而復為山間之遊乎既而夕陽西傾暮煙四塞洞天之景恍若失之於是尋雲路騁歸驂松月照人金影破碎遙聞雞犬乃悟人間諸君皆瞿然而驚相顧而語疑夫陵谷之變更而子孫之遷易也時郭彥文立馬謂余言曰數千百年湮沒之迹自公發之今日勝遊之樂可無文以記之乎余病夫山水清而文辭俗景物富而才思窮不能盡洞中之幽趣固辭而不獲免乃書其所見之實以塞來命若夫寫難名之象發不盡之意則諸君之新辭雅咏在焉非豫所能道也委羽洞記謝伋台州黃巖縣西五里有岡阜連屬草木茂密其洞曰委羽父老相傳數十年前常有青衣童子戲洞口居人以滓穢溷之童因忽不見紹興辛酉今石城使君李侯端民令兹邑暇日勸課農桑至其處始擇道士董大方主之稍給香火瓜華之用大方以符水治疾病輒即愈邑人重之以是二十年間堂殿門廡髙明靚淨庫厨湢浴具體而有始變荆榛為勝地按大洞記甌粵之間大海之涯地産方石真人劉奉林所居也奉林嵩髙逸士避周季世棲焉控鶴輕舉墜一大翮人名其山曰委羽某寓居三童山鐘鼓相聞嘗一再至及守縉雲大方遣書求文記其事復曰我本山林主郡非好也盍俟歸及浙右又以書來曰公又渡浙而西矣歸期寧可以日月冀哉且洪農寓公重道相悅欲成兹事許列銜石上矣敢固以請乃序而為之銘銘曰昔有仙人卯金刀雞犬同升記阡陌九臯聲聞至今存上天下天曽委翮仙人一去幾千載閲世真同駒過隙長官好事經李侯大洞主人親推擇穹隆堂殿復一新照映林巒無夙昔寓公耆德上清都豈有他楊畢兹石碧落侍郎寧復來葉令飛鳬塵幾隔太乙青藜儻可尋去共研朱點周易赤城集卷十五
