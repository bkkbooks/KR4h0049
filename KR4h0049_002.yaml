body:
  text: 赤城集卷二宋林表民編台州興修記張奕天台郡在越絶東南隅叢山㳫嶂中瀕海百里而近洚水為害嵗常有之尚書庫部員外郎孫公治郡之明年即至和元年也夏秋之交大雨壑嘔而川泄洶湧湍悍爭赴于海迅風乘潮壅閼不得下溢岸凌城不及踰者數尺公遣僚屬夜守闉闍土諸門以備非常翌日水遵故道墻壘圯剝蕩邉江民廬官宇十二三城中生聚僅免墊溺者繄公力焉居一日公與倅語曰台雖小郡去朝廷僻而且逺然所修者天子職業所治者天子人民為其守臣不能固護安養之而坐視其弊是誠何心哉遂按閲官府之沮漏庳毁者用羡貨市材新廪屋二區凡三十楹以儲軍食又易甲仗庫重㕔事之西廡為樓五楹以藏兵械然後調五縣上中之産得丁夫二萬六千五百九十一工探近山之石雜以瓴甓完州城六百七十八丈以禦災患既訖工城中之民皆鼓舞曰治我服器葺我室廬而今而後知生生之業可久其居也先是公下車之初厭郡舍卑逼議營爽塏為便署之所因循久之重於改作至是數役皆勇於從事親自臨督驅人趨作如赴陳敵之嚴日力省而功倍君子曰亷哉乎不私於已雖一工一木重勞於人公於人雖勞其誰憾耶嗚呼公知保民之方矣後公之治繼以教之之術台不止富且庶將禮義由之出焉命識嵗月因警來者云台州重修社稷壇記樓鑰台州之北大山綿亘其一支自東而西蜿蜒逶迤至江而止勢若回顧是為龍顧之山子城據其下官寺在焉城西南隅去儀門百許步為社稷之壇厥位面陽爽塏平曠昔人相攸而為此必不苟也有司不戒日就荒圮頽垣成蹊樵牧無禁居民或侵漁其中淳熙已亥正月宗正丞沈侯被選來牧仲春行事愀然顧其僚曰是可以奉吾神乎乃命撤而新之臨海令彭仲剛建縣治於煨燼之餘侯知其才舉以任焉首案圖籍即地之舊繚以周牆數十百丈始治地得仆碑土中洗而讀之蓋政和中所頒社稷壇式也制度明甚橫列三壝門各四出中立社稷二壇風師居東雷師雨師居西亦各為壇壇之髙二尺有半又為燎壇於風師之東南壝外稍髙於諸壇於是悉倣名數因其舊而增築之故有屋四楹為視饌待事之所既葺新之又增其一為齊潔之地其涂北出表以二柱中建臺門嚴關鍵以守之作於六月朔旦六旬有七日告成靡金錢五十萬有竒民不知役工不告勤過者肅然始知有地土之敬侯命鑰書之聞古先成民而後致力於神侯之下車訪民隱飭吏事廪廪乎循良之風而思不倦以終之以是邦被山帶江水旱仍嵗又聞鬱攸之灾謂職諸幽者非人力所及故於神無所不致其敬社稷之重其可後乎秋社展禮氣象一新環珮琮琤豆籩靜嘉神眖昭格如在左右繼自今氣淑民和雨暘時若其必有相之者然則侯之政真知所先後而致力於神者乃所以成民也侯名揆字虞卿秀之嘉興人也台州郡治㕔壁記曽㑹台州者實取天台山以立名即甌閩之舊壤而勾踐之遺封原夫秦併天下廢其君長乃置郡縣隋開皇九年平陳廢郡則諸縣併歸臨海鎮於大固山配千兵守護其城臨海縣移於鎮前𨽻於栝州江南元帥沈法興將兵保鎮城立為海州唐武德二年東南面行臺僕射杜伏威改海州為台州𨽻于栝州改總管府為都督府太宗皇帝貞觀六年改台溫二州並轉𨽻于栝州都督府故台州置在大固山里人屈光公住宅以其地勝故立屈氏次子惠坦為太守改家為州及今皇宋混一區宇太平興國三載凡一百二十六政總三百六十一年厯記存焉今自武德後至於混一區宇之始凡刺史名姓謹列于后越明年吳越王朝京師納土田夏六月凡僞署官司咸一變易毁城守示無所備灾器甲示不復用削繁苛省徭役自是中朝風教被於逺邇焉炎漢季世三國鼎分臨海郡為吳羇縻之地憑山負海民情多變勞於兵防難以德化六朝以來率以獲罪者投于荒裔故逃刑者亦相率偷安焉唐室平一區宇遂通正朔良二千石稍申吏理暨梁朝革命有武肅王奮身草萊専制江東分符懋官既失其道頭㑹箕斂不聊有生數世百年制度去矣我太宗皇帝以聖嗣明文德柔逺東南海隅率族肆覲納符請吏貢地籍于大司徒於是申命文臣下治郡國天刃不舉而萬里安定島夷編户雍容揄揚以樂大化垂今二十餘年豈非王者久於其道然後寖在民心歟今以皇朝歷任氏族繼于舊記之末俾嗣治者書以廣之上宰執論台州財賦趙汝愚某踈賤之蹤已試無效誤蒙陶鑄俾承乏于天台勢不獲辭扶老携幼已於此月二十日交割郡事郡中府藏殫竭逋負上供及諸司錢物與夫官吏俸給之屬幾土十萬緡凡利源所入不過三事酒稅與折苖耳去冬所在豐稔朝廷寬大之澤不許州縣折納苖米海舶自閩廣來者皆為提舉司以私鹽捕送栝蒼禁勘其情猶未竟也餘者悉鑿舟溺貨而去望風不入天台之境者凡數月矣然則財賦所賴惟有𣙜酤耳今環城內外私造酒麯者二千餘家三務監官六員終日所收本息才數十千不充官吏之費習俗澆競綱紀蕩然不存稍更張之則怨謗交興姑息不問則曠敗難免日凛凛然若履薄氷之上而進退惟谷也某蒙國厚恩不敢自愛亦欲竭其夙夜之力以圖報稱然念非朝廷力賜主張有如么微祗自速咎耳或不得已如有奏請之類敢望鈞慈更施行其一二庶幾千里風動數月之間猶能稍自植立仰副君相寄委之意其間更有心切利害如本州係瀕海去處自海中乘潮一夕可至城下城有七門大火之後五門猶未建立四壁圯壞私貨出入者與履平地無異北軍數十人無屋廬可居但月給房緡百餘千俾與百姓雜處今春大閲凡軍須所用色色無所凋弊之狀觸目皆然官吏不暇逺圖朝夕汲汲惟貢賦之不入蓋亦未嘗為國家深思也伏乞鈞慈特賜寬假俾漸收餘力稍復葺治幸甚幸甚台州重建便㕔記姜容台州便㕔淳熙十五年守章侯冲重建未四十年蠧朽已岌岌矣寶慶改元守王侯挺歎曰㕔非逰觀地也所以出政聽訟而親吏民也郡雖例有設㕔非大聘賀大燕饗不處而便㕔常處焉蠧朽不治母乃非便乎幸嵗連稔勤收儉藏撥公帑錢授支鹽徐昉規畫取材計直召夫厚庸革去蠧朽鼎成翬飛廣崇之度比舊加倍既而敞賔次整吏直及門廡旁創小㕔內因瑞蓮立堂又廣凝思之室為屋總餘四十楹縻錢總五百萬米百餘斛始五月丙寅迄六月已未役甚巨而農不知工不困也容聞治郡者體不貴苟卑心不貴苟約事不貴苟安猥下當穹崇狹隘當恢廣摧墮當植立非材識獨到不能也侯為此州浚河渠民不病濡滯闢貢院創三門士不病蹙踏四瞻郊垣有廢輒舉今又一新州治千里聳觀蓋穹崇其猥下者恢廣其狹隘者植立其摧墮者侯之材識獨到如此雖然棟楹巍峩飛鳥􅌓眙棘衛森列鬼神却走況田野之困窮未嘗一識官府設或赴訴於我而目眩堂皇心怖吏卒股栗階戺其能吐肝肺輸疾苦哉故體雖穹崇侯俯以謙損心雖恢廣侯斂以誠篤事雖植立侯蓄以寬和則於此出政而政平於此聽訟而訟理於此親吏民而吏民安侯常處何愧焉然侯旦夕去而羽儀天朝矣念必葺之義以遺後之人而豈為身計哉若乃㕔事退休堂宇幽曠神慮既冲寂臨蒞俞精明侯故併新之容故併書之台州通判㕔題名記黃逺臨海之為郡去朝廷雖逺而江山瀟灑訟獄簡希來蒞官者往往號為樂國昔之守倅於此去而升陟侍從致位公相為時名卿者間有人焉而獨倅郡者族姓官稱無所刻載因循迄今百有餘嵗矣承議郎吳深倅郡之明年乃嘆其遺闕而言之曰古人雖一日遊居尚有叙述況膺天子之命三年從政其可以無紀乎將尋諸舊牘稽諸宿吏庶幾得之者可過半也而㑹慶厯乙酉嵗秋雨暴集江流泛濫衝城堞漂棟宇時官藏文書皆麋爛流散無有存者故不可悉知惟夏鄭公在大中祥符間以著作佐郎來倅是郡今郡人猶能道之而又有光祿丞朱君正辭為鄭公之代有贊善大夫劉君有方與郡守章郇公同時所可知者兹數人耳惜夫姑自慶厯而後悉得其名氏與夫在官之嵗月而刻于石豈特俾來者續書之而已哉前日之人或以德望稱或以政事顯或晦而不彰或泯而無傳皆可指而見也重修台州通判㕔記李宗勉公㝢必稱其官非為所居官設行君之政令肅民之觀瞻蓋於此繫焉天台東浙名郡州治雖未為宏麗規摹亦峻整獨别駕㕔事庳且隘曽他官不如堂奧傾欹岌嶪欲壓考諸圖牒莫知建立之始祗云淳熙二年通判管君鋭重建倒指嵗籥未周一甲子豈當時因陋就簡易至弛陊重以紹定己丑蕩析之變然耶以是處通守端謂非稱雖然廢興㳂革各有其時時至則易若反掌孰制其時在所居官爾鄭公襟度髙亮議論灑落昔人所謂胸中自有一丘一壑者余知其决不苟安於此居無何果欲撤而新之余聞之亦喜既則恢衍規制增築基構取材於市鳩工於庸給用於施官不知役人不告勞經始壬辰暮春斷手中夏㕔事穹隆堂㝢顯敞廊廡纚屬户牖爣閬總為楹三十有四舊有芝秀承其左登瀛景沂嵗寒處其右堂後山巒鬱律林木青蔥自蓮風閣登萬壑風煙最為竒勝旁列雲水梅榭雲海嵐關無非嘯咏遊息之所公或重創或增修丹雘交輝前後掩映迎風納月恍若蓬壺觀者愕眙屹為千里壯觀是役也費務叢廣郡雖相之眇若毫末非公善計節用疇克辦此落成之日屬豫為記辭以蕪陋弗獲余嘗謂知者創物巧者述之是興事締功始足以言知矣而孟子論知則曰行其所無事或者疑焉抑不思孟子謂無事豈樂因循好苟且云哉斁者新之摧者植之損者益之循天理之自然不容一毫人僞若禹之治水是也士大夫視公㝢如傳舍昧一日必葺之義榱棟撓折墻壁毁壞置弗問是固失之乃若自恃過髙喜新厭舊役志於物好樂靡常土木並興耀竒逞巧作無益害有益則亦未為得也今公因其既圯去故取新弗亟弗徐咸當其可非行其所無事歟斯可謂知矣創之者勞享之者逸後人蒙其利未必知其顛末是則當書公名崈字謙仲姑蘇人以朝散郎通判軍州事郡政有闕賴其禆助居多紹定五年壬辰八月既望記台州添差通判㕔壁記洪適台州之為郡環山枕海壤僻民願牒訴簡少輸調有常平時從容見謂無事故分曹授政絶贅冗者中興以來彯纓之士日進一官相承率三四輩員外署者無郡邑不有紹興二年是邦始增治中凡五易而適至被命遲期者後復三人則兹員之設將踐武不廢乃裒粹名氏官秩去來龕石壁間而係之日昔昌黎韓公嘗謂邑丞二令位逼而嫌文書視成一不敢省有公負復歸尤焉曽主簿尉之不若丞於郡者亦然厥有不蹈其中萎腇不事事玩民戚休貪殘放手漫不孰何曰此太守職也吾何干夫是之謂負官否則錚錚表襮召權市威上下相高矛盾崖異吏不確其承民情不得直夫是之謂越位負其官不可越其位又不可然則奈何能使官不負位不越清其心以求其平視公事唯謹外是而議夫何知之有台州推官重建㕔事述趙師回嘉定二年夏四月豫來為推官明年秋八月重建㕔事齊閣思昔達尊嘗入此幕如正獻何公天性超融不汲汲於富貴利達其登巾山詩有所謂髙共白雲閒志尚可想乃扁閣曰髙閒舍人孔公危言正論徑氣廪廪在官之日庭植雙檜後八十餘年太守曽文清公宴客于下命其堂曰遺直賦詩十二章有百年依正直之句仍榜齊曰依正齊之西闢小軒手種梧竹名以持節於是公退休沐始得與僚友燕談觴詠委蛇俯仰其間企慕二公之風操足有餘樂又明撤門廡而新之弗陋弗華足蔽風雨匠石之費從官給者不什一諸邑大夫與賢士友相與致助猶懼不支適際修水黃公以戎監丞出殿是邦知教化之先務下車之初首賁學宫凡闕文墜典舉而秩之一日顧謂豫曰知子有興作此事至難今居官者視公宇如傳舍獨能留意於斯耶崇奬周給迄于落成姑叙大略以紀嵗月若夫時而葺之則在後之君子台州新造刻漏記此碑今亡其半馬仲甫天道之大其啓閉代謝之運藏功於神用杳不可見聖人設法以求其端於是載諸厯象而有按據之制則漏刻之用興于其初矣若夫分至相承寒暑相推裁昏明之早晚節晝夜以動息時有緩疾景有長短乘氣之差參以增損故數不能逃晷不能逾風雨雖晦抑無失其凖的非漏刻以視其應孰從而審哉且百刻十二辰之法百代不易之用也第數之盈縮繫於二十四氣以鈞校之晝夜之多少固可見矣周官挈壺氏以水火守之分以日夜蓋其職焉禮天子宫禁暨官府皆建漏刻有師興則隨次舍設之示不可暗事也雖測籌之數與所造之儀度今古迭變形範各别然測景揆辰大概一也天台郡漏刻自置守以來有之矣厯年既久積習差錯鍾水無實法流無定凖規模踈簡一不如制呌時發鼓皆司役之吏詳天色以驗旦暮耳此其誤尤甚又況隂晦弗復辨其失不亦逺乎故晷候之違制度之紊節理適然也乃命浮圖可榮改作之榮心智機巧頗能施其術揆測增减之法參之於厯皆有次序若用器屏壺之屬惟事事率以新意創始咸適其宜既訖工依其術試之果得晝夜之正遲速來往指刻可驗觀者得以知之舉曰嚮日之漏甚踈庶幾乎不繆故識其嵗月以垂諸後云皇祐壬辰三月朔日記推官㕔題名記包恢郡有推官官若非尊者而佐賔幕助郡政其為人之賢否與其行事之是非則一郡之理亂千里之休戚繫焉任亦重矣台之為郡東臨大海下蒞五縣境土廣袤户口衆多詞訟紛雜而職繁劇要不易為所賴以佐助者惟在幕府有人耳然前乎此為推官者知幾世幾人矣而求其孰賢孰否孰善孰惡有繫於官民之理亂休戚者曽無可考見非闕典乎後世既無古者侯國之史則先儒論著有題前政之名氏以為記者尚為近古也非徒可以苟知其名氏而已其人之賢而事之善歟書之可以為法也其人之否而事之惡歟書之可以為戒也二者之間有庸庸碌碌上無補於郡下無益於民而泯滅於無聞者觀其名氏亦可以內自省也豈曰虛文云乎哉今滕君不忍其前之名氏既沒而不彰後之名復廢而不傳乃考之赤城前後志僅得自唐張條而下至于今趙君汝漕凡三十八人而止乃為之第其嵗月之先後而記之而後之繼為是官者可以續書之數百年之闕典至是而始備其意美矣然其賢否善惡所以為之理亂休戚而可為法戒者以多不可得而知獨其間有自是而召試論新法後至中書舍人者有自是而為國子監教授後至太宰少傅者其人其事可以觀矣自有能辨之者然則略於前而詳於後自今而往求盡其所可法而不犯其所可戒又當自滕君始君之先世父叔皆從朱文公學君姿器質實且習聞二父師友淵源則必優於吏事而見於幕府之所贊畫者其為人既賢而其行事必善也知所以題其名宜知所以䆒其實其於在已之賢行當加修及人之善事當加進使表表焉在人耳目悠悠然入人心思而後之觀者必曰滕君惟見其可師而不聞其有可戒斯不負題名之意矣是所以表率乎後來者實在滕君而後之繼滕君者又能相興緝熙而不替使人人皆賢人事事皆善事皆可師而無可戒是又有望於將來台城之所賴者顧不深且逺歟赤城集卷二
