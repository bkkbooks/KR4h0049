body:
  text: 赤城集卷九宋林表民編郭孝子祠堂記吳子良自唐末入五代兵刃沸海㝢臣乘君强陵弱盜名字蜂起士一身而事數姓恬弗恤也斯時也天地幾易位人之類幾覆滅矣我太祖皇帝奮英略削僣叛至我太宗皇帝而天下平於是宋興三十載詔諸道采孝行者以聞而黃巖郭孝子與被旌奬焉嗚呼可謂知本矣無四端無以為人無五常無以為國四端以仁統而孝仁之本也五常以君臣立而父子君臣之本也今夫理杳微一動一靜而成氣氣䝉密一感一應而成形有視有聽有作有止有好有惡有戴有履是孰使之然哉視聽而能有則作止而能有常戴履而能有儀是孰使之然哉凡皆父母所以遺我也况於達天人之奧體道德之全豈子之能能之者父母也故子之身父母之身也愛其身遺其父母是不愛其身者也不愛其身者繆善惡之分朦逆順之辨紊髙下之倫於仁何有於君臣何有故五代之亂坐此我宋所以續民命旌奬此而已嗚呼可謂知本矣夫此吾心也吾性也心謂之本心性謂之常性豈以旌奬而存以不旌奬而止也然而必旌奬者君上無待旌奬者人子郭氏自被旌奬以來二百五十餘年矣今孝子之祠僅存而門圮臺毁長吏過不問七世孫孝廉孝溥孝榮孝恭自出力崇飭門臺而葺祠宇子同年友李君從其里人也為請記夫長吏過不問而孫與里人任其責此豈有所待者哉葺祠宇承其祖被旌奬之至行崇門臺表先朝旌奬其祖之盛典孝也亦忠也人謂孝廉兄弟知有祖李君知有母用充其本心常性而并知有君矣雖然先朝旌奬之長吏對揚欽奉之可也過不問不可也余故記此為無待旌奬者勸又以必旌奬者勸焉孝子名琮事具國史修撰杜公記之詳矣兹不著臨海縣城隍廟記王子輿夫五等之祭祀有三代之簡書或相越以為淫苟不舉而授削潔誠徼福用庇元元即山城隍率其常也子輿雍熙初載吏斯邑仲春二月祭斯廟因詰有司曰邑居郡城廟從何得唯稱靈應勉而行之俄命祝以致詞遂投環而占兆數四不叶左右聳然余曉之曰兆或吉焉神斯濫矣始疑廟非廟肯謂神乃神噫𡨕昧之理今古難之我先師夫子祕而不言矧後人哉猶是春秋祀事躬親焉朔望告奠吏攝焉越明年自春徂夏爍石流金離離旱苖燋灼逮盡雖羣望奔走曾無膚寸之陰霡霂之潤凡在有位若無所容遂率同寮禱而盟曰廟既隳人之恥也嵗苟罪神之羞也幸雨如繩注則廟必鼎新未數日而有徴不崇朝而告足萬井之歡聲雷動四郊之美稼雲興遽命良工廣其舊址揮斤運斧日就月將基構克成輪奐具美因敢録幽贊之驗序必葺之源未頃新令尹清河張公濬至止公在泗上司刑彈糾厯兩任殆十周星紀朝野具聞廉幹正直故遷是邑與余授代舉良能也豫明日遂行固託張公願樹其祠聊用直書置諸屋壁庶幾乎後為繼者請禱無惑焉重修仙居城隍廟記俞建唐詔州縣霖雨以酒醢禜城門報用特牲實與社稷等祀然社稷以壇而城獨禜後人因屋之有自矣仙居巖壑秀絶異時文獻甲一方扶輿磅薄厥有陰相而城隍廟貌獨陋舊据縣城紹興辛未徙東城門外久馬摧落榛莽孤宇僅立嵗時耆老合饗露立庭下風雨不芘為神羞令去來祈報徹即邏謾弗驚省嘉泰改元縣尹林君視事欵謁心愓弗寧顧念力未遑暇既而拊摩呵噓爬梳剔抉編浮濫搜漏隙以家視官􅎒􅎒有紀越明年邑大治豐穰薦臻公私裕贍乃捐帑庀材峙糧鳩工陶礱斫墁類進秩舉經始勾龍棄之墠壝次學官次先賢堂次神宇賔館旁及官舍井井創葺悉登厥初周視城隍宫隅獨迫㕓居隘不容礎舉百緍鬻地益之袤四十尺廣加三之一抑重煩擾毫髮不以屬吏邑老陳康受命董役工徒百需率視市直酬給民不與知屏以崇閎翼以修廡層垣繚匝清泚映帶巒屛對列溪流左旋輪奐翬飛丹雘粲發為屋楹十有三修容有室蕆事有所宏麗靖深觀者合詞起敬歎肇役於中冬既望再閲月訖工尹齊宿具犧牲率邑父老落其下神人胥懌既胙囑建識顛末建觀今士大夫趦趄銅墨旁緣他岐避弗獲一墮煩罟上下交謫旦暮救過不給尚遑他恤藉令盤錯孔裕徒或飭厨傳亭榭以恱目市喙誇詡釣聲譽疇能為民水旱癘疫地以從事幽隱𡨕漠間令尹以廉恪簡靖近民以精明肅給集事俗無駭政邑無遺功而又致力於神以貽民休顧不韙哉今而後吏得以展敬揭䖍徼福於神而無愧神亦將宣靈布和加惠於民而無辭尹遺愛斯邑綿數十百祀而無窮一舉而三善具是可無書尹名嶽字宗山四明人三台祠記陳貴謙台州有山曰天台隆崇盤礴蓋東吳巨鎮自晉以來推為台嶽凡山之髙大而靈者稱嶽五嶽特其著者他如吳嶽霍嶽見於經傳尚多台山名嶽固宜州既以嶽命氏道家者流搜括靈祕以台嶽上應台星故嶽以星得名通九州分野言之台固自為牛斗分然余觀張衡靈憲論以為星者體生於地精成於天列居錯峙各有攸屬又史志所載五星自配海嶽今以東吳隆崇盤礴之鎮上應太微淵耀光明之星理亦宜然若乃三台在天和隂陽理萬物此則不待圖諜而知者世惟見兩漢諸臣驗以推明休咎其在周官大宗伯槱燎祀司中司命鄭氏釋以司中為三台聖王祭祀其尊尚矣敷天之下皆得瞻英躔以徼景貺固非一郡獨得而享然齊國祀岱晉國望梁此周制所謂諸侯祭境內山川漢郡國立靈星祠今樂郊吉壤作鎮既固上稽乾象名比義協於以揭䖍妥靈為民祈福侈此邦照臨之賜亦理所應有耳然此偶失不圖或嘗議而不果至嘉定九年嵗在丙子知州事康侯仲頴參酌舊典遂即天慶觀度址而祠焉發郡帑及屬邑公錢鄉士大夫相帥出力來助故役成而民不知朱門洞開紫殿竦峙霓旌絳節繪在兩廡泰符正中華燁燁而來下侯既祗帥官吏㳙吉薦獻耆稚歡呼奔走瞻敬者填溢郛郭在昔丹丘置郡於海濵廣斥六龍時巡服在畿甸鴻疇倫魁項背相望台星實相之也今侯又能作新祠宇輝耀六符之光與匿峯倒景相為發揮神理感通靈心顧享是嵗雨暘式序粳稌具豐休應之不可誣如此自今以往發祥隤祉使異才輩出大有嵗書拱輔京邑屹為盛藩泰符之貺寧有既邪咸願刻詞樂石以著攸始貴謙以前史官之屬奉冲佑香火乃拜手而作詩曰坤元上承台嶽峻極乾文下臨台符昭飾宣精作鎮實維感通比類既從營兹新宫鬱勃嶙峋正殿洪敞六星照幄相比兩兩仰瞻星次戴魁承樞嶽在㢲隅翊皇之都明明天子百神受職泰階時平風五雨十台甸熙熙蠲除凶菑農有豐年士多成材孰委兹祉台符所錫孰肇兹祀康侯是力凡是台人世世肅秪既秪於神亦侯之思宋郭孝子碑杜範表孝行廬自唐始此古明王誼辟因人心以厲風俗焉者也宋興三十載削平僣亂四方無虞若稽舊典修崇教化命有司曰應諸道州縣有義夫節婦孝子順孫其令轉運使採訪以聞至道二年台州黃巖仁風鄉士庶陳贊等四十餘人詣縣言本鄉有孝子郭琮年七十四事母張氏備極恭順勤奉甘㫖寅夕不懈逺妻子寢處母室不飲酒茹葷者三十年誦梵典禮佛塔積膜拜之數以七十餘萬計甘於勩勞用祝母壽張氏今已一百四嵗視聽不衰飲食尚強里黨異之縣以聞於郡郡聞於轉運使使馳詣其家召其母與之坐飲以醇酎嗟賞良久遂奏於朝太宗皇帝覽而嘉之亟詔旌表其閭復其利役嗚呼以一匹夫閨門之行而上動天子褒嘉下勞部使者臨問築臺植木丹堊烜耀使窮閭陋居突兀改觀邑人仰首瞻敬稱歎唶唶何其盛也距今二百五十年時久制墮地蹙宫庳門不能丈僅留片石過者愴然幸其祠尚存其像猶舊七世裔孫孝廉偕其季孝溥孝榮孝恭輸財命工整而新之以顯先德以侈舊章鄉之士友屬豫為之記或者曰古人孝行著於詩書皆可覆視未聞疲筋力從事釋氏之說以延其親之齡者郭君之孝亦異乎古聖賢所謂孝矣豫應之曰人性之孝得之於天古今異時儒釋異教而此性之真未嘗異也世之痼於質而氣暴牽於情而愛移性以物離天以人喪不顧其養而遺之憂者往往而爾如郭君者非得於父師之教訓朋友之切磋而孝愛篤至凡可以夀其親者固將無所不為此念一存天地鬼神昭鑒森列感通之道豈不在兹夫孝心為上禮次之使古聖賢復生亦將與其心而略其禮豈以詩書所不載而非之哉今其祠翼然其像儼然人之登斯堂也見斯容也想詠一時婉愈承顔之意亦可以消暴厲之萌而長愛敬之端其有關於風教豈不大哉遂為之記石藤石稜二夫人廟記林師和石藤石稜二夫人者婺東陽杜氏之二女也杜氏家鬻湯餅一日夫婦繼卒二女方笄厨人挑之于時隋大業末綱常墮廢淫奔無愧二女獨潔廉自守憤厨人相與殺之亡命入山遁於永嘉郡臨海縣盂溪之谷采蕨薇茹芝菌無幾坑流暴漲姊溺妹援遂相與死唐武德間以臨海置台州統五縣臨海唐興黃巖樂安寧海是也盂溪屬樂安上元二年改樂安曰永安而遷治盂溪天寶初鍾離君令永安聞縣治曰盂溪則曰嘻其異矣疇昔之夜豫寓長安邸夢二神女鳳冠綃帔環珮珊然揖豫曰若舉必第後且蒞吾邑永安盂溪是吾居也囑豫識之今果不謬獨未知二神女者為何乃詢耆老始聞杜氏二女之說鍾離君髙其節遣鄉人蹤跡之至三坑口則見二枯骸如雪罣藤石之上欲即而視之道隘阻斧藤流血斸石石亦流血及舉其骸關節鉤連金堅玉潤鏗然有聲咸歎所未睹因拾以還中道遇樵父曰斯石藤石稜二夫人鎖子骨也夫人生為烈女死為正神守此山谷若曹宜敬之語畢忽不見歸具道所以然鍾離君尤嗟異以其骨塑二神女祠三坑口稱石藤石稜二夫人之廟由樵夫言也按圖經盂溪山周回二百里坑五皆有龍篠曰馬藤二夫人溺於是曰桂曰盂碗曰老公曰山其流會於祠下派為三十六堰溉田五萬餘畝其興雲致雨北漸天台西浹婺女所利蓋溥皇宋景德四年詔改永安曰仙居令郭君易直以是年禱雨入山道險商略徙廟既度材卜址未吉山麓之民有馬直者夢夫人謂曰得而居置吾廟當相酬直翌日入坑治堰見二魚跳躍不已捕魚而得金叉因念所夢俱不敢匿以陳諸邑令未之信一夕驟雨坑流坌溢悉漂廟材至直之廬而止令以直言有證遂决遷廟即今廟址是已宣和間吕冦弄兵民相保聚於斯谷冦至雲霧䠫暝望草木或為兵巔崖熌若旗幟然冦懼終不敢入賴生全者以萬數至於水旱疾疫有禱無不應邑宰自密學陳公襄都講劉公老樞密郭公三益司業鄭公南皆有詩紀其實遭冦火石殘刻剝不可省惟密學皇祐間馬篠謝雨篇有靈泉汲坎窞仙仗下嶙峋之句其碑尚存斯廟嵗月綿逺時代遷革碑志斷裂可覽者十無二三在昔之為祀典與否難復推考而今朝典祀不録豈非闕遺比緣春夏不雨遍走羣祠禱焉莫答暨一謁祠下晴空忽雲而甘􅉈踵至深可敬異因訪故老勘斷碑得先後靈應事跡為詳將聞諸朝請號丐封以答神貺而及瓜有日遂不果故書以俟將來義靈廟碑朱熹慶元元年春正月敕以台州士民所請故直祕閣滕侯之祠為義靈廟州人老稚聞是命下驚喜歡呼奔走迎拜導至祠下酌奠以告大書扁榜金朱煒煌揭於門楣庸侈上賜而其耆艾學士大夫葉君聖耦等四十餘人亦㑹祠庭相與言曰往嵗盜起幫原連陷六州戎毒所加民無噍類而吾台人獨得全其室家仰父俯子傳世不絶以至於今者滕侯力也沒而弗祀固無以慰吾民之心祀而弗命又無以彰吾侯之德今則廟事既修而亦幸䝉上恩列祀典矣顧無金石以著本初其何以昭報事於長久且當日棄城冒賞之人其子孫猶有存者蓋嘗肆為妄說强祔其祖以遂侵誣之計吾州之人亦斥其僞以控於朝而報絀之矣然或久而不傳則未敢必其無後患也乃以書來請撰其事熹以衰朽欲謝不能而復自念往使浙東留台最久固已熟聞兹事而有感於中矣矧以諸君之請之力其何可辭則應曰諾而病未能也乃今太守周府君曄又因鄞縣主簿趙生師䢼踵門以請則為考按台人前進士陳君思恭所為日記及故禮部侍郎陳公公輔諸人之銘序贊頌皆言聞亂之初闔郡震恐太守趙資道郡丞李景淵咸愕眙不知所為謀欲遁去他吏相顧亦無敢出一語者侯方司户曹事獨慨然請任其責有異議者輒面叱之即日移書訣其父母昆弟而閉其妻子於官舍悉召州人諭以利害人人感泣踴躍聽命乃急下令發夫守險增埤濬隍除器募兵積糧致用分屯列柵為死守計日夜循撫甘苦同之城中之人始有固志而守丞以下則皆已遁去久矣既而山民吕師囊起兵應賊號十餘萬導以攻城前後數四侯皆應機設械立摧破之手弓臨城殪厥渠帥賊遂退走卒全其郛凡所存活以十萬計參伍其說一無異詞是則侯之為烈彰彰明矣獨稽史籍則見當時實以守城破賊為丞之功進領郡符就加職秩乃與所聞不類而於妄說反有助焉於是更即諸書以求其故然後乃見當時守丞雖遁而侯於所下文書猶必存其位號冦退解圍亟迎以歸俾上功狀而已不預焉丞蓋熙豐故家諸子又皆貴仕故得獨冒顯賞塵䇿書而侯反下從捕盜七人之比僅改京秩初階移官旁郡以去是則閹尹擅兵賊臣柄國之所為而後來侵誣妄論所由起也一時之謬流惑萬世向非台之文獻有足徴者民吏稱思久而不怠則亦何所質正而决其是非哉嗚呼是又可歎也已滕侯名膺字子勤後保南都守陳蔡以抗强敵乘勝焱鋭之鋒勳績尤盛勸進大元帥於濟州所陳又皆當時天下大計切中機會其於建炎紹興之史法當立傳而熹於是書蓋嘗受詔參筆削矣是以因書此碑而并核其真僞如此不惟少塞台人之意亦使後之執筆者有以考焉廟數遷徙今在城西北隅永慶寺東實侯所再築而力戰破賊處台人迎侯繼室趙夫人及諸孫仲宜等使居其旁通判州事吕君祖儉謀為買田以資奉守未就而去談者惜之然以台人之德侯如此吾知其繼而成之者無難也韋溪先生祠堂記鄭公鯉寶祐乙邜春同舍郎方一新葺乃祖韋溪先生祠堂以書來告曰生民尊祖禮無貴賤反本始也然親有盡而報有終在禮小宗之制由禰而上至髙祖四世而親盡矣四世親盡易世則祧祧主既藏不與祫事報有終也孝子慈孫反始一念或有不能安抑嘗深感厯代儒先宗主道術修明孔氏之業而不失其傳者各隨名跡所在建置祠宇春秋舍菜以詔將來永維我祖顯顯垂裕若使追養繼世過祧則止反有愧承學之士綿綿相續舍菜先師我心則怛謂報有終其可乎一新不肖忝承祖禰寅念先祖以經學鳴世在紹興間蔚為諸儒領袖學者尊之號曰韋溪先生欲俾來裔瞻望厥祖彌逺彌光乃即韋溪遺址修葺祠宇反始之義永永無極惟君久在辟雍習聞諸先生緒論舊矣願為記之公鯉竊念先生之學其時郎中張公布待制黃公宜受業於門親見而知之者故其言哀悼思永真得其的黃公云黨禁三家後潜心自六經三家則蜀學洛學朔學也三家操尚雖殊守正則一自紹聖奸臣執政發其私憤盡謫三家入元祐黨禁専尚王氏學用以取士謂之新學士趨私尚以釣爵位謂之時官士習既變士氣亦靡至建炎紹興中興之初而餘風未殄惟先生志益固守益堅潜心六經卓然屹立於衆醉獨醒之中遂為東南學者表正之師黃公發潛至矣洞見淵源張公云佛老韓攘斥文章孔性天此皆親炙函丈精得心傳嚴於衛道以開後學者也先生遺像家藏日逺二公遺語傳頌日新且古者鄉校釋菜先師猶永不忘而况子孫繼承遺緒其可忘之乎爰葺祠宇以奉世祀宜也咸謂先生堅凝正守與世寡諧坎壈一官老死不行其志以是為恨然心傳道統學為儒宗羣弟子接迹咸顯則先生濟時行道之用又豈終泯哉姓名言行登載縣志昭然可考兹故不詳乃若四世神主合於韋溪祠宇以為子孫訓者則自有永式云赤城集卷九
